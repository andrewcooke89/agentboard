# change-pipeline.yaml — First executable pipeline (Phase 9)
#
# End-to-end feature development pipeline: validate spec → review → decompose
# → generate → implement → conformance → acceptance-test.
#
# Engine: DAG (auto-detected from parallel_group + depends_on)

name: change-pipeline
description: "End-to-end feature change pipeline with spec validation, decomposition, and implementation"

system:
  engine: dag
  session_pool: true
  tier_filter: true

defaults:
  tier: 1
  timeoutSeconds: 3600
  maxRetries: 1
  constitution_sections:
    - security
    - architecture
    - quality
  signal_protocol: true
  signal_dir: "{{ run_dir }}/signals"
  working_dir: "{{ project_path }}"
  env:
    SPEC_PATH: "{{ spec_path }}"
    OUTPUT_DIR: "{{ output_dir }}"
    PROJECT_PATH: "{{ project_path }}"
  amendment_budget:
    max_amendments: 3
    scope: spec_only
  reviewers:
    default_agent: spec-reviewer

variables:
  - name: spec_path
    type: path
    description: "Path to the feature specification YAML"
    required: true
  - name: project_path
    type: path
    description: "Root path of the target project"
    required: true
  - name: output_dir
    type: path
    description: "Directory for pipeline outputs"
    required: true
  - name: language
    type: string
    description: "Primary language of the project"
    required: false
    default: "typescript"
  - name: framework
    type: string
    description: "Primary framework of the project"
    required: false
    default: ""
  - name: tier
    type: string
    description: "Run tier level (1=default, 2=TDD+acceptance, 3=full)"
    required: false
    default: "1"

steps:
  # Stage 1: Validate the feature spec against schema and constitution
  - name: validate-spec
    type: spec_validate
    model: glm
    spec_path: "{{ spec_path }}"
    schema_path: "{{ project_path }}/.workflow/schemas/feature_spec_v1.yaml"
    constitution_sections:
      - security
      - architecture
      - quality
    strict: false

  # Stage 2: Review loop for spec refinement
  - name: spec-review-loop
    type: review_loop
    model: claude
    depends_on:
      - validate-spec
    tier_override:
      "2":
        max_iterations: 5
      "3":
        max_iterations: 7
    max_iterations: 3
    on_max_iterations: escalate
    on_concern:
      timeout_minutes: 30
      default_action: accept
    producer:
      name: spec-planner
      type: spawn_session
      projectPath: "{{ project_path }}"
      prompt: |
        You are the spec planner. Read the feature specification at {{ spec_path }}
        and the validation report. Refine the spec based on reviewer feedback.

        Use the orchestrator template at .claude/orchestrator-templates/spec-planning.md
        for structured self-interrogation.

        Output: Updated spec at {{ output_dir }}/refined-spec.yaml
      signal_protocol: true
      signal_dir: "{{ run_dir }}/signals"
      result_file: "{{ output_dir }}/refined-spec.yaml"
    reviewer:
      name: spec-reviewer
      type: spawn_session
      projectPath: "{{ project_path }}"
      prompt: |
        Review the feature specification at {{ output_dir }}/refined-spec.yaml
        against the constitution sections: security, architecture, quality.

        Write your verdict as a YAML file to: {{ output_dir }}/spec-review-verdict.yaml
        The file MUST contain a 'verdict' field (PASS, FAIL, or NEEDS_FIX) and a 'feedback' field.
      signal_protocol: true
      signal_dir: "{{ run_dir }}/signals"
      verdict_field: verdict
      feedback_field: feedback
      result_file: "{{ output_dir }}/spec-review-verdict.yaml"

  # Stage 3: Decompose spec into work units
  - name: decompose
    type: spawn_session
    model: claude
    depends_on:
      - spec-review-loop
    projectPath: "{{ project_path }}"
    prompt: |
      Decompose the approved feature spec into work units.

      Use the orchestrator template at .claude/orchestrator-templates/decomposition.md

      Inputs:
        - Spec: {{ output_dir }}/refined-spec.yaml
        - Project: {{ project_path }}

      Output: {{ output_dir }}/decomposition/manifest.yaml + WU-*.yaml files
    signal_protocol: true
    signal_dir: "{{ run_dir }}/signals"
    result_file: "{{ output_dir }}/decomposition/manifest.yaml"
    timeoutSeconds: 1800

  # Stage 4: Generation (parallel scaffold + consistency check)
  - name: generation
    type: parallel_group
    depends_on:
      - decompose
    on_failure: fail_fast
    steps:
      - name: generate-scaffold
        type: spawn_session
        model: glm
        projectPath: "{{ project_path }}"
        prompt: |
          Generate code scaffold from the decomposition manifest.

          Input: {{ output_dir }}/decomposition/manifest.yaml
          Output: {{ output_dir }}/generation/scaffold-report.yaml
        signal_protocol: true
        signal_dir: "{{ run_dir }}/signals"
        result_file: "{{ output_dir }}/generation/scaffold-report.yaml"
        timeoutSeconds: 1800

      - name: generation-consistency-check
        type: native_step
        depends_on:
          - generate-scaffold
        command: |
          #!/usr/bin/env bash
          set -euo pipefail

          MANIFEST="{{ output_dir }}/decomposition/manifest.yaml"
          SCAFFOLD="{{ output_dir }}/generation/scaffold-report.yaml"
          DECOMP_DIR="{{ output_dir }}/decomposition"
          ERRORS=0

          # ── Existence checks ──────────────────────────────────────
          if [ ! -f "$MANIFEST" ]; then
            echo "FAIL: manifest.yaml not found at $MANIFEST"
            exit 1
          fi
          if [ ! -f "$SCAFFOLD" ]; then
            echo "FAIL: scaffold-report.yaml not found at $SCAFFOLD"
            exit 1
          fi

          echo "=== Generation Consistency Check ==="
          echo "Manifest: $MANIFEST"
          echo "Scaffold: $SCAFFOLD"
          echo ""

          # ── 1. Extract WU IDs from manifest (yq v4 syntax) ────────
          MANIFEST_WUS=$(yq -r '.work_units[].id' "$MANIFEST" | sort -u)
          MANIFEST_COUNT=$(echo "$MANIFEST_WUS" | grep -c . || true)
          echo "Manifest declares $MANIFEST_COUNT work units"

          if [ "$MANIFEST_COUNT" -eq 0 ]; then
            echo "FAIL: No work units found in manifest"
            exit 1
          fi

          # ── 2. Extract WU IDs covered by scaffold ─────────────────
          # Gather from all known schema variants (v1.0 and older)
          SCAFFOLD_WUS=$(yq -r '.work_unit_readiness[].id' "$SCAFFOLD" 2>/dev/null || true)
          STATS_WUS=$(yq -r '.stats.work_units_covered[]' "$SCAFFOLD" 2>/dev/null || true)
          FILE_WUS=$(yq -r '.files[].work_units[]' "$SCAFFOLD" 2>/dev/null || true)
          SCAFF_FILE_WUS=$(yq -r '.scaffold_files[].work_units[]' "$SCAFFOLD" 2>/dev/null || true)
          MOD_WUS=$(yq -r '.modification_points[].work_units[]' "$SCAFFOLD" 2>/dev/null || true)
          ALL_SCAFFOLD_WUS=$(printf '%s\n%s\n%s\n%s\n%s\n' \
            "$SCAFFOLD_WUS" "$STATS_WUS" "$FILE_WUS" "$SCAFF_FILE_WUS" "$MOD_WUS" \
            | grep -v '^$' | grep -v '^null$' | sort -u)
          SCAFFOLD_COUNT=$(echo "$ALL_SCAFFOLD_WUS" | grep -c . || true)
          echo "Scaffold covers $SCAFFOLD_COUNT work units"
          echo ""

          # ── 3. Check: every manifest WU appears in scaffold ───────
          echo "--- WU Coverage Check ---"
          MISSING=0
          while IFS= read -r wu; do
            [ -z "$wu" ] && continue
            if echo "$ALL_SCAFFOLD_WUS" | grep -qxF "$wu"; then
              : # found
            else
              echo "  MISSING: $wu not covered by scaffold"
              MISSING=$((MISSING + 1))
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$MANIFEST_WUS"
          [ "$MISSING" -eq 0 ] && echo "  PASS: All manifest WUs covered by scaffold"
          echo ""

          # ── 4. Check: no phantom WUs in scaffold ──────────────────
          echo "--- Phantom WU Check ---"
          PHANTOMS=0
          while IFS= read -r wu; do
            [ -z "$wu" ] && continue
            if echo "$MANIFEST_WUS" | grep -qxF "$wu"; then
              : # found
            else
              echo "  PHANTOM: $wu in scaffold but not in manifest"
              PHANTOMS=$((PHANTOMS + 1))
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$ALL_SCAFFOLD_WUS"
          [ "$PHANTOMS" -eq 0 ] && echo "  PASS: No phantom WUs in scaffold"
          echo ""

          # ── 5. Check: WU YAML files exist for each manifest WU ────
          echo "--- WU File Check ---"
          FMISSING=0
          while IFS= read -r wu; do
            [ -z "$wu" ] && continue
            if [ ! -f "$DECOMP_DIR/${wu}.yaml" ]; then
              echo "  MISSING: $DECOMP_DIR/${wu}.yaml not found"
              FMISSING=$((FMISSING + 1))
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$MANIFEST_WUS"
          [ "$FMISSING" -eq 0 ] && echo "  PASS: All WU YAML files exist"
          echo ""

          # ── 6. Check scaffold verdict/blockers (v1.0 format) ──────
          echo "--- Scaffold Verdict Check ---"
          VERDICT=$(yq -r '.verdict.status // "NONE"' "$SCAFFOLD" 2>/dev/null || echo "NONE")
          if [ "$VERDICT" = "FAIL" ]; then
            echo "  FAIL: Scaffold verdict is FAIL"
            ERRORS=$((ERRORS + 1))
          elif [ "$VERDICT" = "NONE" ] || [ "$VERDICT" = "null" ]; then
            echo "  SKIP: No verdict field (older schema)"
          else
            echo "  PASS: Scaffold verdict is $VERDICT"
          fi
          echo ""

          # ── 7. Check scaffold readiness per WU (v1.0 format) ──────
          echo "--- WU Readiness Check ---"
          NOT_READY=$(yq -r '.work_unit_readiness[] | select(.scaffold_ready != true) | .id' "$SCAFFOLD" 2>/dev/null || true)
          NOT_READY=$(echo "$NOT_READY" | grep -v '^$' || true)
          if [ -n "$NOT_READY" ]; then
            echo "  WARNING: Not scaffold-ready:"
            echo "$NOT_READY" | while read -r w; do echo "    - $w"; done
          else
            READINESS_COUNT=$(yq -r '.work_unit_readiness | length' "$SCAFFOLD" 2>/dev/null || echo "0")
            if [ "${READINESS_COUNT:-0}" -gt 0 ] 2>/dev/null; then
              echo "  PASS: All $READINESS_COUNT WUs are scaffold-ready"
            else
              echo "  SKIP: No work_unit_readiness field (older schema)"
            fi
          fi
          echo ""

          # ── Summary ───────────────────────────────────────────────
          echo "=== Summary ==="
          echo "Manifest WUs: $MANIFEST_COUNT | Scaffold WUs: $SCAFFOLD_COUNT | Errors: $ERRORS"
          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAIL: $ERRORS consistency error(s) found"
            exit 1
          fi
          echo "PASS: Scaffold is consistent with decomposition manifest"
        working_dir: "{{ project_path }}"
        on_step_failure: completed_with_warnings
        timeoutSeconds: 300

      # TDD red-phase verification (REQ-63, REQ-64)
      - name: tdd-verify-red
        type: native_step
        tier_min: 2
        depends_on:
          - generate-scaffold
          # - generate-tests  # Uncomment when test-writer available
        command: |
          # Run tests - expect them to FAIL (red phase)
          # Capture exit code properly (no || true which swallows it)
          set +e
          if [ -f "package.json" ]; then
            bun test 2>&1
            TEST_EXIT=$?
          elif [ -f "Cargo.toml" ]; then
            cargo test 2>&1
            TEST_EXIT=$?
          elif [ -f "pyproject.toml" ]; then
            pytest 2>&1
            TEST_EXIT=$?
          else
            echo "Unknown test framework"
            exit 1
          fi
          set -e

          # Tests SHOULD fail in red phase (new feature tests not yet implemented)
          if [ $TEST_EXIT -eq 0 ]; then
            echo "ERROR: Tests passed before implementation (trivially passing tests)"
            exit 1
          else
            echo "PASS: Tests failed as expected in red phase (exit code: $TEST_EXIT)"
            exit 0
          fi
        working_dir: "{{ project_path }}"
        timeoutSeconds: 600

  # Stage 5: Per-WU TDD Implementation (deterministic orchestrator)
  - name: implement
    type: spawn_session
    depends_on:
      - generation
    projectPath: "{{ project_path }}"
    command: "cd /home/andrew-cooke/tools/agentboard && bun run src/server/scripts/wu-orchestrator.ts --manifest '{{ output_dir }}/decomposition/manifest.yaml' --spec '{{ output_dir }}/refined-spec.yaml' --project-path '{{ project_path }}' --output-dir '{{ output_dir }}' --api-url 'http://localhost:4040' --tier '{{ tier }}' --language '{{ language }}' --framework '{{ framework }}' --run-id '{{ run_id }}'"
    prompt: "Per-WU TDD orchestrator — deterministic implementation pipeline"
    signal_protocol: true
    signal_dir: "{{ run_dir }}/signals"
    result_file: "{{ output_dir }}/implementation/implementation-report.yaml"
    enforce_verdict:
      field: overall_verdict
      allowed:
        - pass
      fail_message: "Implementation verdict was '{{ verdict }}', expected 'pass'"
    timeoutSeconds: 14400

  # Stage 5b: Amendment verification (resolves any amendment signals from implement)
  - name: verify-amendments
    type: amendment_check
    depends_on:
      - implement
    signal_dir: "{{ run_dir }}/signals"
    signal_types:
      - amendment_required
    on_amendment:
      handler: amendment-handler
      resume_from_checkpoint: true
    on_human_required:
      action: escalate
    on_exploration_required:
      action: escalate
      resume_step: implement
    timeoutSeconds: 600

  # TDD green-phase verification (REQ-65)
  - name: tdd-verify-green
    type: native_step
    tier_min: 2
    depends_on:
      - verify-amendments
    command: |
      # Run tests - expect them to PASS (green phase)
      set +e
      if [ -f "package.json" ]; then
        bun test 2>&1
        TEST_EXIT=$?
      elif [ -f "Cargo.toml" ]; then
        cargo test 2>&1
        TEST_EXIT=$?
      elif [ -f "pyproject.toml" ]; then
        pytest 2>&1
        TEST_EXIT=$?
      else
        echo "Unknown test framework"
        exit 1
      fi
      set -e

      # Tests SHOULD pass in green phase
      if [ $TEST_EXIT -eq 0 ]; then
        echo "PASS: Tests passed after implementation (green phase verified)"
        exit 0
      else
        echo "FAIL: Tests still failing after implementation"
        exit 1
      fi
    working_dir: "{{ project_path }}"
    timeoutSeconds: 600

  # Stage 5c: Edge contract verification (deterministic, no AI)
  - name: verify-edges
    type: native_step
    depends_on:
      - tdd-verify-green
    command: |
      PLAN_ID=$(grep -oP 'plan_id:\s*\K\S+' "{{ output_dir }}/refined-spec.yaml" 2>/dev/null || grep -oP 'plan_id:\s*\K\S+' "{{ spec_path }}" 2>/dev/null || true)
      if [ -z "$PLAN_ID" ]; then
        echo "SKIP: No plan_id in spec — edge verification not applicable"
        exit 0
      fi
      RESULT=$(curl -sf "http://localhost:3847/api/verify/${PLAN_ID}?project_path={{ project_path }}" 2>/dev/null || true)
      if [ -z "$RESULT" ]; then
        echo "SKIP: Planner HTTP server not reachable — edge verification skipped"
        exit 0
      fi
      PASSED=$(echo "$RESULT" | jq -r '.passed')
      echo "$RESULT" | jq .
      if [ "$PASSED" = "true" ]; then
        echo "PASS: All edge contracts verified"
        exit 0
      else
        echo "FAIL: Edge contract verification failed"
        exit 1
      fi
    working_dir: "{{ project_path }}"
    on_step_failure: completed_with_warnings
    timeoutSeconds: 300

  # Stage 6: Conformance verification
  - name: conformance
    type: spawn_session
    model: claude
    depends_on:
      - verify-edges
    projectPath: "{{ project_path }}"
    prompt: |
      Verify implementation conformance against the approved spec.

      Use the orchestrator template at .claude/orchestrator-templates/verification.md

      Inputs:
        - Spec: {{ output_dir }}/refined-spec.yaml
        - Implementation: {{ output_dir }}/implementation/
      Output: {{ output_dir }}/conformance/verification-report.yaml
    signal_protocol: true
    signal_dir: "{{ run_dir }}/signals"
    result_file: "{{ output_dir }}/conformance/verification-report.yaml"
    enforce_verdict:
      field: overall_verdict
      allowed:
        - pass
      fail_message: "Conformance verdict was '{{ verdict }}', expected 'pass'"
    timeoutSeconds: 3600

  # Stage 7: Acceptance testing (tier 2+)
  - name: acceptance-test
    type: spawn_session
    model: glm
    depends_on:
      - conformance
    tier_min: 2
    projectPath: "{{ project_path }}"
    prompt: |
      Run acceptance tests for the implemented feature.

      Input: {{ output_dir }}/conformance/verification-report.yaml
      Output: {{ output_dir }}/acceptance/test-results.yaml
    signal_protocol: true
    signal_dir: "{{ run_dir }}/signals"
    result_file: "{{ output_dir }}/acceptance/test-results.yaml"
    enforce_verdict:
      field: overall_verdict
      allowed:
        - pass
      fail_message: "Acceptance verdict was '{{ verdict }}', expected 'pass'"
    timeoutSeconds: 3600

  # Stage 8: Observe and learn (Phase 13 forward ref — commented out)
  # - name: observe-and-learn
  #   type: spawn_session
  #   depends_on:
  #     - acceptance-test
  #   projectPath: "{{ project_path }}"
  #   prompt: "Observe pipeline execution patterns and record learnings"
  #   signal_protocol: true
  #   signal_dir: "{{ run_dir }}/signals"