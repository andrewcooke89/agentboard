description: |
  Add workflow-specific configuration values to src/server/config.ts.
  Follow existing environment variable parsing pattern with defaults.

  New config values:
  - WORKFLOW_ENGINE_ENABLED (default: true) - Master kill switch
  - WORKFLOW_DIR (default: ~/.agentboard/workflows/) - YAML file directory
  - WORKFLOW_MAX_CONCURRENT_RUNS (default: 20) - Limit concurrent runs
  - WORKFLOW_RUN_RETENTION_DAYS (default: 30) - Auto-cleanup threshold
  - WORKFLOW_POLL_INTERVAL_MS (default: 2000) - Engine poll interval

context:
  existing_patterns:
    - "Env var parsing with Number() and validation (see taskMaxConcurrent lines 85-89)"
    - "Path resolution with path.join(homeDir, ...) (see taskOutputDir line 99)"
