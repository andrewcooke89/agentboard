      WebSocket protocol is well-namespaced ('cron-' prefix avoids collision with existing
      session messages), with 12 server and 14 client message types fully documented.
      Protocol includes streaming (Run Now output chunks) and pagination (logs, history).

      Dependencies are justified and bounded:
