        settingsStore.ts for cron settings, SessionList.tsx for clock icon integration)
      - 3 explicitly excluded files (SessionManager.ts, Terminal.tsx, sessionStore.ts)

      Follows existing agentboard conventions consistently:
      - Hono backend with WebSocket message protocol matching existing session pattern
      - React 18 frontend with Zustand state management (localStorage persistence)
      - SQLite database via existing agentboard.db and initDatabase()
      - motion/react animations consistent with SessionList entry/exit pattern
      - Tailwind CSS styling throughout
      - Component file structure mirrors existing src/client/components/ organization

      Data model separation is clean:
      - System state from discovery only, never persisted to DB (REQ-87)
      - User preferences in cron_job_prefs table (never stores job state)
      - Health always derived from live run history data, never persisted (REQ-59)
      - Manual runs in cron_run_history DB; scheduled run data from system logs (REQ-88)
      - Deterministic job IDs from source+name+command (not schedule) — preserves continuity
        of prefs, tags, and history when users edit job frequency (REQ-05)

      Resource management is sound:
      - CronManager singleton lifecycle: polling starts on first WS client, pauses with none
      - Run Now child processes survive WS disconnects (REQ-103) — no lost results
      - Orphaned prefs cleaned with 24-hour grace period (REQ-98)
      - Run history retention: 90-day max, 500 records per job (REQ-101)
      - FK cascade: cron_run_history ON DELETE CASCADE from cron_job_prefs — history is
