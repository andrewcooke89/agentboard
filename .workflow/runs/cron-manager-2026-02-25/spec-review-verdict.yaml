constitution_checks:
  security:
    result: pass
    notes: |
      Credential handling is defense-in-depth and well-specified:
      - Uint8Array storage with explicit `fill(0)` zeroing on expiry (REQ-83). Correctly avoids
        immutable JS strings that cannot be wiped from the V8 heap.
      - Serialization bridge (REQ-104): JSON string from WebSocket immediately converted to
        Uint8Array via TextEncoder; intermediate string overwritten before any async operation.
        TEST-102 verifies the bridge. The spec acknowledges the inherent JS limitation — GC
        controls actual reclamation — but minimizes the exposure window, which is appropriate.
      - Sudo invocation via `-S` flag with stdin piping (REQ-102). Credentials never appear in
        CLI arguments (visible via `ps aux`). TEST-100 verifies spawn args and stdin piping.
      - WSS-only enforcement in production with warning for plain WS dev (REQ-84).
      - Consistent `sudoCredential` naming avoids secret-detection regex false positives.
      - Auto-expiry via configurable setTimeout grace period (default 5 min).
      - TEST-97 (buffer zeroing), TEST-100 (stdin piping), TEST-102 (bridge) cover all paths.

      Input sanitization prevents injection:
      - REQ-96: Rejects newline (\n, \r) and null byte characters in cron job commands,
        preventing multi-line crontab injection payloads. TEST-95 covers this.
      - REQ-52: Systemd unit name validated against /^[a-zA-Z0-9][a-zA-Z0-9_-]*$/,
        preventing path traversal (e.g., `../escape`). TEST-96 covers this.
      - REQ-44: Schedule expression validated before applying (cron 5-field format or
        systemd calendar via `systemd-analyze calendar`).

      Destructive operation safety:
      - REQ-48 (invariant): backup-before-modify for all destructive/edit operations.
        Crontab snapshots to ~/.agentboard/backups/crontab-{timestamp}, unit files copied.
      - REQ-46: Delete confirmation dialog listing job name.
      - REQ-99: Type-to-confirm for system-level systemd unit deletion — appropriate friction
        for high-risk operations affecting system services.
      - REQ-56: Bulk delete confirmation listing all selected job names.
      - REQ-40 (invariant): Only one manual run per job at a time.

      No credential patterns detected in code blocks or field names.

