gap_summary:
  critical:
    - id: GAP-01
      requirements: [REQ-58, REQ-60, REQ-61, REQ-62]
      description: "Health computation is entirely unwired. computeHealth(), detectMissedRun(), and duration averaging methods exist but are never called from the polling loop. All jobs show health='unknown' and healthReason=null."
      impact: "Health badges, failure detection, duration tracking, and missed-run detection are non-functional."

    - id: GAP-02
      requirements: [REQ-08]
      description: "Poll interval hardcoded to 30s instead of configurable default 5s (min 2s, max 30s)."
      impact: "Jobs update much slower than spec intends. Settings control for poll interval has no effect."

    - id: GAP-03
      requirements: [REQ-82]
      description: "CronSudoPrompt component is fully implemented but never mounted. cron-sudo-required WS handler is a no-op. Lock icons show but clicking sudo-requiring actions has no credential prompt flow."
      impact: "All sudo operations will fail silently for system jobs."

  major:
    - id: GAP-04
      requirements: [REQ-10, REQ-49]
      description: "No motion/react animations anywhere in cron components despite framer-motion being installed. List add/remove/update and delete exit animations are missing."
      impact: "Visual polish; job disappear/appear abruptly."

    - id: GAP-05
      requirements: [REQ-40]
      description: "No concurrent-run guard. Multiple manual runs can be triggered simultaneously for the same job."
      impact: "Could cause resource contention or confusing output."

    - id: GAP-06
      requirements: [REQ-98, REQ-101]
      description: "Orphan cleanup (cleanOrphanedPrefs) and run history pruning (pruneRunHistory) methods exist but are never scheduled to run periodically."
      impact: "Database will grow unbounded over time."

    - id: GAP-07
      requirements: [REQ-50, REQ-53]
      description: "Create Job button not wired in empty state or main header. No duplicate detection. No auto-select of new job."
      impact: "Job creation modal is inaccessible through normal UI flow."

    - id: GAP-08
      requirements: [REQ-73, REQ-74, REQ-76]
      description: "Session linking dropdown is a placeholder. Clicking linked session chip doesn't navigate. Managed toggle has no control, only display."
      impact: "Session integration features are partially non-functional."

  minor:
    - id: GAP-09
      requirements: [REQ-11]
      description: "cronAvatarStyle setting exists but is never read when constructing DiceBear URLs. Hardcoded to 'bottts'."
      impact: "Avatar style setting has no effect."

    - id: GAP-10
      requirements: [REQ-13]
      description: "Avatar error fallback hides image. No colored circle + first letter rendered."
      impact: "Missing avatars leave blank space."

    - id: GAP-11
      requirements: [REQ-14]
      description: "Group headers lack health summary indicator (red dot for groups with critical jobs)."
      impact: "Minor visual omission."

    - id: GAP-12
      requirements: [REQ-18, REQ-19, REQ-66]
      description: "Source filter, tag filter, and shift+click range selection have store logic but no UI wiring."
      impact: "Filtering and selection features incomplete."

    - id: GAP-13
      requirements: [REQ-20, REQ-57]
      description: "No right-click context menus on group headers."
      impact: "Group-level bulk operations only available via manual selection."

    - id: GAP-14
      requirements: [REQ-24, REQ-25]
      description: "Systemd unit files shown as plain text (no INI highlighting). Cron env vars not shown."
      impact: "Minor readability gap."

    - id: GAP-15
      requirements: [REQ-36]
      description: "No 'Open in Terminal' button in Script tab."
      impact: "Minor convenience feature missing."

    - id: GAP-16
      requirements: [REQ-67, REQ-68]
      description: "Auto-tag suggestions not implemented in UI. Toast notifications stored but never displayed."
      impact: "Notification and tag suggestion UX incomplete."

    - id: GAP-17
      requirements: [REQ-84, REQ-86]
      description: "No WSS warning for plain WS. Systemd calendar human-readable conversion only handles basic patterns."
      impact: "Low-risk security note; display limitation for complex systemd schedules."

    - id: GAP-18
      requirements: [REQ-03, REQ-21]
      description: "Empty state missing Create Job button wiring and mini timeline. Detail header missing managed toggle control."
      impact: "Minor functional gaps."

    - id: GAP-19
      requirements: [REQ-104]
      description: "Credential string zeroing at handler boundary is structurally impossible in JavaScript — strings are immutable. The conversion to Uint8Array is immediate, which is the best mitigation available."
      impact: "Inherent language limitation. Uint8Array zeroing works correctly."

