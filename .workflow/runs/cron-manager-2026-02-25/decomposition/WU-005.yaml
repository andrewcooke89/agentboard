acceptance_criteria:
  - type: unit_test
    description: "runJobNow: cron via sh -c, systemd via systemctl start"
  - type: unit_test
    description: "pauseJob: cron comments with #AGENTBOARD_PAUSED: prefix"
  - type: unit_test
    description: "resumeJob: cron removes prefix; systemd enable+start"
  - type: unit_test
    description: "editFrequency validates before applying; rejects invalid"
  - type: unit_test
    description: "deleteJob creates backup before deletion"
  - type: unit_test
    description: "createCronJob validates and appends to user crontab"
  - type: unit_test
    description: "createSystemdTimer generates .timer + .service files"
  - type: unit_test
    description: "Rejects commands with newlines, carriage returns, null bytes"
  - type: unit_test
    description: "Validates systemd service name format"
  - type: unit_test
    description: "Sudo credentials cached as Uint8Array with grace period"
  - type: unit_test
    description: "Credential string zeroed immediately after conversion to Uint8Array"
  - type: unit_test
    description: "All sudo operations use Bun.spawn with stdin piping"
  - type: unit_test
    description: "Bulk operations execute sequentially with progress tracking"
interfaces:
  exports:
    - "runJobNow(jobId): Promise<{ runId: string }>"
    - "pauseJob(jobId): Promise<void>"
    - "resumeJob(jobId): Promise<void>"
    - "editFrequency(jobId, schedule): Promise<void>"
    - "deleteJob(jobId): Promise<void>"
    - "createCronJob(config): Promise<string>"
    - "createSystemdTimer(config): Promise<string>"
    - "bulkPause(jobIds): AsyncGenerator<BulkProgress>"
    - "bulkResume(jobIds): AsyncGenerator<BulkProgress>"
    - "bulkDelete(jobIds): AsyncGenerator<BulkProgress>"
    - "cacheSudoCredential(cred: Uint8Array): void"
estimated_loc: 400
