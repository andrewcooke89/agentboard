id: WU-005
title: "Operations & Credential Cache"
description: |
  Implement all job management operations in CronManager: runJobNow (cron via sh -c,
  systemd via systemctl start), pauseJob/resumeJob (cron comment prefix, systemd
  stop+disable/enable+start), editFrequency (cron crontab replace, systemd OnCalendar
  rewrite + daemon-reload), deleteJob (with backup), createCronJob/createSystemdTimer
  (with validation). Implement bulk operations (sequential with progress). Implement
  sudo credential cache (Uint8Array, configurable grace period, zero on expiry).
  Validate commands for injection (no newlines/null bytes). Create backups before
  destructive operations.
files:
  - path: src/server/cronManager.ts
    action: modify
    description: "Implement operations, creation, bulk ops, credential cache"
dependencies:
  - WU-003
  - WU-001
requirements:
  - REQ-37
  - REQ-40
  - REQ-41
