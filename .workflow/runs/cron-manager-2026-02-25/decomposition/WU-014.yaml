id: WU-014
title: "Job Controls & Run Now"
description: |
  Implement CronJobControls: Run Now button (disabled with spinner during run),
  Pause/Resume toggle, Edit Frequency button (opens inline CronScheduleEditor),
  Delete button (opens CronDeleteConfirm). Lock icons on sudo-required controls.
  Only one manual run per job at a time. Implement CronRunNowOutput: mini-terminal
  below controls showing streaming output from manual run, exit code + duration
  on completion.
files:
  - path: src/client/components/cron/CronJobControls.tsx
    action: modify
    description: "Implement control buttons with state management"
  - path: src/client/components/cron/CronRunNowOutput.tsx
    action: modify
    description: "Implement mini-terminal for streaming run output"
dependencies:
  - WU-011
