    description: "Run Now button disabled with spinner during active run"
  - type: unit_test
    description: "Only one manual run per job at a time"
  - type: unit_test
    description: "Pause/Resume toggle sends correct WS messages"
  - type: unit_test
    description: "Lock icons shown on sudo-required controls"
  - type: unit_test
    description: "Run output streams into mini-terminal"
  - type: unit_test
