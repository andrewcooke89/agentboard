gap_assessment:
  critical_gaps:
    - id: GAP-01
      requirements: [REQ-58, REQ-60, REQ-61, REQ-62]
      description: "Health computation entirely unwired — computeHealth(), detectMissedRun(), and duration averaging exist but are never called from polling loop."
      impact: "All jobs show health='unknown'. Health badges, failure detection, missed-run detection non-functional."
      acceptance: blocked

    - id: GAP-02
      requirements: [REQ-08]
      description: "Poll interval hardcoded to 30s instead of configurable default 5s (range 2-30s)."
      impact: "Job updates 6x slower than intended. Settings control has no effect."
      acceptance: blocked

    - id: GAP-03
      requirements: [REQ-82]
      description: "CronSudoPrompt component implemented but never mounted. Sudo credential flow not connected."
      impact: "System-level cron/systemd operations requiring sudo will fail silently."
      acceptance: blocked

  major_gaps:
    - id: GAP-04
      requirements: [REQ-10, REQ-49]
      description: "No framer-motion animations for job list add/remove/update transitions."
      impact: "Visual polish gap — jobs appear/disappear abruptly."
      acceptance: deferred

    - id: GAP-05
      requirements: [REQ-40]
      description: "No concurrent-run guard for manual execution."
      impact: "Multiple simultaneous runs possible for same job."
      acceptance: deferred

    - id: GAP-06
      requirements: [REQ-98, REQ-101]
      description: "Orphan cleanup and history pruning methods exist but are never scheduled."
      impact: "Database grows unbounded over time."
      acceptance: deferred

    - id: GAP-07
      requirements: [REQ-50, REQ-53]
      description: "Create Job button not wired in empty state or header. No duplicate detection."
      impact: "Job creation modal inaccessible through normal UI flow."
