recommendation: |
  The feature is NOT ready for full acceptance. While the backend infrastructure is solid
  (discovery, CRUD, WS handlers, DB schema, security), 4 critical gaps must be resolved
  before the feature delivers its core value proposition:

  1. Wire health computation into the polling loop (GAP-01) — this is the #1 priority
     as health is the primary differentiator of this feature.
  2. Make poll interval configurable and default to 5s (GAP-02).
  3. Mount CronSudoPrompt and connect the sudo credential flow (GAP-03).
  4. Wire the Create Job button in empty state and header (GAP-07).

  Major gaps (animations, concurrent-run guard, session linking) can be deferred to a
  follow-up iteration. Minor gaps are polish items that don't affect core functionality.
