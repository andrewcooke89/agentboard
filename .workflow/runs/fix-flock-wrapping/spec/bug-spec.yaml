title: "createCronJob() missing flock mutual exclusion wrapping"

description: |
  The createCronJob() function in src/server/cronManager.ts writes cron commands
  directly into the crontab without flock wrapping. This means concurrent executions
  of the same cron job are not prevented, which can cause data corruption, duplicate
  operations, or resource contention when a cron job takes longer than its schedule
  interval.

  The function currently constructs the crontab line as:
    <schedule> <command> # <comment>

  It should construct it as:
    <schedule> flock -n /tmp/agentboard-cron-<jobId>.lock <command> # <comment>

  The jobId is generated by generateJobId('user-crontab', name, command) using a
  SHA-256 hash (first 16 hex chars) of the original unwrapped command. The lock file
  path must use this same jobId so each distinct job gets its own lock file.

  Key constraints from test expectations:
    - jobId must be computed from the ORIGINAL command (not the flock-wrapped version)
    - The -n (non-blocking) flag must be used so overlapping runs skip rather than queue
    - Lock files go in /tmp with naming pattern: /tmp/agentboard-cron-<jobId>.lock
    - The original command must be preserved after the lock file path
    - Different jobs must produce different lock file paths

reproduction:
  steps:
    - "Run: bun test src/server/__tests__/cronFlockWrapping.test.ts"
    - "Observe 6 failures in the 'BUG-3: flock mutual exclusion wrapping' describe block"
    - "Run: bun test src/server/__tests__/cronJobCreationRegression.test.ts"
    - "Observe 2 failures in the 'Bug 3: flock wrapping for mutual exclusion' describe block"
    - "Inspect createCronJob() at src/server/cronManager.ts:1029 — no flock wrapping present"
  environment: "Bun 1.x, TypeScript 5.x, Linux"

expected: |
  createCronJob() wraps the command with flock before writing to crontab:
    flock -n /tmp/agentboard-cron-<jobId>.lock <original_command>
  All 8 tests pass. Each cron job gets a unique lock file based on its jobId,
  preventing concurrent execution of the same job.

actual: |
  createCronJob() writes the bare command to crontab with no flock wrapping.
  8 tests fail across 2 test files. Concurrent cron job executions are not prevented.

affected_files:
  - "src/server/cronManager.ts"
  - "src/server/__tests__/cronFlockWrapping.test.ts"
  - "src/server/__tests__/cronJobCreationRegression.test.ts"

root_cause: |
  In createCronJob() (cronManager.ts:1029-1040), the newLine is constructed as:
    const newLine = `${config.schedule} ${config.command}${comment}`
  The name and jobId are computed AFTER building the crontab line and only used
  for the return value. The fix requires computing them BEFORE building the line
  and inserting flock wrapping into the command.

fix_approach: |
  Reorder createCronJob() to:
  1. Validate the command (existing)
  2. Read the crontab (existing)
  3. Compute name via deriveJobName(config.command)
  4. Compute jobId via generateJobId('user-crontab', name, config.command)
  5. Build lock file path: /tmp/agentboard-cron-${jobId}.lock
  6. Wrap command: flock -n ${lockFile} ${config.command}
  7. Build crontab line with wrapped command
  8. Write crontab and return jobId

severity: major

affected_spec: "{{ affected_spec_path }}"

verdict: pass
