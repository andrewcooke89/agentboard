verdict: pass

root_cause: |
  Two distinct type incompatibilities in MCP test files:

  1. Bun's mock() returns Mock<T> which lacks the 'preconnect' static property present on
     typeof globalThis.fetch. TypeScript's TS2352 rejects direct casts between structurally
     incompatible types. The tests use either `mock(...) as typeof fetch` or assign a bare
     async arrow function cast `as typeof globalThis.fetch`, both of which fail because the
     source type is missing 'preconnect'.

  2. Test fixture data uses source: 'tmux' but the SessionSource union type only allows
     'managed' | 'external'. The value 'tmux' was never valid — it was a test authoring mistake.

location:
  file: "src/server/mcp/__tests__/ (3 files)"
  line_range: "see details below"
  function: "mockFetchResponses (2 files), inline fetch assignment (1 file), test fixtures (1 file)"

error_locations:
  - file: "src/server/mcp/__tests__/cronMcpServer.test.ts"
    line: 83
    issue: "TS2352 — `mock(...) as typeof fetch` missing 'preconnect'"
    function: "mockFetchResponses"

  - file: "src/server/mcp/__tests__/wu006-healthAnalysisTools.test.ts"
    line: 103
    issue: "TS2352 — `mock(...) as typeof fetch` missing 'preconnect'"
    function: "mockFetchResponses"

  - file: "src/server/mcp/__tests__/wu006-healthAnalysisTools.test.ts"
    line: 1259
    issue: "TS2322 — source: 'tmux' not assignable to SessionSource"
    function: "test fixture data"

  - file: "src/server/mcp/__tests__/wu006-healthAnalysisTools.test.ts"
