description: |
  Fixed 6 TypeScript compilation errors across 3 MCP server test files:

  1. Fetch mock casting (TS2352) — 4 locations:
     Bun's Mock<T> type lacks the static 'preconnect' property that exists on typeof fetch.
     The fix inserts an intermediate `unknown` cast: `mock(...) as unknown as typeof fetch`.
     This is a standard TypeScript pattern for bridging structurally incompatible types in tests.

  2. Invalid SessionSource value (TS2322) — 2 locations:
     Test fixtures used `source: 'tmux'` but the SessionSource union type only allows
     'managed' | 'external'. Changed to 'external' which is semantically correct for
     sessions discovered from tmux windows.

  All changes are test-only — no production code was modified.
  All 238 tests across the 3 files pass.

tests_expected_to_pass: true
