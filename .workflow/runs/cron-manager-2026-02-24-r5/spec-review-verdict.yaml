constitution_checks:
  security:
    result: pass
    notes: |
      Credential handling is well-specified and secure:
      - Uint8Array storage with explicit zeroing on expiry (REQ-83), not JS strings which
        cannot be reliably wiped from memory.
      - WSS-only enforcement in production; plain WS logs a warning (REQ-84).
      - Field named 'sudoCredential' avoids accidental logging by secret-detection regex.
      - Configurable grace period with auto-expiry via setTimeout.
      - TEST-97 explicitly verifies buffer zeroing behavior.

      Input sanitization is thorough:
      - REQ-96 rejects newline (\n, \r) and null byte characters in cron job commands,
        preventing crontab injection attacks.
      - REQ-52 validates systemd unit names against /^[a-zA-Z0-9][a-zA-Z0-9_-]*$/,
        preventing path traversal via unit names like '../escape'.
      - TEST-95 and TEST-96 cover both injection and validation scenarios.

      Destructive operation safety:
      - REQ-48 (invariant): backup-before-modify for all destructive/edit operations.
      - REQ-46: confirmation dialog for delete.
      - REQ-99: type-to-confirm for system-level unit deletion (high friction for high risk).
      - REQ-56: bulk delete requires confirmation listing all job names.

      No credential patterns detected in code blocks. All references use 'sudoCredential'
      terminology consistently throughout the spec.

  architecture:
    result: pass
    notes: |
      Scope is well-defined with explicit file lists:
      - 4 new backend files (cronManager, cronHistoryService, cronLogService, handlers)
      - 19 new frontend components under src/client/components/cron/
      - 1 new Zustand store (cronStore.ts)
      - 6 modified files with clear justification for each modification
      - 3 explicitly excluded files (SessionManager.ts, Terminal.tsx, sessionStore.ts)
      No wildcard scope patterns.

      Follows existing agentboard conventions:
      - Hono backend with WebSocket message protocol (matching existing session pattern)
      - React 18 frontend with Zustand state management
      - SQLite database via existing agentboard.db and initDatabase()
      - motion/react animations consistent with SessionList
      - Tailwind CSS styling

      CronManager singleton lifecycle is clear:
      - Instantiated in index.ts, started on first WS client, stopped when no clients.
      - Polling pauses when no clients are connected (resource-efficient).

      Data model separation is clean:
      - System state comes from discovery (never persisted to DB)
      - User preferences stored in cron_job_prefs (never stores system state)
      - Health is always derived from live data, never persisted (REQ-59)
      - Run history DB only stores manual runs; scheduled history comes from system logs (REQ-88)

      WebSocket protocol is well-documented with 12 server message types and 14 client
      message types, all prefixed with 'cron-' to avoid collision with existing messages.

