id: WU-005
title: "CronManager - Operations & Credential Cache"
description: |
  Extend the CronManager class with all job management operations (run now, pause, resume,
  edit frequency, delete, create cron, create systemd), bulk operations, sudo credential
  caching with Uint8Array and explicit zeroing, backup creation before destructive ops,
  and input sanitization for job creation.

dependencies: [WU-003]

files:
  modified:
    - path: src/server/cronManager.ts
      changes: |
        - Add runJobNow(jobId, sudoCredential?): AsyncGenerator<string> -- execute and stream output
        - Add pauseJob(jobId, sudoCredential?): Promise<void> -- comment-out crontab / systemctl stop+disable
        - Add resumeJob(jobId, sudoCredential?): Promise<void> -- uncomment crontab / systemctl enable+start
        - Add editFrequency(jobId, newSchedule, sudoCredential?): Promise<void> -- replace schedule in crontab/unit
        - Add deleteJob(jobId, sudoCredential?): Promise<void> -- remove from crontab / stop+disable+remove units
        - Add createCronJob(config): Promise<string> -- append to user crontab with input sanitization
        - Add createSystemdTimer(config, sudoCredential?): Promise<string> -- generate .timer/.service, deploy
        - Add bulkPause(jobIds, sudoCredential?): AsyncGenerator<BulkProgress>
        - Add bulkResume(jobIds, sudoCredential?): AsyncGenerator<BulkProgress>
        - Add bulkDelete(jobIds, sudoCredential?): AsyncGenerator<BulkProgress>
        - Add private sudoCredentialCache: Uint8Array | null
        - Add private sudoCredentialExpiry: number
        - Add cacheSudoCredential(credential: Uint8Array, gracePeriodMs): void
        - Add clearSudoCredential(): void -- fills buffer with zeros, sets to null
        - Add private createBackup(job): Promise<void> -- backup crontab/unit files before changes
        - Add private validateCronCommand(command): void -- reject newlines/null bytes
        - Add private validateSystemdServiceName(name): void -- regex validation

