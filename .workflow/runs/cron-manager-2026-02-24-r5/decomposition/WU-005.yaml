  - req: REQ-39
    type: contract
    check: "Manual runs recorded in cron_run_history with trigger: 'manual'"
  - req: REQ-40
    type: invariant
    check: "Only one manual run per job at a time"
  - req: REQ-41
    type: contract
    check: "Pause comments out crontab line with #AGENTBOARD_PAUSED: prefix; resume removes it; systemd uses stop/disable and enable/start"
  - req: REQ-45
    type: contract
    check: "Edit frequency replaces schedule in crontab line or OnCalendar= in timer unit + daemon-reload"
  - req: REQ-47
    type: contract
    check: "Delete removes crontab line; for systemd: stop + disable + remove unit files"
  - req: REQ-48
    type: invariant
    check: "Backup created before any destructive/edit operation"
  - req: REQ-51
    type: contract
    check: "Quick mode appends to user crontab"
  - req: REQ-52
    type: contract
    check: "Advanced mode generates .timer/.service, writes, daemon-reload, enable, start"
  - req: REQ-55
    type: contract
    check: "Bulk operations iterate sequentially; single credential prompt covers all; progress reported"
  - req: REQ-83
