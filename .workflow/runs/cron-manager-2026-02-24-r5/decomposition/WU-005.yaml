implementation_notes: |
  Credential caching: store as Uint8Array (TextEncoder.encode for incoming string). On clear,
  call credential.fill(0) before setting to null. Set setTimeout for auto-expiry. For crontab
  operations, always read current crontab via `crontab -l`, modify in memory, then write back
  via `crontab -` (pipe to stdin). For systemd, write unit files to appropriate directory and
  run daemon-reload. Backup: `crontab -l > ~/.agentboard/backups/crontab-{Date.now()}` for
  cron; copy unit files for systemd. Input sanitization: reject if /[\n\r\0]/ matches command
  for cron; validate /^[a-zA-Z0-9][a-zA-Z0-9_-]*$/ for systemd service names.
