description: |
  Comprehensive regression tests that verify all three bugs by testing the ACTUAL
  implementations (CronManager and cronStore), not inline mock reimplementations.

  Bug 1 - Duplicate Detection (6 tests in cronDuplicateAndOpResultRegression.test.ts):
  - createCronJob throws error when identical schedule+command already exists
  - createCronJob allows jobs with same command but different schedule
  - createCronJob allows jobs with same schedule but different command
  - createCronJob detects duplicates even when existing entry is paused
  - createCronJob strips trailing comments before comparing commands
  - existing pause/resume handling in handleCronOperationResult is unchanged

  Bug 2 - Create Operation Handling (4 tests in cronDuplicateAndOpResultRegression.test.ts):
  - handleCronOperationResult handles 'create' operation with success feedback
  - handleCronOperationResult handles 'create' operation with error feedback
  - notifications array is capped at 50 entries

  Bug 3 - Flock Wrapping (8 tests in cronFlockWrapping.test.ts):
  - createCronJob wraps command with flock for mutual exclusion
  - flock lock file uses consistent jobId-based naming
  - flock uses non-blocking mode (-n flag)
  - flock wrapping preserves original command as the wrapped target
  - flock lock files use /tmp directory for cross-process visibility
  - multiple jobs get different lock files
  - jobId is computed from ORIGINAL command, not flock-wrapped version

  All 15 tests currently FAIL with the buggy code, demonstrating that the bugs
  exist. After applying the fix, all tests will PASS.

