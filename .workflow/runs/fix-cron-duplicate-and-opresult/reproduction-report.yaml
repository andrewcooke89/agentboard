notes: |
  Both bugs from the spec are confirmed and reproducible:

  Bug 1 - createCronJob() lacks duplicate detection:
  - Confirmed in cronManager.ts lines 1029-1039
  - Function reads crontab, appends new line, writes back
  - No scan for existing schedule+command pairs before append
  - Calling twice with identical args creates duplicate crontab entries

  Bug 2 - handleCronOperationResult() ignores 'create' operation:
  - Confirmed in cronStore.ts lines 196-213
  - Only handles 'pause' and 'resume' in success path
  - Error path only logs warning, never pushes notification
  - No UI feedback for create success or failure

  The 5 test failures correspond to the 2 described bugs plus 3 additional
  flock-related tests (Bug 3) that were not in the original spec but are
  tested in the same file.
