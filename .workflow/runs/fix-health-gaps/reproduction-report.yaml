reproduction_output: |
  == Live Reproduction Test Results ==

  TEST ENVIRONMENT:
  - Started backend-only server: `bun --watch src/server/index.ts`
  - No vite frontend started, no browser opened
  - No WebSocket client connected
  - Waited 35+ seconds for initial cleanup timeout

  BUG 1: Health computation unwired - REPRODUCED
  $ curl -s http://localhost:4040/api/cron-ai/health
  {"healthy":0,"warning":0,"critical":0}

  $ curl -s http://localhost:4040/api/cron-ai/jobs | python3 -c "import json,sys; jobs = json.load(sys.stdin); print(f'First job health: {jobs[0].get(\"health\")}')"
  First job health: unknown

  Evidence: handleGetJobs/handleSearchJobs/handleGetJobDetail all call
  discoverAllJobs() directly (cronAiService.ts:293-337), returning jobs
  with health='unknown' (the default from parseCrontabLines).

  BUG 2: Poll interval hardcoded - ALREADY FIXED
  - config.ts:105-108 defines cronPollIntervalMs from CRON_POLL_INTERVAL_MS env var
  - cronHandlers.ts:139 calls startPolling(config.cronPollIntervalMs)
  - Regression tests exist to guard against re-introduction

  BUG 3: Orphan cleanup gated on jobCache - REPRODUCED
  $ grep -i "cron_cleanup" /tmp/dev-server.log
  >>> NO MATCHES FOUND <<<

  The cleanup timer fired but cron_cleanup_initial log entry never appeared
  because jobCache.size === 0 (no WS client connected to populate it).

  Code path: index.ts:318-324 has `if (cronManager.jobCache.size > 0)` guard.
  jobCache is only populated by startPollingLifecycle() via onClientConnect().

  BUG 4: History pruning gated on jobCache - REPRODUCED
  Same test as Bug 3. pruneRunHistory() is in the same gated block
  (index.ts:321,331) and silently skipped for the same reason.

