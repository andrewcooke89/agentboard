fix_approach: |
  Update all three test files to use current type definitions:

  1. In baseCronJob fixtures (app.WU012.test.tsx:212-225, CronManager.WU012.test.tsx:194-207):
     - Change `source: 'cron'` to `source: 'user-crontab'`
     - Add missing required CronJob fields: scheduleHuman, scriptPath, healthReason,
       lastRunDuration, lastExitCode, consecutiveFailures, avgDuration, user,
       requiresSudo, avatarUrl, unitFile, description, linkedSessionId

  2. In baseProposal fixtures (app.WU012.test.tsx:227-239, CronManager.WU012.test.tsx:209-222):
     - Rename `type` to `operation` with valid value (e.g. 'create')
     - Remove `title` field
     - Remove `payload` object
     - Add required fields: jobId, jobName, jobAvatarUrl, diff, feedback, resolvedAt

  3. In editProposal spread (app.WU012.test.tsx:502-508):
     - Rename `type: 'edit_job'` to `operation: 'edit_frequency'`
     - Remove `title`
     - Remove `payload`, use current interface fields instead

  4. In app.WU012.test.tsx:518:
     - Change `proposals[0]?.type` to `proposals[0]?.operation`

  5. In CronManager.WU012.test.tsx:598:
     - Remove `title` from the spread override

  6. In cronStoreCreateOperation.test.ts:65:
     - Change `null` to `undefined` in handleCronOperationResult call

  Run `bun run typecheck` to verify zero type errors remain in these files.

risk_assessment: |
  LOW RISK. All changes are confined to test fixture data — no production code
  is modified. The fixes are mechanical field renames and value updates.

  Potential risks:
  - Test assertions that check `.type` need updating to `.operation` (line 518)
  - Removing `title` from proposals may affect tests that assert on title content
    (line 598 spread) — need to verify the test still makes semantic sense
  - The CronJob fixture additions (missing required fields) should use sensible
    defaults (null for nullable fields, empty string/0 for required ones)
  - If any test logic depends on the old field names for behavior verification
    (not just type compliance), the test logic itself may need updating
