title: "StepNode skipped color and ParallelGroupNode edge case handling bugs"
description: |
  Two bugs in src/client/components/PipelineDiagram.tsx ecosystem (StepNode and ParallelGroupNode):

  Bug 1 - StepNode skipped status color (StepNode.tsx:10):
  The STATUS_CLASSES map uses bg-gray-500 for the 'skipped' status but should use bg-yellow-500.
  The current mapping is: skipped: 'bg-gray-500 text-gray-300 border-gray-400'
  Expected mapping:       skipped: 'bg-yellow-500 text-gray-300 border-gray-400'
  This causes skipped steps to render with a gray background indistinguishable from cancelled
  steps, instead of the intended yellow background that visually distinguishes them.

  Bug 2 - ParallelGroupNode has 3 failures (ParallelGroupNode.tsx):
  (a) Dependency info text for pending child steps renders without spaces between inline spans.
      The rendered text is "(depends_on:independent)" but the test expects "depends_on: independent"
      with a space after the colon and before the dependency name. The JSX at line 228-229 uses
      <span>(depends_on:</span> followed immediately by the dep name spans with no whitespace.
  (b) Empty childSteps array (childSteps: []) renders "No steps" text instead of "0/0 complete".
      The progress summary at line 187 has a ternary: total === 0 ? 'No steps' : `${completed}/${total} complete`.
      The tests expect "0/0 complete" for empty arrays.
  (c) Undefined childSteps (no childSteps property) also renders "No steps" instead of "0/0 complete".
      Same root cause as (b) - the total === 0 check displays "No steps" when the tests expect
      the consistent "0/0 complete" format.

reproduction:
  steps:
    - "Run: bun test src/client/__tests__/pipelineDiagram.test.tsx"
    - "Observe 1 failure: 'applies bg-yellow-500 for skipped status' - StepNode uses bg-gray-500 instead of bg-yellow-500"
    - "Run: bun test src/client/__tests__/ParallelGroupNode.test.tsx"
    - "Observe 3 failures:"
    - "  (1) 'REQ-05: shows dependency info for pending child steps' - text has no space: '(depends_on:independent)' vs expected 'depends_on: independent'"
    - "  (2) 'handles empty childSteps array' - renders 'No steps' instead of '0/0 complete'"
    - "  (3) 'handles undefined childSteps' - renders 'No steps' instead of '0/0 complete'"
  environment: "Bun 1.3.9, TypeScript 5.x, React 18, react-test-renderer"

expected: |
  1. StepNode should use bg-yellow-500 for 'skipped' status to visually distinguish skipped
     steps from cancelled/default gray steps.
  2. ParallelGroupNode dependency info should render with proper spacing: "depends_on: independent"
     (space after colon, space before dependency name).
  3. ParallelGroupNode should render "0/0 complete" for empty childSteps arrays (not "No steps").
  4. ParallelGroupNode should render "0/0 complete" for undefined childSteps (not "No steps").

actual: |
  1. StepNode uses bg-gray-500 for 'skipped' status (line 10 of StepNode.tsx), making skipped
     steps visually identical to cancelled steps.
  2. ParallelGroupNode renders "(depends_on:independent)" without spaces due to JSX span layout
     at lines 228-255 - no whitespace between "(depends_on:" span and the dependency name spans.
  3. ParallelGroupNode renders "No steps" for empty childSteps array due to the total === 0
     ternary at line 187.
  4. ParallelGroupNode renders "No steps" for undefined childSteps due to same total === 0
     ternary at line 187.

affected_files:
  - "src/client/components/StepNode.tsx"
  - "src/client/components/ParallelGroupNode.tsx"
  - "src/client/__tests__/pipelineDiagram.test.tsx"
  - "src/client/__tests__/ParallelGroupNode.test.tsx"

severity: minor

affected_spec: "{{ affected_spec_path }}"

verdict: pass
