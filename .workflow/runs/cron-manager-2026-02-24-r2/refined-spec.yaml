schema_version: "feature_spec_v1.0"

title: "Cron & Systemd Timer Manager"

description: |
  Full cron job and systemd timer management view for agentboard. Provides a master-detail split pane
  UI for discovering, monitoring, and managing all cron jobs and systemd timers on the system. Features
  include real-time polling with incremental diffs, run history with duration tracking, log viewer with
  live tail, health/failure detection, job creation (cron quick mode + systemd advanced mode), schedule
  timeline visualization, bulk operations, user-defined tags, desktop/toast notifications, DiceBear
  avatar system, privilege escalation for system jobs, and bidirectional agentboard session integration.

tags:
  - feature
  - ui
  - backend
  - cron
  - systemd
  - timer-management

priority: medium

dependencies: []

risks:
  - id: RISK-01
    description: |
      Sudo credential handling: The system caches sudo credentials in memory for a configurable grace
      period. Incorrect handling could expose credentials. Credentials must be zeroed after expiry and
      only transmitted over WSS (TLS) connections. Plain WS (localhost dev) must log a warning.
    mitigation: |
      Cache credentials in a Uint8Array buffer (not a JS string, which is immutable and cannot be
      zeroed). Explicitly fill the buffer with zeros on expiry. Only accept credentials over WSS in
      production. Log warning for plain WS. Never persist credentials to disk or logs. The WebSocket
      message field is named 'sudoCredential' (type Uint8Array-serializable) to avoid accidental
      logging by generic JSON serializers.
  - id: RISK-02
    description: |
      System crontab modification safety: Editing /etc/crontab or systemd system units could break system
      services if done incorrectly. Accidental deletion of critical system timers is a significant risk.
    mitigation: |
      Always create backups before any modification (crontab snapshot to ~/.agentboard/backups/crontab-{timestamp},
      unit file copies to ~/.agentboard/backups/). Require explicit confirmation for all destructive operations.
      Delete operations require a confirmation dialog listing the job name. System-level unit deletion
      requires a second confirmation with an explicit warning about system impact.
  - id: RISK-03
    description: |
      Polling performance with many jobs: Systems with 100+ cron jobs and systemd timers could cause
      performance issues during discovery and diff computation, especially at the default 5-second interval.
    mitigation: |
      Cap discovery at 2 seconds timeout. Use incremental diffs to minimize WebSocket traffic. Virtualize
      or lazy-load list rendering above 100 jobs. Cap timeline projections at 500 data points. Make poll
      interval configurable (2s-30s). Pause polling when no clients are connected.
  - id: RISK-04
    description: |
      Non-systemd systems: Some Linux environments (WSL1, older distros, containers) do not have
      systemd. The systemctl commands will fail on these systems.
    mitigation: |
      Detect systemd availability at startup via `systemctl --version`. If unavailable, skip systemd
      discovery sources silently (log at debug level). The UI should still function with cron-only
      sources. The Advanced (systemd) creation mode should be hidden or disabled on non-systemd systems.

non_functional:
  performance:
    - id: REQ-91
      description: "Job discovery MUST complete within 2 seconds on a typical system with fewer than 200 jobs. Individual source discovery failures MUST be caught and logged without blocking other sources."
    - id: REQ-92
      description: "The list pane MUST render smoothly with up to 200 jobs. Groups MUST use virtualized rendering or lazy loading if the total job count exceeds 100."
    - id: REQ-93
      description: "The schedule timeline MUST render within 100ms for up to 200 jobs projected over 7 days (capped at 500 data points)."
  accessibility:
    - id: REQ-94
      description: "All interactive elements in the cron manager view (search bar, sort/filter dropdowns, group headers, job rows, control buttons, tabs, timeline, bulk action bar) MUST be keyboard-navigable. Arrow keys MUST navigate the job list. Enter MUST select a job. Tab MUST cycle through detail pane sections."
    - id: REQ-95
      description: "Status indicator dots and health badges MUST NOT be the sole means of conveying status. Each MUST also have a text label accessible to screen readers via aria-label."

