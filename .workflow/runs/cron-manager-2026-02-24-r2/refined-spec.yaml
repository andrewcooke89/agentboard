  - id: TEST-99
    description: "Avatar XSS prevention. Assert: DiceBear avatars are rendered as `<img>` elements (not inline SVG or dangerouslySetInnerHTML). Mock a DiceBear response containing `<script>` tags. Assert: no script execution occurs because `<img>` elements do not execute embedded scripts."

