description: |
  Implemented all four cron manager gaps:

  GAP-05 (Concurrent-run guard): Added server-side activeManualRuns Set in cronHandlers.ts
  that prevents duplicate manual runs of the same job. Uses try/finally pattern to ensure
  cleanup on all paths (success, error, background crash).

  GAP-06 (Cleanup scheduling): Wired cleanOrphanedPrefs() and pruneRunHistory() to periodic
  setInterval (24h) in index.ts, following the existing workflow/session cleanup pattern.
  Deferred initial cleanup runs 30s after startup, guarded by jobCache.size > 0 to prevent
  premature deletion. Interval cleared in cleanupAllTerminals shutdown handler.

  GAP-04 (Animations): Added framer-motion (motion/react) animations to all 6 cron
  components: CronJobList (row enter/exit with opacity+height), CronManager (crossfade
  between detail/empty), CronJobDetail (tab content opacity+y transitions, run output
  AnimatePresence), CronRunNowOutput (panel fade in/out), CronTimeline (staggered bar
  entrance), CronEmptyState (opacity+scale appearance). useReducedMotion gate in
  CronJobList for accessibility.

  GAP-08 (Session linking): Replaced CronSessionLink stub with real useSessionStore
  integration — dropdown shows active sessions with name and project, clicking links the
  session via WS message. Linked session chip navigates to session on click. Added managed
  toggle button in CronJobDetail that sends cron-job-set-managed WS with optimistic local
  update. Added setJobManaged/setJobLinkedSession actions to cronStore.

  Verification: typecheck passes, lint passes (0 new errors), all 11 cron-specific tests
  pass. 10 pre-existing test failures in unrelated files (orchestratorTemplates, dagEngine,
  geminiClient, UI components) — none caused by these changes.

tests_expected_to_pass: true
