summary: |
  Decomposes the Cron AI Orchestrator feature (Phase 27) into 13 atomic work units.
  The feature adds an AI assistant drawer to the cron manager view, backed by a custom
  MCP server (20+ tools), a server-side coordinator (CronAiService), and a propose-and-approve
  mutation flow. The decomposition follows a layered dependency structure:

  Layer 0 (Foundation): Shared types
  Layer 1 (Core): Store/settings, CronAiService, MCP server core
  Layer 2 (Wiring): Server integration, MCP tools, UI components
  Layer 3 (Integration): Full integration, session lifecycle

