      5. Create operation with missing required details (no command). Assert: 400 with error mentioning missing command.
      6. edit_frequency with missing schedule in details. Assert: 400 with error mentioning missing schedule.
      7. Valid proposal payload. Assert: 200/202 (proposal created, long-poll begins).

