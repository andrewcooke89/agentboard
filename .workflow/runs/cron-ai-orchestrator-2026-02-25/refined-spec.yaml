title: "Cron AI Orchestrator"

description: |
  AI-assisted cron job management layer built on top of Phase 26 (Cron & Systemd Timer Manager).
  Embeds a persistent Claude Code session in a slide-in drawer within the cron manager view, backed
  by a dedicated MCP server (20+ tools) exposing the full Phase 26 API. Provides context-aware
  bidirectional UI sync (agent knows what the user is looking at; agent can drive the UI), a
  propose-and-approve mutation flow (all writes go through human-reviewed proposal cards), proactive
  failure diagnosis, schedule optimization, natural language job creation, and startup health
  monitoring alerts. Includes a custom Claude skill file and auto-generated MCP configuration.

  The MCP server runs as a SEPARATE process spawned by Claude Code via stdio transport. It
  communicates with the agentboard server via HTTP REST API (for request-response reads) and
  WebSocket (for real-time events: context updates, proposal lifecycle, navigation commands).

tags:
  - feature
  - ui
  - backend
  - ai
  - mcp
  - cron
  - claude-code
  - orchestrator

priority: medium

dependencies:
  - "Phase 26: Cron & Systemd Timer Manager"

risks:
  - id: RISK-01
    description: |
      MCP server failures: If the cron MCP server process crashes or fails to start, the AI drawer
      will show an offline status and the agent will be unable to read or propose changes to cron
      jobs. Because the MCP server communicates via stdio (spawned by Claude Code), a crash is not
      automatically restarted.
    mitigation: |
      Display clear "MCP server offline" status in the drawer status bar. Provide a "Restart MCP"
      button in the drawer header. Log MCP server stderr to ~/.agentboard/logs/cron-mcp.log for
      debugging. Wrap all MCP tool implementations in try/catch with structured error responses.

  - id: RISK-02
    description: |
      Proposal timeout edge cases: The propose_change MCP tool blocks until the user responds or
      the proposal auto-expires. If the WebSocket connection drops between proposal creation and
      the user response, the agent will be stuck waiting and the proposal card will be orphaned
      in the UI.
    mitigation: |
      On WebSocket reconnect, the server resyncs pending proposals to the UI. The proposal timeout
      (default 5 minutes) ensures the agent is never blocked indefinitely. Track proposal state in
      server memory so reconnecting clients get the current state.

  - id: RISK-03
    description: |
      Session lifecycle conflicts: The agentboard-cron-ai tmux window is managed as an internal
      session. If a user manually kills the tmux window outside of agentboard, the server may have
      stale state showing the session as running, causing reattach failures.
    mitigation: |
      Verify tmux window existence before attaching. If the window is gone, recreate it gracefully
      and update session state. Status polling will detect the window disappearing and update to
      "offline" within one poll cycle.

  - id: RISK-04
    description: |
      Sudo through AI: The propose-and-approve flow for system-level cron jobs (requiring sudo)
      adds an extra interaction step (AI proposes, user approves, then sudo prompt). This
      multi-step flow could confuse users or lead to accidental approvals of privileged operations.
    mitigation: |
      Proposal cards for sudo-required operations MUST include a visible lock icon and explicit
      warning text. Safety guidelines in the skill file instruct the agent to warn before proposing
      deletion of system-critical jobs. The sudo password prompt from Phase 26 is always presented
      after Accept, never bypassed.

  - id: RISK-05
    description: |
      Natural language ambiguity: The agent may misinterpret vague job creation requests and
      propose incorrect commands or schedules, which a user might accept without careful review.
    mitigation: |
      Skill file mandates the agent confirm understanding before proposing. Proposal cards show
      the full config including command and human-readable schedule, giving the user a clear diff
      to review. The agent MUST ask clarifying questions when the command path is ambiguous.

  - id: RISK-06
    description: |
      AI drawer blocking performance: The xterm.js instance in the drawer runs alongside the main
      cron manager terminal and the Phase 26 polling loop, potentially causing performance
      degradation on lower-end hardware.
    mitigation: |
      The AI terminal is only attached when the drawer is open. Detach the pty when the drawer
      closes to reduce rendering overhead. Proposal card rendering is asynchronous and must not
      block terminal output.

  - id: RISK-07
    description: |
      MCP<->agentboard connection loss: The MCP server connects to agentboard via HTTP+WS. If
      agentboard restarts while the MCP server is running (e.g., during development), the MCP
      server loses its WS connection and all pending proposals become orphaned. HTTP calls will
      fail with connection refused until agentboard is back.
    mitigation: |
      MCP server MUST implement WS reconnection with exponential backoff (1s, 2s, 4s, max 30s).
      During disconnection, read tools return a structured error "agentboard server unavailable"
      instead of crashing. On WS reconnect, the MCP server re-registers as an AI client and
      receives current UI context. Pending proposals that timed out during disconnection return
      timeout errors to the agent.

  - id: RISK-08
    description: |
      AI session projectPath: SessionManager.createWindow() requires a projectPath that must exist
      on disk. The AI assistant session doesn't correspond to a user project directory.
    mitigation: |
      Use ~/.agentboard/ as the projectPath for the AI session. This directory always exists (it's
      the agentboard data directory). The session name prefix "agentboard-cron-ai" combined with
      source: 'internal' filtering ensures it doesn't pollute the regular session list.

