architecture_notes: |
  # Phase 27: Cron AI Orchestrator -- Full Design

  ## 1. Architecture Overview

  ### What It Is
  An AI assistant embedded in the cron manager view that can read, analyze, and propose changes to
  all cron jobs and systemd timers. The assistant runs as a persistent Claude Code session in a
  dedicated tmux window, connected to a custom MCP server that exposes the full Phase 26 cron
  manager API. A custom Claude skill file guides the agent's behavior.

  ### High-Level Flow
  ```
  ┌─────────────────────────────────────────────────────┐
  │ Agentboard UI (Browser)                             │
  │ ┌───────────────────────┐  ┌──────────────────────┐ │
  │ │ Cron Manager View     │  │ AI Drawer (overlay)  │ │
  │ │ (Phase 26)            │  │ ┌──────────────────┐ │ │
  │ │ ┌─────┐ ┌───────────┐│  │ │ xterm.js terminal│ │ │
  │ │ │List │ │Detail tabs ││◄─┼─│ (Claude Code)    │ │ │
  │ │ └─────┘ └───────────┘│  │ │                  │ │ │
  │ └───────────────────────┘  │ │ [Proposal Cards] │ │ │
  │                            │ └──────────────────┘ │ │
  │                            └──────────────────────┘ │
  └──────────────────────┬──────────────────────────────┘
                         │ WebSocket
  ┌──────────────────────▼──────────────────────────────┐
  │ Agentboard Server (Hono)                            │
  │ ┌──────────────┐  ┌──────────────┐  ┌────────────┐ │
  │ │ CronManager  │  │ SessionMgr   │  │CronAiSvc   │ │
  │ │ (Phase 26)   │  │ (tmux)       │  │(coordinator)│ │
  │ └──────┬───────┘  └──────────────┘  └─────┬──────┘ │
  │        │                                   │        │
  │        └───────────────┬───────────────────┘        │
  │                        │ HTTP API + WS              │
  │ ┌──────────────────────▼─────┐                      │
  │ │ Cron MCP Server            │◄── Claude Code       │
  │ │ (SEPARATE PROCESS)         │    (in tmux window)  │
  │ │ - stdio transport to Claude│                      │
  │ │ - HTTP+WS to agentboard   │                      │
  │ └────────────────────────────┘                      │
  └─────────────────────────────────────────────────────┘
  ```

  ### Key Architectural Decisions
  1. **Persistent tmux session**: The AI runs in a dedicated tmux window (`agentboard-cron-ai`)
     managed by agentboard's existing SessionManager. Survives browser reloads. Conversation
     history preserved.
  2. **MCP server (stdio + HTTP/WS)**: A dedicated MCP server process that Claude Code connects to
     via stdio. The MCP server is a SEPARATE PROCESS spawned by Claude Code. It communicates back
     to agentboard via HTTP REST API (for request-response data reads) and WebSocket (for real-time
     events: UI context updates, proposal lifecycle, navigation commands).
  3. **Propose + approve**: All mutations (create, edit, pause, resume, delete) go through a
     proposal queue managed by the agentboard server's CronAiService. The agent calls a
     `propose_change` MCP tool which sends a proposal to agentboard via HTTP, which renders a card
     in the UI. Human clicks Accept/Reject. Only then does the mutation execute.
  4. **Context-aware + bidirectional sync**: The agentboard server pushes UI context changes to the
     MCP server via WebSocket. The agent can call navigation tools which send commands from the MCP
     server to agentboard via WebSocket, which forwards them to the UI.
  5. **Custom Claude skill**: A skill file generated at `~/.agentboard/skills/cron-manager.md` that
     primes the agent with its role, available tools, approval workflow, and proactive behaviors.
     Injected via the `--system-prompt` flag when launching Claude Code.
  6. **CronAiService coordinator**: A new server-side service (`src/server/cronAiService.ts`) that
     acts as the bridge between the MCP server process and the rest of agentboard. Manages the
     proposal queue, tracks UI context state, handles MCP server WS connections, and routes
     messages between the MCP server and UI clients.

  ---

  ## 2. AI Drawer Component

  ### What It Is
  A slide-in overlay drawer (from the right edge) containing the Claude Code terminal session and
  proposal cards. Same pattern as the TaskQueue panel but rendered as an overlay.

  ### Layout
  - **Toggle**: Button in the cron manager header bar (brain/sparkle icon) + keyboard shortcut
    `Cmd+Shift+A` / `Ctrl+Shift+A`
  - **Width**: 480px default, resizable (360-640px)
  - **Header**: "AI Assistant" title, session status indicator (working/waiting/offline),
    "New Conversation" button, close button
  - **Terminal area**: xterm.js instance (SEPARATE from the main terminal view) connected to the
    persistent tmux window. Scrollable. Uses the same xterm.js library and addon configuration
    as Terminal.tsx but is its own component and instance.
  - **Proposal cards**: Rendered inline in the terminal output stream (injected as HTML overlays
    positioned at the correct scroll offset). Each card shows:
    - Operation type badge (Create / Edit / Pause / Resume / Delete)
    - Job name + avatar
    - Diff preview (what will change)
    - Reasoning summary (from the agent)
    - Accept / Reject buttons
    - Timestamp
  - **Status bar**: Bottom bar showing: connected MCP server status, currently selected job
    context, proposal queue count

  ### Terminal Session Lifecycle
  1. When the drawer is first opened, agentboard checks if a `agentboard-cron-ai` tmux window
     exists.
  2. If not, it creates one via SessionManager.createWindow() with projectPath=`~/.agentboard/`
     and a preconfigured command that launches Claude Code with the cron MCP server configured.
  3. The terminal attaches to this window (same `terminal-attach` flow as the main view).
  4. On browser reload: the tmux window persists. Reopening the drawer reattaches.
  5. "New Conversation" button: kills the existing tmux window, creates a fresh one. Old
     conversation is gone (tmux scrollback is the only history).

  ### Startup Command
  ```bash
  claude --mcp-config ~/.agentboard/mcp/cron-manager.json \
         --system-prompt "$(cat ~/.agentboard/skills/cron-manager.md)" \
         --allowedTools "mcp__cron-manager__*" \
         --resume
  ```

  The MCP config and skill files are generated/managed by agentboard (see sections 3 and 4).
  The `--resume` flag resumes the previous conversation if one exists.

  ---

  ## 3. Cron MCP Server

  ### What It Is
  A dedicated MCP server that exposes the full Phase 26 cron manager API as tools. Runs as a
  SEPARATE child process spawned by Claude Code, communicating with Claude via stdio and with
  the agentboard server via HTTP REST API and WebSocket.

  ### Server Location
  ```
  src/server/mcp/cronMcpServer.ts  -- MCP server implementation
  ```

  ### Transport
  - **To Claude Code**: stdio (JSON-RPC). Reads from stdin, writes to stdout.
  - **To agentboard server**: HTTP REST API for request-response data reads + WebSocket for
    real-time events. Connection details from environment variables:
    - `AGENTBOARD_URL` — HTTP base URL (e.g., `http://localhost:4040`)
    - `AGENTBOARD_WS` — WebSocket URL (e.g., `ws://localhost:4040/ws`)
    - `AGENTBOARD_AUTH_TOKEN` — Optional auth token

  ### Communication Protocol (MCP Server <-> Agentboard)

  #### HTTP API (request-response reads)
  The MCP server calls agentboard's HTTP API for data reads. These routes are served by
  CronAiService and registered on the Hono app.

  ```
  GET  /api/cron-ai/jobs                         → CronJob[] (all jobs)
  GET  /api/cron-ai/jobs?group=:group            → CronJob[] (filtered by group)
  GET  /api/cron-ai/jobs/search?q=:query         → CronJob[] (search results)
  GET  /api/cron-ai/jobs/:id                     → CronJobDetail
  GET  /api/cron-ai/jobs/:id/history?limit=:n    → JobRunRecord[]
  GET  /api/cron-ai/jobs/:id/logs?lines=:n       → string[] (log lines)
  GET  /api/cron-ai/health                       → { healthy: n, warning: n, critical: n }
  GET  /api/cron-ai/health/failing               → CronJob[] (warning + critical only)
  GET  /api/cron-ai/schedule/conflicts            → ScheduleConflict[]
  GET  /api/cron-ai/schedule/load                 → ScheduleLoadAnalysis
  GET  /api/cron-ai/jobs/:id/duration-trends      → DurationTrendData
  GET  /api/cron-ai/context                       → UiContext (current snapshot)
  GET  /api/cron-ai/sessions                      → Session[] (active agentboard sessions)
  POST /api/cron-ai/proposals                     → ProposalResult (long-polls until resolved)
  ```

  #### WebSocket (real-time events)
  The MCP server connects to agentboard's WebSocket as a special client (identified by a
  `client-type: cron-ai-mcp` header or initial handshake message). It receives:

  ```typescript
  // Agentboard -> MCP Server (push events)
  { type: 'cron-ai-context-update', context: UiContext }
  { type: 'cron-ai-proposal-resolved', proposalId: string, approved: boolean, feedback?: string }

  // MCP Server -> Agentboard (commands)
  { type: 'cron-ai-navigate', action: 'select_job', jobId: string }
  { type: 'cron-ai-navigate', action: 'switch_tab', tab: string }
  { type: 'cron-ai-navigate', action: 'show_timeline' }
  { type: 'cron-ai-navigate', action: 'filter', filter: object }
  { type: 'cron-ai-mcp-register', authToken?: string }  // initial handshake (token required if AGENTBOARD_AUTH_TOKEN configured)
  ```

  ### Tools (20+)

  #### Read Tools (no approval needed)

  ```typescript
  // Job listing and search
  list_jobs()                          // List all jobs with status, health, schedule
  list_jobs_by_group(group: string)    // List jobs in a specific project group
  search_jobs(query: string)           // Search by name, command, tag, or group
  get_job_detail(jobId: string)        // Full detail for a specific job

  // History and logs
  get_run_history(jobId: string, limit?: number)   // Past executions with exit codes, durations
  get_job_logs(jobId: string, lines?: number)      // Recent log output
  get_log_snippet(jobId: string, runTimestamp: string) // Logs for a specific run

  // Health and analysis
  get_health_summary()                 // Overview of all job health statuses
  get_failing_jobs()                   // List jobs with health: warning or critical
  get_schedule_conflicts()             // Find jobs with overlapping schedules
  get_duration_trends(jobId: string)   // Duration stats and trend data
  analyze_schedule_load()              // Per-hour/day job density analysis

  // Context
  get_ui_context()                     // Currently selected job, active tab, visible filters
  get_available_sessions()             // Active agentboard sessions (for linking)
  ```

  #### Write Tools (require approval via propose_change)

  ```typescript
  // Mutations -- all go through proposal queue
  propose_change(proposal: {
    operation: 'create' | 'edit_frequency' | 'pause' | 'resume' | 'delete' | 'run_now' | 'set_tags' | 'link_session'
    jobId?: string            // null for create
    description: string       // human-readable summary of what and why
    details: Record<string, any>  // operation-specific payload
  })
  ```

  #### UI Navigation Tools

  ```typescript
  // Drive the UI from the agent
  select_job(jobId: string)            // Select a job in the list
  navigate_to_tab(tab: 'overview' | 'history' | 'logs' | 'script')  // Switch detail tab
  show_timeline()                      // Open the schedule timeline
  filter_jobs(filter: { status?: string, health?: string, tag?: string, source?: string })
  ```

  ### MCP Resources

  ```typescript
  // Dynamic resource reflecting current UI state
  resource "cron://ui/context" {
    selectedJobId: string | null
    selectedJobDetail: CronJobDetail | null  // full detail if a job is selected
    activeTab: string
    visibleJobCount: number
    filterState: { mode, source, tags }
    healthSummary: { healthy: number, warning: number, critical: number }
  }

  // Static resource with skill guidance (for agent self-reference)
  resource "cron://skill/guidelines" {
    // Contents of the skill file, so the agent can re-read its instructions
  }
  ```

  ### Proposal Queue

  The proposal queue is managed by CronAiService on the agentboard server (NOT in the MCP server
  process). When the agent calls `propose_change`:

  1. MCP server sends HTTP POST to `/api/cron-ai/proposals` with the proposal payload
  2. CronAiService validates the proposal, assigns an ID, stores it in memory
  3. CronAiService sends a WebSocket message to UI clients:
     `{ type: 'cron-ai-proposal', proposal: { id, operation, jobId, description, details, diff } }`
  4. The UI renders the proposal as an inline card in the drawer's terminal area
  5. The HTTP request long-polls (CronAiService holds the response open)
  6. When the user clicks Accept: CronAiService executes the mutation via CronManager, returns
     `{ success: true, result: ... }` to the HTTP response
  7. When the user clicks Reject: CronAiService returns
     `{ success: false, rejected: true, feedback: string }` to the HTTP response
  8. **Timeout**: If no response within the configured timeout (default 5 minutes), CronAiService
     returns `{ success: false, expired: true }` to the HTTP response
  9. In all cases, CronAiService also sends a `cron-ai-proposal-resolved` WS message

  ### Diff Generation
  For each proposal type, generate a human-readable diff:
  - **Create**: Show the full job config that will be created
  - **Edit frequency**: Show `old schedule -> new schedule` with human-readable form
  - **Pause/Resume**: Show `current status -> new status`
  - **Delete**: Show the full job that will be removed
  - **Set tags**: Show `old tags -> new tags`

  ---

  ## 4. Claude Skill File

  ### What It Is
  A generated skill file (`~/.agentboard/skills/cron-manager.md`) that primes the AI agent with its
  role, capabilities, behavioral guidelines, and proactive patterns. Injected as the system prompt
  when launching Claude Code via `--system-prompt "$(cat ~/.agentboard/skills/cron-manager.md)"`.

  ### Skill File Location
  Generated by agentboard at: `~/.agentboard/skills/cron-manager.md`

  ### Skill Content

  #### Role
  You are a cron job management assistant embedded in Agentboard. You help the user manage their
  cron jobs and systemd timers through natural conversation.

  #### Context Awareness
  - Always check `get_ui_context()` at the start of a conversation to understand what the user is
    looking at.
  - When the user says "this job" or "it", they mean the currently selected job.
  - Use `select_job` and `navigate_to_tab` to guide the user's attention when referencing specific
    jobs.

  #### Proactive Behaviors

  **Failure Diagnosis** (trigger: user asks "why is this failing?" or agent notices a critical job):
  1. Call `get_job_detail` + `get_run_history` + `get_job_logs`
  2. Analyze the exit codes, log patterns, and error messages
  3. Suggest likely causes (permission issues, missing dependencies, disk space, network, script bugs)
  4. If fixable (e.g., wrong path), propose a change. If not (e.g., external service down),
     explain and suggest monitoring.

  **Schedule Optimization** (trigger: user asks for optimization or agent detects contention):
  1. Call `analyze_schedule_load` + `get_schedule_conflicts`
  2. Identify peak hours, overlapping jobs, resource contention
  3. Suggest rescheduling with specific new times and reasoning
  4. Propose changes one at a time via `propose_change`

  **Natural Language Job Creation** (trigger: user describes a job in plain English):
  1. Parse the intent: what command, what schedule, what name
  2. Confirm understanding with the user
  3. Propose creation via `propose_change` with the full config

  **Health Monitoring** (trigger: at conversation start if any jobs are unhealthy):
  1. Call `get_failing_jobs` and `get_health_summary`
  2. Proactively report: "I notice 2 jobs are failing: {names}. Want me to investigate?"
  3. Only report once per conversation start (don't nag)

  #### Approval Workflow
  - **Never** execute mutations directly. Always use `propose_change`.
  - Include clear reasoning in every proposal description.
  - If a proposal is rejected, ask the user what they'd prefer instead.
  - For multi-step changes (e.g., rescheduling 5 jobs), propose one at a time or ask if the user
    wants to batch-approve.

  #### Safety Guidelines
  - Warn before proposing deletion of system-critical jobs (logrotate, apt-daily, etc.)
  - When proposing schedule changes, check for conflicts with the new schedule first
  - For jobs requiring sudo, mention that the UI will prompt for a password
  - Never suggest disabling all monitoring/health-check jobs simultaneously

  #### Tone
  - Concise, practical, slightly informal
  - Lead with the answer, explain after if needed
  - Use job names (not IDs) when talking to the user
  - When showing schedules, always include both the cron expression and the human-readable form

  ---

  ## 5. Bidirectional UI Sync

  ### What It Is
  The agent and the UI stay synchronized: the agent knows what the user is looking at, and the
  agent can drive the UI.

  ### UI -> Agent (Context Awareness)
  - CronAiService maintains a live `uiContext` object that updates whenever the user:
    - Selects a different job
    - Switches tabs
    - Changes filters
    - Opens/closes the timeline
  - The MCP server receives context updates via WebSocket push from CronAiService.
  - The agent can read the latest context via `get_ui_context()` tool (HTTP GET to
    `/api/cron-ai/context`) or the `cron://ui/context` resource.
  - Implementation: The UI client sends `cron-ai-context-update` WebSocket messages to agentboard.
    CronAiService updates its internal state and forwards to the MCP server's WS connection.

  ### Agent -> UI (Navigation)
  - The agent calls navigation tools (`select_job`, `navigate_to_tab`, `show_timeline`,
    `filter_jobs`) which the MCP server sends as WebSocket messages to agentboard.
  - CronAiService forwards these as `cron-ai-navigate` messages to UI clients.
  - The UI applies them to the cronStore (Zustand).

  ### Sync Protocol (WebSocket messages)

  ```typescript
  // UI Client -> Agentboard Server (context updates)
  { type: 'cron-ai-context-update', selectedJobId: string | null, activeTab: string, filters: object }

  // Agentboard Server -> MCP Server WS (forwarded context)
  { type: 'cron-ai-context-update', context: { selectedJobId, activeTab, filters, healthSummary } }

  // MCP Server WS -> Agentboard Server (navigation commands)
  { type: 'cron-ai-navigate', action: 'select_job', jobId: string }
  { type: 'cron-ai-navigate', action: 'switch_tab', tab: string }
  { type: 'cron-ai-navigate', action: 'show_timeline' }
  { type: 'cron-ai-navigate', action: 'filter', filter: object }

  // Agentboard Server -> UI Client (forwarded navigation)
  { type: 'cron-ai-navigate', action: string, payload: Record<string, any> }

  // Agentboard Server -> UI Client (proposals)
  { type: 'cron-ai-proposal', proposal: { id, operation, jobId, description, details, diff } }

  // UI Client -> Agentboard Server (proposal responses)
  { type: 'cron-ai-proposal-response', proposalId: string, approved: boolean, feedback?: string }

  // Agentboard Server -> MCP Server WS (proposal resolution - also returned via HTTP)
  { type: 'cron-ai-proposal-resolved', proposalId: string, approved: boolean, feedback?: string }
  ```

  ---

  ## 6. Proposal Card Component

  ### What It Is
  A rich inline card rendered within the AI drawer's terminal area when the agent proposes a change.

  ### Visual Design
  ```
  ┌─────────────────────────────────────────────┐
  │ 🔧 Edit Frequency                           │
  │                                             │
  │ ┌─────┐ daily-backup                        │
  │ │ 🤖  │ Move to 4am to avoid log rotation   │
  │ └─────┘                                     │
  │                                             │
  │ Schedule: 0 3 * * *  →  0 4 * * *          │
  │           "At 3 AM"     "At 4 AM"           │
  │                                             │
  │         [ Accept ]  [ Reject ]              │
  │                                    2m ago   │
  └─────────────────────────────────────────────┘
  ```

  ### Implementation
  - Proposal cards are **not** terminal text -- they are React components overlaid on the terminal
    at the correct scroll position.
  - The terminal output includes a marker line (e.g., `<!-- PROPOSAL:abc123 -->`) that the UI
    detects and replaces with the card component.
  - Cards remain interactive (clickable buttons) even after scrolling up.
  - Accepted proposals show a green "Approved" badge. Rejected show red "Rejected" with user
    feedback.
  - Cards are persisted in the Zustand store so they survive re-renders.

  ### Card States
  | State    | Visual                                                    |
  |----------|-----------------------------------------------------------|
  | Pending  | Blue border, Accept/Reject buttons active                 |
  | Accepted | Green border, "Approved" badge, buttons disabled          |
  | Rejected | Red border, "Rejected" badge with feedback, buttons disabled |
  | Expired  | Gray border, "Expired (no response)" badge               |

  ---

  ## 7. MCP Configuration Generation

  ### What It Is
  Agentboard generates the MCP config file that Claude Code uses to connect to the cron MCP server.

  ### Config File
  Generated at: `~/.agentboard/mcp/cron-manager.json`

  ```json
  {
    "mcpServers": {
      "cron-manager": {
        "command": "bun",
        "args": ["run", "/absolute/path/to/agentboard/src/server/mcp/cronMcpServer.ts"],
        "env": {
          "AGENTBOARD_URL": "http://localhost:4040",
          "AGENTBOARD_WS": "ws://localhost:4040/ws",
          "AGENTBOARD_AUTH_TOKEN": "..."
        }
      }
    }
  }
  ```

  ### Generation Lifecycle
  - Config is generated when agentboard starts (if not already present, or if the agentboard port
    changed).
  - The `AGENTBOARD_URL` and `AGENTBOARD_WS` values come from the server's actual bind address.
  - The auth token (if configured) is included so the MCP server can authenticate with agentboard.
  - The file MUST be written with 0600 permissions (owner read/write only) since it may contain
    an auth token.

  ---

  ## 8. Session Management Integration

  ### What It Is
  Integration with agentboard's existing SessionManager to manage the AI assistant's tmux window.

  ### Session Details
  - **Window name**: `agentboard-cron-ai`
  - **Project path**: `~/.agentboard/` (satisfies SessionManager.createWindow() requirement)
  - **Window management**: Created via `SessionManager.createWindow('~/.agentboard/',
    'agentboard-cron-ai', startupCommand)` when the drawer first opens. Killed via
    `SessionManager.killWindow()` when "New Conversation" is clicked.
  - **Auto-start**: The tmux window is NOT auto-started on agentboard boot. Only created on first
    drawer open.
  - **Visibility**: The AI session does NOT appear in the main session list. Filtered out by
    checking if the session name starts with `agentboard-` prefix (internal sessions).
  - **Status tracking**: The AI session's status (working/waiting) is tracked and displayed in
    the drawer header, using the same log-polling mechanism as regular sessions.
  - **Shutdown cleanup**: On graceful agentboard shutdown (SIGTERM/SIGINT), the `agentboard-cron-ai`
    tmux window MUST be killed. On crash (SIGKILL, unexpected exit), the window persists — it will
    be detected and reattached on next agentboard startup if the drawer is opened.

  ### Claude Code Launch
  The tmux window runs:
  ```bash
  claude --mcp-config ~/.agentboard/mcp/cron-manager.json \
         --system-prompt "$(cat ~/.agentboard/skills/cron-manager.md)" \
         --allowedTools "mcp__cron-manager__*" \
         --resume
  ```

  ---

  ## 9. Proactive Behaviors

  ### What It Is
  The agent doesn't just respond to questions -- it proactively offers help based on the current
  state of the cron system.

  ### Startup Greeting
  When the conversation starts (or a new conversation is created), the agent:
  1. Calls `get_health_summary()` and `get_failing_jobs()`
  2. If unhealthy jobs exist: "I see 2 jobs are having issues: **daily-backup** (failed 3x in a
     row) and **log-cleanup** (missed its last scheduled run). Want me to investigate?"
  3. If all healthy: "All 15 jobs are healthy. What can I help with?"
  4. Calls `get_ui_context()` to see if a job is already selected and references it: "I see you
     have **daily-backup** selected. It's currently healthy, running every day at 3 AM."

  ### Failure Diagnosis Flow
  When the user asks about a failing job (or the agent proactively investigates):
  1. `get_job_detail(jobId)` -- get full config
  2. `get_run_history(jobId, 10)` -- last 10 runs
  3. `get_job_logs(jobId, 100)` -- recent output
  4. Analyze patterns:
     - Exit code patterns (e.g., always 127 = command not found, 1 = script error, 137 = OOM killed)
     - Log content (permission denied, file not found, connection refused, disk full)
     - Timing patterns (fails only at certain times = resource contention?)
  5. Present diagnosis with confidence level and suggested fix
  6. If the fix is a config change (e.g., wrong path, bad schedule), propose it via `propose_change`

  ### Schedule Optimization Flow
  When the user asks for optimization or the agent detects issues:
  1. `analyze_schedule_load()` -- per-hour density
  2. `get_schedule_conflicts()` -- overlapping jobs
  3. `get_duration_trends()` for heavy jobs
  4. Identify:
     - Peak hours with too many concurrent jobs
     - Jobs that could be spread across off-peak hours
     - Long-running jobs that overlap with other long-running jobs
  5. Propose rescheduling one at a time, explaining the reasoning

  ### Natural Language Job Creation Flow
  When the user says something like "run my backup every night at 3am":
  1. Parse: command = context-dependent (ask if unclear), schedule = `0 3 * * *`
  2. Confirm: "I'll create a cron job that runs `/home/user/backup.sh` every day at 3:00 AM.
     Sound right?"
  3. On confirmation: `propose_change({ operation: 'create', ... })`
  4. After approval: job is created, agent auto-selects it in the UI

  ### Health Monitoring
  The agent checks health at conversation start and can be asked to do periodic checks:
  - "Keep an eye on my jobs" -> agent periodically (every few messages) checks
    `get_health_summary()` and reports changes
  - "Alert me if anything breaks" -> agent sets up a monitoring note and checks at conversation
    start

  ---

  ## 10. Frontend Store Extensions

  ### What It Is
  Extensions to the Zustand store for AI drawer state.

  ### New Store: `src/client/stores/cronAiStore.ts`

  ```typescript
  interface CronAiState {
    // Drawer state
    drawerOpen: boolean
    drawerWidth: number             // 360-640px, default 480
    sessionStatus: 'offline' | 'starting' | 'working' | 'waiting'
    sessionWindowId: string | null  // tmux window ID

    // Proposals
    proposals: CronAiProposal[]
    pendingProposalCount: number

    // Settings
    autoStartSession: boolean       // whether to start AI session on drawer open (default: true)
  }

  interface CronAiProposal {
    id: string
    operation: 'create' | 'edit_frequency' | 'pause' | 'resume' | 'delete' | 'run_now' | 'set_tags' | 'link_session'
    jobId: string | null
    jobName: string | null
    jobAvatarUrl: string | null
    description: string
    diff: string                    // human-readable diff
    status: 'pending' | 'accepted' | 'rejected' | 'expired'
    feedback: string | null         // user feedback on rejection
    createdAt: string
    resolvedAt: string | null
  }
  ```

  Persisted keys: `drawerWidth`, `autoStartSession`

  ### New Components

  ```
  src/client/components/cron/
    CronAiDrawer.tsx          -- slide-in drawer container
    CronAiHeader.tsx          -- drawer header with status, new conversation, close
    CronAiTerminal.tsx        -- xterm.js instance for the AI session (separate from main Terminal)
    CronAiProposalCard.tsx    -- inline proposal card with accept/reject
    CronAiStatusBar.tsx       -- bottom bar with MCP status, context, queue count
  ```

  ---

  ## 11. WebSocket Protocol Extensions

  ### Server Messages (additions to Phase 26 protocol)

  ```typescript
  // AI proposal from CronAiService
  { type: 'cron-ai-proposal', proposal: CronAiProposal }

  // AI navigation command (forwarded from MCP server)
  { type: 'cron-ai-navigate', action: string, payload: Record<string, any> }

  // AI session status
  { type: 'cron-ai-session-status', status: 'offline' | 'starting' | 'working' | 'waiting' }

  // MCP server connection status
  { type: 'cron-ai-mcp-status', connected: boolean }
  ```

  ### Client Messages

  ```typescript
  // Open/close AI drawer (triggers session creation if needed)
  { type: 'cron-ai-drawer-open' }
  { type: 'cron-ai-drawer-close' }

  // New conversation (kill + recreate session)
  { type: 'cron-ai-new-conversation' }

  // Proposal response
  { type: 'cron-ai-proposal-response', proposalId: string, approved: boolean, feedback?: string }

  // Context update (sent on job selection, tab change, filter change)
  { type: 'cron-ai-context-update', context: { selectedJobId, activeTab, filters } }
  ```

  ---

  ## 12. Settings Integration

  ### New Settings (in `settingsStore`)

  | Setting                | Type    | Default | Description                                           |
  |------------------------|---------|---------|-------------------------------------------------------|
  | `cronAiEnabled`        | boolean | true    | Whether the AI assistant feature is available         |
  | `cronAiDrawerWidth`    | number  | 480     | Drawer width in px (360-640)                          |
  | `cronAiAutoGreet`      | boolean | true    | Whether the agent proactively reports health on startup |
  | `cronAiProposalTimeout`| number  | 300000  | Auto-reject proposals after N ms (default: 5 min)    |

  ---

  ## 13. CronAiService (NEW - Server-Side Coordinator)

  ### What It Is
  A server-side service that acts as the bridge between the MCP server process and the rest of
  agentboard. It owns the proposal queue, UI context state, and MCP server WS connection management.

  ### Location
  ```
  src/server/cronAiService.ts
  ```

  ### Responsibilities
  1. **HTTP API**: Serves `/api/cron-ai/*` routes that the MCP server calls
  2. **Proposal queue**: Stores pending proposals in memory, manages timeouts, executes approved
     mutations via CronManager
  3. **UI context**: Maintains current UI state (selected job, active tab, filters), updated by
     UI client WS messages, readable by MCP server via HTTP or WS
  4. **MCP server WS management**: Tracks the MCP server's WebSocket connection (separate from UI
     client connections), forwards context updates and proposal resolutions
  5. **Navigation forwarding**: Receives navigation commands from MCP server WS, forwards to UI
     client WS connections
  6. **Config generation**: Generates MCP config and skill files at startup

  ### Dependencies
  - `CronManager` (Phase 26) — for executing approved mutations and reading job data
  - `SessionManager` — for creating/managing the AI tmux window
  - `CronHistoryService` — for run history queries
  - `CronLogService` — for log queries

  ---

  ## Related Phases

  | Phase                     | Relationship                                                      |
  |---------------------------|-------------------------------------------------------------------|
  | Phase 26 (Cron Manager)   | Hard dependency. Provides all cron CRUD operations, job discovery,|
  |                           | health detection, WebSocket protocol, and UI components that this |
  |                           | phase wraps with AI.                                              |
  | Phase 15 (UI Enhancements)| Provides drawer/overlay UI patterns (TaskQueue) that the AI       |
  |                           | drawer follows.                                                   |

  ---

  ## Key Source Cross-References

  | Topic                    | Source                                       | Notes                                    |
  |--------------------------|----------------------------------------------|------------------------------------------|
  | Phase 26 cron manager API| src/server/cronManager.ts                    | All operations exposed as MCP tools      |
  | Existing terminal component | src/client/components/Terminal.tsx        | xterm.js patterns for the drawer terminal |
  | TaskQueue panel pattern  | src/client/components/TaskQueue.tsx          | Panel layout pattern (not overlay)       |
  | Session management       | src/server/SessionManager.ts                 | Creating/managing the AI tmux window     |
  | MCP server patterns      | Claude Code docs                             | stdio transport, tool definitions        |
  | WebSocket protocol       | src/shared/types.ts                          | Discriminated union message types        |
  | WS handler registry      | src/server/wsRouter.ts                       | WsHandlers interface for message dispatch|
  | Cron store               | src/client/stores/cronStore.ts               | State shape and actions for AI to drive  |
  | Toast system             | src/client/components/Toast.tsx              | For AI notification toasts               |

acceptance:
  # --- AI Drawer (REQ-01 through REQ-09) ---

  - id: REQ-01
    type: behavioral
    description: "The cron manager view MUST include a slide-in drawer (from the right edge) togglable via a button in the header bar and keyboard shortcut `Cmd+Shift+A` / `Ctrl+Shift+A`. The drawer MUST render as an overlay that does not reflow the main content."

  - id: REQ-02
    type: behavioral
    description: "The drawer MUST have a default width of 480px, resizable between 360-640px. The width MUST persist across sessions via the Zustand store."

  - id: REQ-03
    type: behavioral
    description: "The drawer MUST contain: a header (title, session status indicator, 'New Conversation' button, close button), an xterm.js terminal area connected to the AI session, and a status bar showing MCP connection status and currently selected job context."

  - id: REQ-04
    type: behavioral
    description: "The drawer MUST NOT block interaction with the cron manager list and detail panes behind it. The user MUST be able to click jobs in the list while the drawer is open."

  - id: REQ-05
    type: behavioral
    description: "The AI assistant MUST run as a persistent Claude Code session in a dedicated tmux window named `agentboard-cron-ai`. The session MUST survive browser reloads and tab closures."

  - id: REQ-06
    type: behavioral
    description: "When the drawer is opened for the first time, agentboard MUST create the tmux window via SessionManager.createWindow() with projectPath=`~/.agentboard/` and a command that launches Claude Code with the cron MCP server configured. If the window already exists (e.g., from a previous browser session), the drawer MUST reattach to it."

  - id: REQ-07
    type: invariant
    description: "The AI session MUST NOT appear in the main session list. It MUST be filtered out by checking if the session name starts with `agentboard-` prefix (internal sessions)."

  - id: REQ-08
    type: behavioral
    description: "The 'New Conversation' button MUST kill the existing tmux window, create a fresh one, and reattach the terminal. A confirmation dialog MUST be shown before destroying the existing conversation."

  - id: REQ-09
    type: behavioral
    description: "The drawer header MUST display the AI session's status: `offline` (no session), `starting` (session launching), `working` (agent processing), `waiting` (agent idle/ready for input). Status MUST update in real-time using the same log-polling mechanism as regular sessions."

  # --- MCP Server (REQ-10 through REQ-16) ---

  - id: REQ-10
    type: contract
    description: "A dedicated MCP server MUST be implemented at `src/server/mcp/cronMcpServer.ts` using the MCP TypeScript SDK with stdio transport. The server runs as a SEPARATE PROCESS spawned by Claude Code and communicates with agentboard via HTTP REST API and WebSocket."

  - id: REQ-11
    type: contract
    description: "The MCP server MUST expose at minimum the following read tools (no approval required): `list_jobs`, `list_jobs_by_group`, `search_jobs`, `get_job_detail`, `get_run_history`, `get_job_logs`, `get_log_snippet`, `get_health_summary`, `get_failing_jobs`, `get_schedule_conflicts`, `get_duration_trends`, `analyze_schedule_load`, `get_ui_context`, `get_available_sessions`."

  - id: REQ-12
    type: contract
    description: "The MCP server MUST expose a `propose_change` tool for all mutations. The tool MUST accept: operation type, optional job ID, description (human-readable reasoning), and operation-specific details. The tool MUST block until the user responds (accept/reject) or the proposal times out. The blocking is implemented via HTTP long-poll to the agentboard server's `/api/cron-ai/proposals` endpoint."

  - id: REQ-13
    type: contract
    description: "The MCP server MUST expose UI navigation tools: `select_job`, `navigate_to_tab`, `show_timeline`, `filter_jobs`. These MUST send WebSocket messages to the agentboard server, which forwards them to UI clients to drive the cron manager UI state."

  - id: REQ-14
    type: contract
    description: "The MCP server MUST expose a `cron://ui/context` resource that reflects the currently selected job, active tab, visible filters, and health summary. This resource MUST update via WebSocket push from the agentboard server as the user interacts with the UI."

  - id: REQ-15
    type: contract
    description: "Agentboard MUST generate the MCP config file at `~/.agentboard/mcp/cron-manager.json` on server startup. The config MUST include the correct agentboard server URL, WebSocket URL, and auth token (if configured). The URL and WS values MUST use the server's actual bound address and port."

  - id: REQ-16
    type: contract
    description: "If the agentboard server port changes, the MCP config MUST be regenerated on next startup."

  # --- Proposal Queue (REQ-17 through REQ-24) ---

  - id: REQ-17
    type: invariant
    description: "All mutation operations (create, edit frequency, pause, resume, delete, run now, set tags, link session) MUST go through the proposal queue. The agent MUST NOT be able to execute mutations directly."

  - id: REQ-18
    type: contract
    description: "When the agent calls `propose_change`, the MCP server sends an HTTP POST to `/api/cron-ai/proposals`. CronAiService validates, assigns an ID, and sends a `cron-ai-proposal` WebSocket message to the UI. The UI MUST render the proposal as an inline card in the drawer's terminal area."

  - id: REQ-19
    type: behavioral
    description: "Each proposal card MUST display: operation type badge, job name and avatar (if applicable), a human-readable diff showing what will change, the agent's reasoning/description, Accept and Reject buttons, and a timestamp."

  - id: REQ-20
    type: contract
    description: "When the user clicks Accept, CronAiService MUST execute the mutation via the Phase 26 CronManager API. The result (success or error) MUST be returned to the MCP server via the HTTP long-poll response. The card MUST update to show a green 'Approved' badge."

  - id: REQ-21
    type: behavioral
    description: "When the user clicks Reject, the rejection MUST be returned to the MCP server with optional user feedback (a text input that appears on reject click). The card MUST update to show a red 'Rejected' badge with feedback."

  - id: REQ-22
    type: contract
    description: "Proposals MUST auto-expire after a configurable timeout (default: 5 minutes). Expired proposals MUST return a timeout error to the MCP server and show a gray 'Expired' badge on the card."

  - id: REQ-23
    type: invariant
    description: "The `propose_change` MCP tool MUST block (not return) until the user responds or the proposal expires. This is implemented via HTTP long-poll: the agentboard server holds the HTTP response open until resolution."

  - id: REQ-24
    type: contract
    description: |
      Each proposal MUST include a human-readable diff appropriate to the operation type:
      - Create: Full job config (command, schedule with human-readable, tags)
      - Edit frequency: '"0 3 * * *" (At 3 AM) -> "0 4 * * *" (At 4 AM)'
      - Pause/Resume: 'active -> paused' or 'paused -> active'
      - Delete: Full job summary that will be removed
      - Set tags: '["backup"] -> ["backup", "critical"]'
      - Run Now: Job name and command that will be executed

  # --- Bidirectional UI Sync (REQ-25 through REQ-34) ---

  - id: REQ-25
    type: contract
    description: "When the user selects a job in the cron manager list, the UI MUST send a `cron-ai-context-update` message to the agentboard server. CronAiService updates its internal context and forwards to the MCP server via WebSocket. The `get_ui_context()` tool and `cron://ui/context` resource MUST reflect the new selection within 500ms."

  - id: REQ-26
    type: contract
    description: "When the user switches detail tabs, changes filters, or opens/closes the timeline, the context MUST update accordingly via the same `cron-ai-context-update` path."

  - id: REQ-27
    type: behavioral
    description: "The system MUST provide the agent with sufficient context (via `get_ui_context()` and the skill file instructions) to resolve references to 'this job', 'it', or 'why is it failing?' to the currently selected job."

  - id: REQ-28
    type: behavioral
    description: "When the agent calls `select_job(jobId)`, the cron manager list MUST select and scroll to that job, and the detail pane MUST populate as if the user clicked it."

  - id: REQ-29
    type: behavioral
    description: "When the agent calls `navigate_to_tab(tab)`, the detail pane MUST switch to that tab."

  - id: REQ-30
    type: behavioral
    description: "When the agent calls `show_timeline()`, the schedule timeline MUST open (if not already visible)."

  - id: REQ-31
    type: behavioral
    description: "When the agent calls `filter_jobs(filter)`, the list MUST apply the specified filters, updating the visible job set."

  - id: REQ-32
    type: behavioral
    description: "All agent navigation actions MUST be visually smooth (no jarring jumps). The list scroll MUST animate to the selected job."

  - id: REQ-33
    type: contract
    description: "Agentboard MUST generate a Claude skill file at `~/.agentboard/skills/cron-manager.md` that defines the agent's role, available tools, approval workflow, proactive behaviors, safety guidelines, and tone."

  - id: REQ-34
