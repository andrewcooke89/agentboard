  - id: REQ-44
    type: behavioral
    description: "At conversation start (when `cronAiAutoGreet` is true), the skill file MUST instruct the agent to check health and report: number of healthy/warning/critical jobs, names of any failing jobs, and an offer to investigate."

  - id: REQ-45
    type: invariant
    description: "The health report MUST only be presented once at conversation start, not repeated unless explicitly asked."

  # --- Proposal Card UI (REQ-46 through REQ-49) ---

  - id: REQ-46
    type: contract
    description: "Proposal cards MUST be rendered as React components overlaid on the terminal output at the correct scroll position. The terminal output MUST include a marker (e.g., `<!-- PROPOSAL:id -->`) that the UI detects and replaces with the card component."

  - id: REQ-47
    type: behavioral
    description: "Proposal cards MUST remain interactive (Accept/Reject buttons clickable) even when scrolled above the current terminal viewport."

  - id: REQ-48
    type: behavioral
    description: "Accepted proposals MUST show a green border and 'Approved' badge. Rejected proposals MUST show a red border, 'Rejected' badge, and user feedback text. Expired proposals MUST show a gray border and 'Expired' badge. All resolved cards MUST have disabled buttons."

  - id: REQ-49
    type: behavioral
    description: "Proposal cards MUST be persisted in the Zustand store so they survive component re-renders and tab switches (but not browser reloads -- proposals are session-scoped)."

  # --- Settings (REQ-50 through REQ-51) ---

  - id: REQ-50
    type: behavioral
    description: "The SettingsModal 'Cron Manager' section MUST include AI-specific settings: AI assistant enabled (toggle), drawer width (slider), auto-greet on startup (toggle), and proposal timeout (slider, 1-10 min)."

  - id: REQ-51
    type: behavioral
    description: "When `cronAiEnabled` is false, the AI drawer button MUST be hidden from the cron manager header."

  # --- New Requirements (REQ-58 through REQ-67) ---

  - id: REQ-58
    type: contract
    description: "The MCP server MUST communicate with the agentboard server via HTTP REST API for request-response reads (job listings, history, logs, health, context) and WebSocket for real-time events (context updates, proposal resolutions, navigation commands). Connection details MUST be read from AGENTBOARD_URL, AGENTBOARD_WS, and AGENTBOARD_AUTH_TOKEN environment variables."

  - id: REQ-59
    type: invariant
    description: "The generated MCP config file (`~/.agentboard/mcp/cron-manager.json`) MUST be written with 0600 file permissions (owner read/write only) since it may contain an auth token."

  - id: REQ-60
    type: contract
    description: "The MCP server MUST handle agentboard server unavailability gracefully: WS reconnection with exponential backoff (1s, 2s, 4s, max 30s), HTTP retries with 3 attempts, and structured error responses to the agent (not crashes) when the server is unreachable."

  - id: REQ-61
    type: contract
    description: "The proposal queue MUST be managed by CronAiService on the agentboard server, NOT in the MCP server process. CronAiService MUST store pending proposals in memory, manage timeouts, and execute approved mutations via CronManager."

  - id: REQ-62
    type: contract
    description: "The AI session MUST use `~/.agentboard/` as the projectPath when calling SessionManager.createWindow(). This directory is guaranteed to exist as the agentboard data directory."

  - id: REQ-63
    type: contract
    description: "Each MCP tool MUST have individual unit tests with a mocked CronManager and mocked HTTP/WS clients. Tests MUST verify: correct parameters passed to CronManager methods, correct response shape returned to the agent, and error handling for CronManager failures."

  - id: REQ-64
    type: contract
    description: "CronAiService MUST expose an HTTP endpoint `GET /api/cron-ai/health` that returns `{ status: 'ok', mcpConnected: boolean, pendingProposals: number }`. The MCP server MUST call this on startup to verify connectivity."

  - id: REQ-65
    type: contract
    description: "The Claude Code startup command MUST use `--system-prompt` with the contents of the skill file. The command template MUST be: `claude --mcp-config ~/.agentboard/mcp/cron-manager.json --system-prompt \"$(cat ~/.agentboard/skills/cron-manager.md)\" --allowedTools \"mcp__cron-manager__*\" --resume`"

  - id: REQ-66
    type: invariant
    description: "The MCP server MUST NOT log or store sudo credentials. All sudo operations go through the proposal approval flow: after the user clicks Accept on a sudo-requiring proposal, CronAiService triggers the standard Phase 26 sudo prompt in the UI. The credential never passes through the MCP server."

  - id: REQ-67
    type: contract
    description: "CronAiService MUST register Hono routes under the `/api/cron-ai/` prefix in `src/server/index.ts`. All routes MUST validate the AGENTBOARD_AUTH_TOKEN if auth is configured."

  - id: REQ-68
    type: contract
    description: |
      CronAiService MUST validate proposal payloads on POST /api/cron-ai/proposals with the following rules:
      - `operation` MUST be one of: 'create', 'edit_frequency', 'pause', 'resume', 'delete', 'run_now', 'set_tags', 'link_session'. Reject unknown operations with 400.
      - For non-create operations, `jobId` MUST reference an existing job (verified via CronManager). Reject with 404 if the job does not exist.
      - For `create`, `jobId` MUST be null or omitted. Reject with 400 if jobId is provided.
      - `description` MUST be a non-empty string. Reject with 400 if missing or empty.
      - `details` MUST match the expected schema per operation type:
        - create: { command: string, schedule: string, name?: string, tags?: string[] }
        - edit_frequency: { schedule: string }
        - pause/resume/run_now/delete: {} (no required fields)
        - set_tags: { tags: string[] }
        - link_session: { sessionId: string }
      Invalid or missing details MUST be rejected with 400 and a descriptive error message.

  - id: REQ-69
    type: contract
    description: |
      When AGENTBOARD_AUTH_TOKEN is configured, the MCP server MUST include the token in its
      WebSocket handshake message: `{ type: 'cron-ai-mcp-register', authToken: '<token>' }`.
      CronAiService MUST validate the token before accepting the MCP server's WS connection.
      If the token is missing or invalid, the server MUST close the WebSocket with code 4001
      and reason 'unauthorized'. This ensures parity with HTTP API auth (REQ-67).

  - id: REQ-70
    type: contract
    description: |
      On graceful agentboard shutdown (SIGTERM or SIGINT), the server MUST kill the
      `agentboard-cron-ai` tmux window if it exists, via SessionManager.killWindow().
      On crash or SIGKILL, the window persists and will be detected and reattached on next
      startup when the drawer is opened.

