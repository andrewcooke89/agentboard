    description: "Proposal timeout configurable. Set timeout to 60 seconds. Create proposal. Wait 60s. Assert: auto-expires."

  - id: TEST-51
    type: property
    description: "Drawer keyboard toggle. `Cmd+Shift+A` opens. Same shortcut closes. Escape also closes."

  - id: TEST-52
    type: property
    description: "Tab navigation. Open drawer. Press Tab. Assert: focus cycles between terminal, proposal buttons, drawer controls."

  - id: TEST-53
    type: property
    description: "Proposal card aria labels. Render a pending proposal. Assert: card has `aria-label` describing operation type. Assert: Accept/Reject buttons have labels."

  - id: EXEC-01
    type: property
    description: |
      Open AI drawer and start conversation.
      1. Open the cron manager view.
      2. Click the AI assistant button (brain/sparkle icon) in the header, or press `Cmd+Shift+A`.
      3. Verify: Drawer slides in from the right.
      4. Verify: Terminal shows Claude Code starting (or reattaching if session exists).
      5. Verify: Header shows session status transitioning: starting -> waiting.
      6. Verify: After startup, the agent sends a greeting mentioning health status (if any unhealthy jobs exist).

  - id: EXEC-02
    type: property
    description: |
      Context awareness -- "this job".
      1. Select a job in the cron manager list (e.g., `daily-backup`).
      2. Open the AI drawer.
      3. Type: "What does this job do?"
      4. Verify: The agent responds about `daily-backup` (the selected job) without you naming it.
      5. Select a different job (e.g., `log-cleanup`).
      6. Type: "How about this one?"
      7. Verify: The agent responds about `log-cleanup`.

  - id: EXEC-03
    type: property
    description: |
      Failure diagnosis.
      1. Create a cron job with a failing command (e.g., `* * * * * /nonexistent/script.sh`).
      2. Wait for a few failures to accumulate.
      3. Select the failing job. Open AI drawer.
      4. Type: "Why is this failing?"
      5. Verify: The agent retrieves history and logs.
      6. Verify: The agent identifies "command not found" or "No such file or directory".
      7. Verify: The agent suggests fixing the path and may propose a change.

  - id: EXEC-04
    type: property
    description: |
      Propose and approve a change.
      1. Select a job with schedule `0 3 * * *`.
      2. Open AI drawer. Type: "Can you move this to 4am instead?"
      3. Verify: The agent calls `propose_change` with the new schedule.
      4. Verify: A proposal card appears inline showing: `"0 3 * * *" (At 3 AM) -> "0 4 * * *" (At 4 AM)`.
      5. Click Accept.
      6. Verify: The schedule updates in the detail pane and list.
      7. Verify: The agent acknowledges the change was applied.

  - id: EXEC-05
    type: property
    description: |
      Reject a proposal with feedback.
      1. Ask the agent to pause a job.
      2. Verify: Proposal card appears.
      3. Click Reject.
      4. Verify: A feedback text input appears.
      5. Type: "Not now, do it tonight after business hours."
      6. Verify: Card shows red "Rejected" with your feedback.
      7. Verify: The agent acknowledges the rejection and offers to schedule it for later.

  - id: EXEC-06
    type: property
    description: |
      Natural language job creation.
      1. Open AI drawer.
      2. Type: "Create a job that cleans up /tmp every Sunday at midnight."
      3. Verify: Agent confirms: something like "I'll create a cron job that runs a cleanup of /tmp every Sunday at 12:00 AM."
      4. Verify: Proposal card appears with the full job config.
      5. Accept the proposal.
      6. Verify: New job appears in the list.
      7. Verify: Agent says the job was created and selects it in the UI.

  - id: EXEC-07
    type: property
    description: |
      Schedule optimization.
      1. Create 3 cron jobs all scheduled at `0 3 * * *`.
      2. Open AI drawer.
      3. Type: "Can you optimize my schedules? There seem to be conflicts."
      4. Verify: Agent analyzes and identifies the 3am overlap.
      5. Verify: Agent proposes rescheduling one job at a time (e.g., move one to 2am, another to 4am).
      6. Accept each proposal.
      7. Verify: Schedules update. Agent confirms no more conflicts.

  - id: EXEC-08
    type: property
    description: |
      Agent navigates the UI.
      1. Open AI drawer. Type: "Show me the failing jobs."
      2. Verify: The list filter changes to "unhealthy" or "errors".
      3. Type: "Open the logs for daily-backup."
      4. Verify: `daily-backup` is selected in the list. Detail pane switches to Logs tab.
      5. Type: "Show me the schedule timeline."
      6. Verify: The timeline opens above the split pane.

  - id: EXEC-09
    type: property
    description: |
      Persistent session across reload.
      1. Open AI drawer. Have a multi-message conversation.
      2. Close the browser tab.
      3. Reopen agentboard and the cron manager view.
      4. Open the AI drawer.
      5. Verify: The previous conversation is visible in the terminal scrollback.
      6. Verify: The agent can continue the conversation with context.

  - id: EXEC-10
    type: property
    description: |
      New Conversation.
      1. Have an existing conversation in the AI drawer.
      2. Click "New Conversation".
      3. Verify: Confirmation dialog appears.
      4. Confirm.
      5. Verify: Terminal clears. New Claude Code session starts.
      6. Verify: Agent sends a fresh greeting.

  - id: EXEC-11
    type: property
    description: |
      Proposal timeout.
      1. Open AI drawer. Ask the agent to pause a job.
      2. Verify: Proposal card appears.
      3. Do NOT click Accept or Reject. Wait for the timeout (default 5 minutes, or configure shorter for testing).
      4. Verify: Card changes to gray "Expired" state.
      5. Verify: Agent receives timeout and may offer to re-propose.

  - id: EXEC-12
    type: property
    description: |
      Multiple proposals.
      1. Ask the agent to optimize schedules (which generates multiple proposals).
      2. Verify: First proposal card appears.
      3. Accept it.
      4. Verify: Second proposal appears.
      5. Reject it with feedback.
      6. Verify: Agent adapts and may propose an alternative or move to the next.

  - id: EXEC-13
    type: property
    description: |
      Sudo operation through AI.
      1. Ask the agent to pause a system-level job (requires sudo).
      2. Verify: Proposal card appears with lock icon indicating sudo required.
      3. Click Accept.
      4. Verify: Sudo password prompt appears (same as Phase 26 prompt).
      5. Enter password.
      6. Verify: Operation executes. Agent confirms.

  - id: EXEC-14
    type: property
    description: |
      AI disabled.
      1. Go to Settings > Cron Manager. Disable "AI Assistant".
      2. Open the cron manager view.
      3. Verify: The AI drawer button is NOT visible in the header.
      4. Verify: `Cmd+Shift+A` does nothing.
      5. Re-enable. Verify: Button reappears and shortcut works.

  - id: EXEC-15
    type: property
    description: |
      Health monitoring on startup.
      1. Have 1 failing job and 1 job that missed its scheduled run.
      2. Open the AI drawer (new conversation).
      3. Verify: Agent's first message mentions both issues by name.
      4. Verify: Agent offers to investigate.
      5. Type "yes" or "investigate the first one".
      6. Verify: Agent performs failure diagnosis on the specified job.
