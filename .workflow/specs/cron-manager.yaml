architecture_notes: |
  # Phase 26: Cron & Systemd Timer Manager -- Index

  > Key:location guide to all relevant design decisions for this phase.
  > Agents working on Phase 26 should load this index instead of the full planning docs.
  >
  > **Depends on**: None (standalone agentboard feature, uses existing UI patterns)
  > **Delivers**: Full cron job and systemd timer management view with list/detail split pane, run history, log viewer, health monitoring, job creation, schedule timeline, bulk operations, tags, notifications, avatar system, privilege escalation, real-time polling, and agentboard session integration
  > **LOC**: ~4200 | **Duration**: 8-12 days | **New Agents**: None
  > **Target**: `~/tools/agentboard/` (React frontend + Hono backend)
  > **Gaps Addressed**: None (new feature, not gap closure)

  ---

  ## 1. View Architecture & Navigation

  ### What It Is
  A new top-level view (`activeView: 'cron-manager'`) accessible via keyboard shortcut `Cmd+Shift+C` (or `Ctrl+Shift+C` on Linux). Follows the same navigation pattern as the workflow views -- a new entry in the view switcher, rendering a full replacement of the main content area.

  ### Layout
  Master-detail split pane (horizontal):
  - **Left pane (list)**: Grouped, searchable, scrollable list of all cron jobs and systemd timers on the system. Default width ~320px, resizable.
  - **Right pane (detail)**: Tabbed detail view for the selected job -- Overview, History, Logs, and Script tabs.

  When no job is selected, the right pane shows a **dashboard empty state** with: total job count, active/paused/error counts, a mini schedule timeline for the next 24 hours, and a "Create Job" shortcut button.

  ### Integration Points
  - `src/client/App.tsx` -- add `'cron-manager'` to `activeView` union type, add keyboard shortcut handler, render `<CronManager>` component
  - `src/shared/types.ts` -- add `CronJob`, `CronJobDetail`, `JobRunRecord`, and related WebSocket message types
  - `src/server/index.ts` -- register cron handler module, add polling interval singleton
  - `src/client/stores/cronStore.ts` -- new Zustand store for cron state

  ---

  ## 2. Job Discovery & Data Model

  ### What It Is
  Backend service that discovers all cron jobs and systemd timers on the system, unified into a single data model.

  ### Discovery Sources
  1. **User crontab** -- `crontab -l` for current user
  2. **System crontab** -- `/etc/crontab`, `/etc/cron.d/*` (requires read access or sudo)
  3. **User systemd timers** -- `systemctl --user list-timers --all --output=json`
  4. **System systemd timers** -- `systemctl list-timers --all --output=json` (may require sudo for full details)

  ### Unified Data Model

  ```typescript
  type JobSource = 'user-crontab' | 'system-crontab' | 'systemd-user' | 'systemd-system'
  type JobStatus = 'active' | 'paused' | 'disabled' | 'error' | 'unknown'
  type HealthStatus = 'healthy' | 'warning' | 'critical' | 'unknown'

  interface CronJob {
    id: string                    // deterministic hash of source + name + schedule
    name: string                  // human-readable name (unit name or inferred from command)
    source: JobSource
    schedule: string              // cron expression or systemd calendar spec
    scheduleHuman: string         // human-readable description (e.g., "Every 5 minutes")
    command: string               // the command or ExecStart value
    scriptPath: string | null     // resolved path to the script file, if applicable
    projectGroup: string          // directory of the script, or "System" for ungrouped
    status: JobStatus
    health: HealthStatus          // derived from run history analysis
    healthReason: string | null   // e.g., "Failed 3x in a row", "Missed last 2 scheduled runs"
    lastRun: string | null        // ISO timestamp
    lastRunDuration: number | null // milliseconds
    nextRun: string | null        // ISO timestamp
    lastExitCode: number | null   // exit code of last run
    consecutiveFailures: number   // 0 = healthy, >0 = count of sequential failures
    avgDuration: number | null    // rolling average duration in ms (last 10 runs)
    user: string                  // which user owns this job
    requiresSudo: boolean         // whether editing requires privilege escalation
    avatarUrl: string             // DiceBear SVG URL, deterministic from job name
    unitFile: string | null       // path to .timer/.service file (systemd only)
    description: string | null    // Description= from unit file, or comment from crontab
    tags: string[]                // user-defined tags
    isManagedByAgentboard: boolean // user-flagged as orchestration-related
    linkedSessionId: string | null // linked agentboard tmux session (by project path match)
  }

  interface CronJobDetail extends CronJob {
    scriptContent: string | null  // file content of the script (if scriptPath exists and readable)
    scriptLanguage: string | null // inferred language for syntax highlighting
    timerConfig: string | null    // raw .timer unit file content (systemd only)
    serviceConfig: string | null  // raw .service unit file content (systemd only)
    crontabLine: string | null    // raw crontab line (cron only)
    runHistory: JobRunRecord[]    // last N runs with timestamps, exit codes, duration
    recentLogs: string[]          // last N log lines from journal/syslog
  }

  interface JobRunRecord {
    timestamp: string             // ISO timestamp of when the run started
    endTimestamp: string | null   // ISO timestamp of when the run ended
    duration: number | null       // milliseconds
    exitCode: number | null       // 0 = success, non-zero = failure
    trigger: 'scheduled' | 'manual' // whether this was a scheduled or manual run
    logSnippet: string | null     // first ~500 chars of output (if available)
  }
  ```

  ### Project Grouping Logic
  1. If `scriptPath` is non-null, extract the parent directory. Use the deepest meaningful directory name as the group label (e.g., `/home/user/projects/myapp/scripts/backup.sh` -> `myapp`).
  2. If `scriptPath` is null but the command references a file path, attempt to resolve it.
  3. If no project directory can be inferred, group under **"System"**.
  4. Groups are sorted alphabetically, with "System" always last.

  ---

  ## 3. Avatar System (DiceBear)

  ### What It Is
  Each job gets a deterministic, playful avatar displayed inline next to its name in the list. Uses the DiceBear API for procedural SVG generation.

  ### Implementation
  - **URL pattern**: `https://api.dicebear.com/9.x/{style}/svg?seed={jobName}`
  - **Style**: `bottts` (robot/NFT style) as default. User can change the style globally via settings.
  - **Seed**: Job name ensures the same job always gets the same avatar.
  - **Size**: 28x28px inline in the list, 48x48px in the detail header.
  - **Caching**: Browser caches SVGs via standard HTTP cache headers. Additionally, store the URL in the `CronJob` model so the frontend doesn't need to compute it.
  - **Fallback**: If DiceBear is unreachable, render a colored circle with the first letter of the job name (same as the session list's initials fallback).
  - **Available styles** (user-selectable in settings): `bottts`, `pixel-art`, `fun-emoji`, `adventurer`, `lorelei`, `notionists`, `thumbs`

  ### Settings Integration
  Add to `settingsStore`:
  - `cronAvatarStyle: string` (default: `'bottts'`)
  - Exposed in SettingsModal under a "Cron Manager" section

  ---

  ## 4. List Pane

  ### What It Is
  The left pane showing all discovered jobs, grouped by project directory, with search, filtering, status and health indicators.

  ### Features
  - **Search/filter bar** at top (Cmd+K within the cron view focuses it)
  - **Group headers**: Collapsible project group headers showing group name, job count, and health summary (red dot if any job in group is critical)
  - **Job row**: Avatar (28x28) | Job name | Schedule (human-readable) | Health badge | Status indicator dot | Tags (if any, as small pills)
  - **Health badges**: Green checkmark = healthy, Yellow warning triangle = warning (missed run / slow), Red X = critical (consecutive failures). Tooltip shows the `healthReason`.
  - **Status dots**: Green = active, Gray = paused/disabled, Red = error, Dim = unknown
  - **"Managed by Agentboard" indicator**: Small circuit-board icon on jobs flagged as orchestration-related
  - **Sort options**: By name (default), by next run, by last run, by status, by health
  - **Filter options**: All, Active only, Paused only, Errors only, by source type, by tag, by health status
  - **Bulk selection**: Checkbox on each row (appears on hover or via "Select" toggle), Shift+click for range select
  - **Group context menu**: Right-click group header -> "Pause all in group", "Resume all in group", "Select all in group"
  - **Animations**: Entry/exit animations via `motion/react`, consistent with SessionList patterns
  - **Empty state**: "No jobs found" with helpful message about permissions if the list seems incomplete

  ### Real-Time Updates
  - Backend polls every 5 seconds (configurable via `cronPollInterval` setting)
  - On each poll, the backend diffs against the previous state and sends only changes via WebSocket
  - New jobs animate in, removed jobs animate out
  - Status changes update the dot color with a brief transition
  - Health badge updates with a brief pulse animation when degraded

  ---

  ## 5. Detail Pane

  ### What It Is
  The right pane showing full details, controls, history, and logs for the selected job. Organized as a tabbed interface.

  ### Header (always visible, above tabs)
  - Large avatar (48x48) + job name + source badge (`cron` | `systemd-user` | `systemd-system`)
  - Status badge with colored background
  - Health badge with tooltip
  - Tags displayed as removable pills, with a "+" button to add new tags
  - "Managed by Agentboard" toggle (circuit-board icon, toggleable)
  - Linked session indicator (if linked, shows session name as a clickable link that navigates to the session)

  ### Tab: Overview (default)

  #### Schedule
  - Human-readable schedule description (e.g., "Every day at 3:00 AM")
  - Raw schedule expression (cron or systemd calendar)
  - Next run timestamp (relative, e.g., "in 2 hours") with a live countdown that ticks
  - Last run timestamp (relative) + exit code badge + duration badge

  #### Controls
  - **Run Now** -- blue button that manually triggers the job immediately. Shows a spinner while running and streams output in a mini-terminal below the button. Result (exit code + duration) appears inline when done.
  - **Pause/Resume** toggle button
  - **Edit Frequency** -- opens an inline editor for the schedule expression with a human-readable preview that updates as you type
  - **Delete** -- red button with confirmation dialog ("Are you sure? This will permanently remove the job.")
  - All controls that require sudo show a lock icon and prompt for password when clicked

  #### Duration Stats
  - Last run duration
  - Average duration (rolling 10-run average)
  - Trend indicator: arrow up (getting slower) / arrow down (getting faster) / flat (stable), compared to the 10-run average. If the latest run exceeded 2x the average, show a yellow warning.

  #### Systemd Details (conditional, systemd jobs only)
  - Timer unit file content (syntax highlighted as INI)
  - Service unit file content (syntax highlighted as INI)

  #### Cron Details (conditional, cron jobs only)
  - Raw crontab line
  - Environment variables set in the crontab (if any)

  ### Tab: History

  A scrollable timeline of past job executions.

  - **Timeline view**: Vertical list, newest first. Each entry shows: timestamp, exit code badge (green 0, red non-zero), duration, trigger type (scheduled/manual).
  - **Expandable entries**: Click an entry to expand and show the `logSnippet` (first ~500 chars of output).
  - **Visual indicators**: Failure streaks highlighted with a red left-border band. The current consecutive failure count is shown at the top if > 0.
  - **Data sources**:
    - Systemd: `journalctl -u {service} --output=json --since="7 days ago"` for detailed per-invocation records
    - Cron: Parse syslog/journald for `CRON` entries matching the command. Less granular -- may only have timestamps and basic status.
  - **Pagination**: Show last 50 runs by default, "Load more" button for older history.
  - **Duration trend chart**: Small sparkline chart at the top showing duration over the last 20 runs. Helps spot gradual degradation.

  ### Tab: Logs

  Unified log viewer for the job's recent output.

  - **Systemd jobs**: `journalctl -u {service} -n 200 --no-pager` output, syntax-highlighted as log format.
  - **Cron jobs**: Parse from syslog (`grep CRON /var/log/syslog`), user mail spool (`/var/mail/{user}`), or any log file the command redirects to (detected by parsing `>>` or `>` in the command).
  - **Live tail mode**: Toggle to auto-scroll and auto-refresh (polls every 2 seconds while the tab is active). Green "Live" indicator when active.
  - **Search within logs**: Cmd+F to search/highlight within the log viewer.
  - **Copy button**: Copy all visible logs to clipboard.
  - **Line numbers**: Enabled by default, toggleable.

  ### Tab: Script

  Read-only syntax-highlighted code viewer for the job's script.

  - Language auto-detected from file extension (bash, python, node, etc.)
  - Line numbers enabled
  - "Open in Terminal" button to open the script in the user's default editor
  - If no script file is found (inline command), show the raw command in a code block
  - File path shown at the top as a breadcrumb

  ---

  ## 6. Job Management Operations

  ### What It Is
  Backend handlers for CRUD operations on cron jobs and systemd timers.

  ### Operations

  | Operation | Cron | Systemd |
  |-----------|------|---------|
  | **Run Now** | Execute the command directly via `sh -c` | `systemctl [--user] start {service}` |
  | **Pause** | Comment out line with `#AGENTBOARD_PAUSED:` prefix | `systemctl [--user] stop {unit}` + `systemctl [--user] disable {unit}` |
  | **Resume** | Remove `#AGENTBOARD_PAUSED:` prefix | `systemctl [--user] enable {unit}` + `systemctl [--user] start {unit}` |
  | **Edit frequency** | Replace schedule columns in crontab line | Write new `OnCalendar=` to timer unit, `systemctl [--user] daemon-reload` |
  | **Delete** | Remove line from crontab | `systemctl [--user] stop {unit}` + `systemctl [--user] disable {unit}` + remove unit files |
  | **Create** | Append line to crontab via `crontab -l | { cat; echo "..."; } | crontab -` | Write .timer + .service files, `daemon-reload`, `enable`, `start` |

  ### Run Now Details
  - The backend spawns the command as a child process, capturing stdout+stderr.
  - A `cron-run-started` WebSocket message is sent immediately (with a run ID).
  - Output is streamed to the client via `cron-run-output` messages (chunked, every 500ms or on completion).
  - On completion, `cron-run-completed` is sent with exit code and duration.
  - The run is recorded in `cron_run_history` DB table with `trigger: 'manual'`.
  - If the job requires sudo, privilege escalation applies to Run Now as well.
  - Only one manual run per job at a time (button disabled while running).

  ### Bulk Operations
  - **Pause all**: Iterates through selected jobs, pausing each sequentially. If any require sudo, a single password prompt covers all.
  - **Resume all**: Same pattern.
  - **Delete all**: Single confirmation dialog listing all selected jobs. Executes sequentially with individual error handling.
  - Bulk operations send a `cron-bulk-operation-progress` message for each completed sub-operation.

  ### Privilege Escalation
  - Backend detects whether an operation requires sudo based on `requiresSudo` flag
  - When sudo is needed, the frontend shows a password prompt modal
  - Password is sent over WebSocket (encrypted in transit via WSS)
  - Backend executes the command with `sudo -S` (reads password from stdin)
  - Password is held in memory for a configurable grace period (default: 5 minutes) to avoid repeated prompts
  - After the grace period, the cached password is zeroed out

  ### Safety
  - All destructive operations (delete, edit) create a backup before modification
  - Crontab edits: `crontab -l > ~/.agentboard/backups/crontab-{timestamp}` before any change
  - Systemd edits: Copy unit file to `~/.agentboard/backups/` before modification
  - Delete operations require explicit confirmation in the UI

  ---

  ## 7. Job Creation

  ### What It Is
  A form/wizard to create new cron jobs or systemd timers directly from the UI.

  ### Create Job Modal
  Triggered by a "+" button in the list pane header or from the empty state. Two modes:

  #### Quick Mode (cron)
  - **Command**: Text input for the shell command
  - **Schedule**: Text input with live human-readable preview (same as the edit schedule component)
  - **Name/Comment**: Optional descriptive name (added as a `# comment` above the crontab line)
  - **Tags**: Optional tag input
  - Creates a user crontab entry

  #### Advanced Mode (systemd)
  - **Service name**: Text input (used for `{name}.timer` and `{name}.service` file names)
  - **Command**: Text input for `ExecStart=`
  - **Schedule**: Text input for `OnCalendar=` with validation via `systemd-analyze calendar`
  - **Description**: Optional `Description=` field
  - **Working directory**: Optional `WorkingDirectory=`
  - **User scope vs System scope**: Toggle (system scope requires sudo)
  - **Tags**: Optional tag input
  - Generates `.timer` and `.service` unit files, writes them, runs `daemon-reload`, `enable`, and `start`

  ### Validation
  - Command must not be empty
  - Schedule must be valid (validated client-side for cron, server-side for systemd)
  - Service name must be a valid systemd unit name (alphanumeric + hyphens, no spaces)
  - Duplicate detection: warn if a job with the same command already exists

  ### Post-Creation
  - New job appears in the list immediately via the poll diff mechanism
  - Auto-selects the new job in the list and opens its detail pane

  ---

  ## 8. Health & Failure Detection

  ### What It Is
  Automatic health analysis based on run history, surfaced as badges and notifications.

  ### Health Heuristics

  | Condition | Health Level | Health Reason |
  |-----------|-------------|---------------|
  | Last 10 runs all succeeded | `healthy` | null |
  | Last run failed (1 failure) | `warning` | "Last run failed (exit code N)" |
  | 2+ consecutive failures | `critical` | "Failed N times in a row" |
  | No run detected in 2x the expected interval | `warning` | "Missed scheduled run (last ran X ago)" |
  | Latest run duration > 2x rolling average | `warning` | "Last run took Xm (avg: Ym)" |
  | Job in error state (systemd) | `critical` | "Unit in failed state" |
  | No run history available | `unknown` | null |

  ### Health Computation
  - Computed server-side on each poll cycle (after run history is gathered).
  - Stored in-memory on the `CronJob` object, not persisted to DB (always recomputed from live data).
  - Health changes trigger `cron-job-update` WebSocket messages like any other field change.

  ### Health Summary in List
  - Group headers show a red dot if any job in the group is `critical`.
  - The list's filter dropdown includes "Unhealthy" (shows `warning` + `critical`).
  - Sort by health puts `critical` first, then `warning`, then `healthy`.

  ---

  ## 9. Schedule Timeline

  ### What It Is
  A visual timeline showing when jobs are scheduled to fire, helping spot overlaps, gaps, and resource contention.

  ### Implementation
  - Displayed as a **horizontal bar chart** at the top of the cron manager view (collapsible, default collapsed).
  - Toggle via a "Timeline" button in the view header or `Cmd+Shift+T` (within cron view).
  - **24-hour view** (default): Shows the next 24 hours, divided into 1-hour buckets. Each bucket shows a stacked bar of how many jobs fire in that hour, colored by health status.
  - **7-day view**: Shows the next 7 days, divided into day buckets. Same stacking.
  - **Hover**: Hovering a bucket shows a tooltip listing the specific jobs that fire in that time window.
  - **Click**: Clicking a job name in the tooltip selects it in the list and opens its detail.

  ### Data Source
  - Computed client-side from the `nextRun` and `schedule` fields on all visible jobs.
  - For recurring schedules, compute the next N occurrences using the cron expression or systemd calendar spec (use `cronstrue`/custom parser for projection).
  - Up to 500 data points max (for performance).

  ---

  ## 10. Tags & Labels

  ### What It Is
  User-defined tags for flexible organization beyond the automatic project grouping.

  ### Implementation
  - Tags are stored per-job in the `cron_job_prefs` SQLite table (JSON array column).
  - Tags are displayed as small colored pills on the job row (after the schedule) and as removable pills in the detail header.
  - **Adding tags**: Click "+" in the detail header. Autocomplete dropdown shows existing tags across all jobs (for consistency). Free-text also allowed.
  - **Removing tags**: Click the "x" on a tag pill in the detail header.
  - **Filtering by tag**: The list filter dropdown includes all existing tags. Multiple tags can be selected (OR logic -- shows jobs matching any selected tag).
  - **Tag colors**: Deterministic color from tag name hash (same palette as avatar fallback). No user color customization (keeps it simple).
  - **Suggested auto-tags**: On first discovery, suggest tags based on heuristics:
    - Command contains `backup` -> suggest "backup"
    - Command contains `clean` or `purge` -> suggest "cleanup"
    - Command contains `monitor` or `check` -> suggest "monitoring"
    - User can accept or dismiss suggestions (one-time, stored in prefs)

  ---

  ## 11. Notifications

  ### What It Is
  Desktop and in-app notifications for job events, primarily failures.

  ### Notification Events

  | Event | Default | Description |
  |-------|---------|-------------|
  | Job failure (first) | Toast + desktop | A job failed that was previously healthy |
  | Consecutive failures (3+) | Toast + desktop | A job has now failed 3+ times in a row |
  | Missed scheduled run | Toast only | A job didn't run when expected |
  | Manual run completed | Toast only | A "Run Now" execution finished |
  | Job created/deleted externally | Toast only | Detected via polling that a job appeared/disappeared outside agentboard |

  ### Implementation
  - **In-app toasts**: Use the existing `<Toast>` / `<ToastViewport>` system from agentboard. Cron toasts get a cron icon prefix and are clickable (navigates to the job in the cron manager view).
  - **Desktop notifications**: Use the browser Notification API (`new Notification()`). Requires user permission grant (prompted once in settings). Clickable to focus the agentboard tab.
  - **Notification settings** (in SettingsModal > Cron Manager):
    - `cronNotificationsEnabled: boolean` (default: true for toasts, false for desktop until granted)
    - `cronDesktopNotifications: boolean` (default: false, prompts for permission when enabled)
    - `cronNotifyOnFailure: boolean` (default: true)
    - `cronNotifyOnMissedRun: boolean` (default: true)
    - `cronNotifyOnManualRun: boolean` (default: true)
  - **Rate limiting**: Max 1 desktop notification per job per 5 minutes (prevents spam from rapid-fire failures).

  ---

  ## 12. Agentboard Session Integration

  ### What It Is
  Cross-referencing cron/systemd jobs with agentboard tmux sessions and a "Managed by Agentboard" classification.

  ### Session Linking
  - **Automatic linking**: When a cron job's `scriptPath` or `command` references a directory that matches a currently active agentboard session's `projectPath`, the job is automatically linked.
  - **Manual linking**: In the detail pane, a "Link to Session" button opens a dropdown of active sessions. Selecting one creates a persistent link stored in `cron_job_prefs`.
  - **Link display**: Linked jobs show a small terminal icon in the list row. The detail header shows the linked session name as a clickable chip that navigates to that session in the main session view.
  - **Bidirectional**: In the main session list (SessionList.tsx), sessions with linked cron jobs show a small clock icon. Clicking it navigates to the cron manager filtered to that session's linked jobs.

  ### "Managed by Agentboard" Badge
  - A toggle in the detail header (circuit-board icon) that marks a job as orchestration-related.
  - Persisted in `cron_job_prefs` (`is_managed INTEGER DEFAULT 0`).
  - Visual: A subtle circuit-board watermark/badge on the job row in the list.
  - **Filter**: The list filter dropdown includes "Managed by Agentboard" to show only orchestration jobs.
  - **Purpose**: Distinguishes "my AI pipeline cron jobs" from "system logrotate" at a glance. Prepares for a future phase where AI agents can create/manage jobs.

  ---

  ## 13. WebSocket Protocol Extensions

  ### What It Is
  New WebSocket message types for cron manager communication.

  ### Server Messages (server -> client)

  ```typescript
  // Full job list (sent on connect and on significant changes)
  { type: 'cron-jobs', jobs: CronJob[] }

  // Incremental update (sent on poll diff)
  { type: 'cron-job-update', job: CronJob }

  // Job removed (deleted or disappeared from system)
  { type: 'cron-job-removed', jobId: string }

  // Job detail response
  { type: 'cron-job-detail', detail: CronJobDetail }

  // Operation result
  { type: 'cron-operation-result', jobId: string, operation: string, success: boolean, error?: string }

  // Sudo required prompt
  { type: 'cron-sudo-required', jobId: string, operation: string }

  // Run Now streaming
  { type: 'cron-run-started', jobId: string, runId: string }
  { type: 'cron-run-output', jobId: string, runId: string, chunk: string }
  { type: 'cron-run-completed', jobId: string, runId: string, exitCode: number, duration: number }

  // Bulk operation progress
  { type: 'cron-bulk-operation-progress', completed: number, total: number, failures: string[] }

  // Notification events
  { type: 'cron-notification', jobId: string, event: string, message: string, severity: 'info' | 'warning' | 'error' }
  ```

  ### Client Messages (client -> server)

  ```typescript
  // Request job detail
  { type: 'cron-job-select', jobId: string }

  // Run Now
  { type: 'cron-job-run-now', jobId: string }

  // Pause/resume
  { type: 'cron-job-pause', jobId: string }
  { type: 'cron-job-resume', jobId: string }

  // Edit frequency
  { type: 'cron-job-edit-frequency', jobId: string, newSchedule: string }

  // Delete
  { type: 'cron-job-delete', jobId: string }

  // Create
  { type: 'cron-job-create', mode: 'cron' | 'systemd', config: CronCreateConfig | SystemdCreateConfig }

  // Bulk operations
  { type: 'cron-bulk-pause', jobIds: string[] }
  { type: 'cron-bulk-resume', jobIds: string[] }
  { type: 'cron-bulk-delete', jobIds: string[] }

  // Tags
  { type: 'cron-job-set-tags', jobId: string, tags: string[] }

  // Managed flag
  { type: 'cron-job-set-managed', jobId: string, isManaged: boolean }

  // Session linking
  { type: 'cron-job-link-session', jobId: string, sessionId: string | null }

  // Sudo password response
  { type: 'cron-sudo-password', password: string }

  // Request logs (paginated)
  { type: 'cron-job-logs', jobId: string, lines: number, offset?: number }

  // Request run history (paginated)
  { type: 'cron-job-history', jobId: string, limit: number, before?: string }
  ```

  ---

  ## 14. Backend Service Architecture

  ### What It Is
  Server-side service for job discovery, polling, health analysis, history collection, and management.

  ### Key Files (new)

  ```
  src/server/cronManager.ts           -- CronManager class: discovery, polling, diff, health, operations
  src/server/cronHistoryService.ts    -- Run history collection from journal/syslog
  src/server/cronLogService.ts        -- Log aggregation from journal/syslog/mail
  src/server/handlers/cronHandlers.ts -- WebSocket message handlers for cron operations
  ```

  ### CronManager Class

  ```typescript
  class CronManager {
    // Discovery
    discoverAllJobs(): Promise<CronJob[]>
    discoverUserCrontab(): Promise<CronJob[]>
    discoverSystemCrontab(): Promise<CronJob[]>
    discoverUserTimers(): Promise<CronJob[]>
    discoverSystemTimers(): Promise<CronJob[]>

    // Polling
    startPolling(intervalMs: number): void
    stopPolling(): void
    onJobsChanged(callback: (added: CronJob[], removed: string[], updated: CronJob[]) => void): void

    // Detail
    getJobDetail(jobId: string): Promise<CronJobDetail>

    // Operations
    runJobNow(jobId: string, sudoPassword?: string): AsyncGenerator<string> // streams output
    pauseJob(jobId: string, sudoPassword?: string): Promise<void>
    resumeJob(jobId: string, sudoPassword?: string): Promise<void>
    editFrequency(jobId: string, newSchedule: string, sudoPassword?: string): Promise<void>
    deleteJob(jobId: string, sudoPassword?: string): Promise<void>
    createCronJob(config: CronCreateConfig): Promise<string> // returns job ID
    createSystemdTimer(config: SystemdCreateConfig, sudoPassword?: string): Promise<string>

    // Bulk
    bulkPause(jobIds: string[], sudoPassword?: string): AsyncGenerator<BulkProgress>
    bulkResume(jobIds: string[], sudoPassword?: string): AsyncGenerator<BulkProgress>
    bulkDelete(jobIds: string[], sudoPassword?: string): AsyncGenerator<BulkProgress>

    // Health
    computeHealth(job: CronJob, history: JobRunRecord[]): { health: HealthStatus, reason: string | null }

    // Parsing
    parseCronSchedule(expression: string): string  // returns human-readable
    parseSystemdCalendar(spec: string): string      // returns human-readable
    resolveScriptPath(command: string): string | null
    inferProjectGroup(scriptPath: string | null, command: string): string
    projectNextRuns(schedule: string, source: JobSource, count: number): Date[] // for timeline
  }
  ```

  ### CronHistoryService

  ```typescript
  class CronHistoryService {
    // Collect run history from system logs
    getSystemdHistory(unitName: string, limit: number): Promise<JobRunRecord[]>
    getCronHistory(command: string, user: string, limit: number): Promise<JobRunRecord[]>

    // Store manual run results
    recordManualRun(jobId: string, record: JobRunRecord): void
  }
  ```

  ### CronLogService

  ```typescript
  class CronLogService {
    // Get logs for a specific job
    getSystemdLogs(unitName: string, lines: number): Promise<string[]>
    getCronLogs(command: string, user: string, lines: number): Promise<string[]>

    // Tail mode (returns async iterable)
    tailSystemdLogs(unitName: string): AsyncGenerator<string>
  }
  ```

  ### Polling Lifecycle
  1. `CronManager` is instantiated as a singleton in `src/server/index.ts`
  2. On first WebSocket connection, polling starts at the configured interval (default 5s)
  3. Each poll cycle: `discoverAllJobs()` -> collect run history for changed jobs -> compute health -> diff against cache -> broadcast changes
  4. When no clients are connected, polling pauses to save resources

  ---

  ## 15. Frontend Store & Components

  ### What It Is
  New Zustand store and React components for the cron manager view.

  ### Store: `src/client/stores/cronStore.ts`

  ```typescript
  interface CronState {
    // Job data
    jobs: CronJob[]
    selectedJobId: string | null
    selectedJobDetail: CronJobDetail | null

    // List state
    searchQuery: string
    sortMode: 'name' | 'next-run' | 'last-run' | 'status' | 'health'
    filterMode: 'all' | 'active' | 'paused' | 'errors' | 'unhealthy' | 'managed'
    filterSource: JobSource | 'all'
    filterTags: string[]
    collapsedGroups: string[]
    selectedJobIds: string[]  // for bulk operations

    // UI state
    isLoading: boolean
    activeTab: 'overview' | 'history' | 'logs' | 'script'
    timelineVisible: boolean
    timelineRange: '24h' | '7d'
    sudoPromptVisible: boolean
    pendingSudoOperation: { jobId: string, operation: string } | null
    createModalVisible: boolean
    runNowActive: { jobId: string, runId: string, output: string } | null
    logTailActive: boolean
  }
  ```

  Persisted keys: `selectedJobId`, `sortMode`, `filterMode`, `filterSource`, `filterTags`, `collapsedGroups`, `timelineVisible`, `timelineRange`, `activeTab`

  ### Components (new)

  ```
  src/client/components/cron/
    CronManager.tsx           -- top-level container with timeline + split pane
    CronTimeline.tsx          -- collapsible 24h/7d schedule bar chart
    CronJobList.tsx           -- left pane: grouped list with search/filter/bulk select
    CronJobRow.tsx            -- single job row (avatar, name, schedule, health, status, tags)
    CronJobDetail.tsx         -- right pane: tabbed detail container
    CronOverviewTab.tsx       -- schedule, controls, duration stats, source-specific details
    CronHistoryTab.tsx        -- run history timeline with sparkline
    CronLogsTab.tsx           -- log viewer with search, tail mode, copy
    CronScriptTab.tsx         -- read-only syntax-highlighted code viewer
    CronJobControls.tsx       -- run now, pause/resume/edit/delete buttons
    CronRunNowOutput.tsx      -- inline mini-terminal for Run Now output streaming
    CronScheduleEditor.tsx    -- inline schedule editor with preview
    CronCreateModal.tsx       -- job creation form (quick cron / advanced systemd)
    CronSudoPrompt.tsx        -- password prompt modal for privilege escalation
    CronDeleteConfirm.tsx     -- delete confirmation dialog (single + bulk)
    CronBulkActions.tsx       -- floating bar when multiple jobs selected
    CronTagInput.tsx          -- tag autocomplete input
    CronHealthBadge.tsx       -- health indicator with tooltip
    CronEmptyState.tsx        -- empty/dashboard state when no job selected
    CronSessionLink.tsx       -- session link dropdown and display
  ```

  ### Syntax Highlighting
  Use `highlight.js` (already lightweight, no Monaco needed for read-only). Import only the languages needed: `bash`, `python`, `javascript`, `typescript`, `ruby`, `perl`, `ini` (for systemd units). Apply a theme that respects the agentboard CSS custom properties (dark/light).

  ---

  ## 16. Schedule Expression Handling

  ### What It Is
  Parsing and human-readable conversion for both cron expressions and systemd calendar specs.

  ### Cron Expression Parsing
  Use the `cronstrue` npm package (lightweight, well-maintained) to convert cron expressions to human-readable strings:
  - `*/5 * * * *` -> "Every 5 minutes"
  - `0 3 * * *` -> "At 3:00 AM"
  - `0 0 * * 0` -> "At 12:00 AM, only on Sunday"

  ### Systemd Calendar Spec Parsing
  Parse systemd `OnCalendar=` values. Common patterns:
  - `*-*-* 03:00:00` -> "Every day at 3:00 AM"
  - `Mon *-*-* 00:00:00` -> "Every Monday at midnight"
  - `*-*-* *:*:00` -> "Every minute"
  - For complex specs, fall back to displaying the raw spec with a "systemd calendar" label

  ### Schedule Editor
  The inline schedule editor in the detail pane:
  - Text input for the raw expression
  - Below it, a live human-readable preview that updates on each keystroke
  - Validation: red border + error message if the expression is invalid
  - For cron: validate against standard 5-field format
  - For systemd: validate against `systemd-analyze calendar` (backend validation call)

  ### Next-Run Projection
  For the schedule timeline, compute the next N occurrences of a schedule:
  - Cron: Use a lightweight cron expression evaluator (e.g., `cron-parser` npm package)
  - Systemd: Use `systemd-analyze calendar --iterations=N` for accurate projection

  ---

  ## 17. Database Schema Extension

  ### What It Is
  SQLite tables for persisting job metadata, user preferences, and manual run history.

  ```sql
  -- Per-job user preferences and metadata
  CREATE TABLE IF NOT EXISTS cron_job_prefs (
    job_id TEXT PRIMARY KEY,
    custom_avatar_style TEXT,        -- override global avatar style for this job
    custom_name TEXT,                -- user-defined display name override
    is_favorite INTEGER DEFAULT 0,   -- pin to top of list
    is_managed INTEGER DEFAULT 0,    -- "Managed by Agentboard" flag
    linked_session_id TEXT,          -- manually linked agentboard session
    tags TEXT DEFAULT '[]',          -- JSON array of tag strings
    notes TEXT,                      -- user notes about the job
    created_at TEXT DEFAULT (datetime('now')),
    updated_at TEXT DEFAULT (datetime('now'))
  );

  -- Manual run history (scheduled runs come from journal/syslog, not stored here)
  CREATE TABLE IF NOT EXISTS cron_run_history (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    job_id TEXT NOT NULL,
    timestamp TEXT NOT NULL,
    end_timestamp TEXT,
    duration INTEGER,                -- milliseconds
    exit_code INTEGER,
    trigger TEXT DEFAULT 'manual',   -- 'manual' | 'scheduled' (only manual stored here)
    log_snippet TEXT,                -- first ~500 chars of output
    created_at TEXT DEFAULT (datetime('now')),
    FOREIGN KEY (job_id) REFERENCES cron_job_prefs(job_id) ON DELETE CASCADE
  );

  CREATE INDEX IF NOT EXISTS idx_cron_run_history_job ON cron_run_history(job_id, timestamp DESC);
  ```

  These tables store user preferences and manual run results only. Job state and scheduled run history are always discovered from the system on each poll.

  ---

  ## 18. Settings Integration

  ### What It Is
  New settings exposed in the SettingsModal for cron manager configuration.

  ### New Settings (in `settingsStore`)

  | Setting | Type | Default | Description |
  |---------|------|---------|-------------|
  | `cronPollInterval` | number | 5000 | Polling interval in ms (min 2000, max 30000) |
  | `cronAvatarStyle` | string | `'bottts'` | DiceBear avatar style |
  | `cronSudoGracePeriod` | number | 300000 | Sudo password cache duration in ms (5 min) |
  | `cronShowSystemJobs` | boolean | true | Whether to show system-level jobs |
  | `cronShowUserJobs` | boolean | true | Whether to show user-level jobs |
  | `cronDefaultSort` | string | `'name'` | Default sort mode |
  | `cronListWidth` | number | 320 | Width of the list pane in px (180-500) |
  | `cronNotificationsEnabled` | boolean | true | Enable in-app toast notifications |
  | `cronDesktopNotifications` | boolean | false | Enable desktop notifications (requires permission) |
  | `cronNotifyOnFailure` | boolean | true | Notify on job failure |
  | `cronNotifyOnMissedRun` | boolean | true | Notify on missed scheduled run |
  | `cronNotifyOnManualRun` | boolean | true | Notify when Run Now completes |
  | `cronTimelineDefaultVisible` | boolean | false | Whether timeline is expanded by default |
  | `cronTimelineDefaultRange` | string | `'24h'` | Default timeline range ('24h' or '7d') |

