  - id: REQ-38
    type: behavioral
    description: "While a manual run is in progress, the Run Now button MUST be disabled (showing a spinner). Output MUST stream in real-time via WebSocket into a mini-terminal below the button. On completion, the exit code and duration MUST be displayed inline."
  - id: REQ-39
    type: contract
    description: "Manual runs MUST be recorded in the `cron_run_history` database table with `trigger: 'manual'` and MUST appear in the History tab alongside scheduled runs."
  - id: REQ-40
    type: invariant
    description: "Only one manual run per job MUST be allowed at a time. If a manual run is already in progress for a job, the Run Now button MUST remain disabled with a \"Running...\" label."

  # Job Management -- Pause/Resume
  - id: REQ-41
    type: contract
    description: "The detail pane MUST include a Pause/Resume toggle button. For cron jobs, pausing MUST comment out the crontab line with a `#AGENTBOARD_PAUSED:` prefix. Resuming MUST remove the prefix. For systemd timers, pausing MUST run `systemctl [--user] stop` + `disable`. Resuming MUST run `systemctl [--user] enable` + `start`."
  - id: REQ-42
    type: behavioral
    description: "After a pause or resume operation completes, the job's status MUST update in the list within one poll cycle (max 5 seconds) without requiring a manual refresh."

  # Job Management -- Edit Frequency
  - id: REQ-43
    type: behavioral
    description: "The detail pane MUST include an \"Edit Frequency\" control that opens an inline editor. The editor MUST show a text input for the raw schedule expression and a live human-readable preview below it that updates on each keystroke."
  - id: REQ-44
    type: contract
    description: "The schedule editor MUST validate the expression before applying. Invalid expressions MUST show a red border and error message. For cron expressions, validate against standard 5-field cron format. For systemd calendar specs, validate via a backend call to `systemd-analyze calendar`."
  - id: REQ-45
    type: contract
    description: "For cron jobs, saving a new schedule MUST replace the schedule columns in the crontab line. For systemd timers, saving MUST write the new `OnCalendar=` value to the timer unit file and run `systemctl [--user] daemon-reload`."

  # Job Management -- Delete
  - id: REQ-46
    type: behavioral
    description: "The detail pane MUST include a Delete button styled as a destructive action (red). Clicking MUST show a confirmation dialog stating the job name and warning that deletion is permanent."
  - id: REQ-47
    type: contract
    description: "For cron jobs, deletion MUST remove the line from the crontab. For systemd timers, deletion MUST stop the timer, disable it, and remove the unit files (.timer and .service)."
  - id: REQ-48
    type: invariant
    description: "Before any destructive or edit operation, the backend MUST create a backup. For crontab: `crontab -l > ~/.agentboard/backups/crontab-{timestamp}`. For systemd: copy unit files to `~/.agentboard/backups/`."
  - id: REQ-49
    type: behavioral
    description: "After deletion, the job MUST be removed from the list with an exit animation. The detail pane MUST revert to the empty state. The list MUST NOT require a manual refresh."

  # Job Creation
  - id: REQ-50
    type: behavioral
    description: "The cron manager MUST provide a \"Create Job\" button (in the list pane header and in the empty state) that opens a creation modal with two modes: Quick (cron) and Advanced (systemd)."
  - id: REQ-51
    type: contract
    description: "Quick mode MUST accept: command (required), schedule expression with live preview (required), and optional name/comment and tags. Submitting MUST append a new entry to the user's crontab."
  - id: REQ-52
    type: contract
    description: "Advanced mode MUST accept: service name (required, validated as a legal systemd unit name), command/ExecStart (required), OnCalendar schedule with validation (required), optional Description, optional WorkingDirectory, user-vs-system scope toggle, and optional tags. Submitting MUST generate `.timer` and `.service` unit files, write them, run `daemon-reload`, `enable`, and `start`."
  - id: REQ-53
    type: behavioral
    description: "The creation form MUST validate all inputs before submission. Duplicate detection MUST warn (not block) if a job with the same command already exists. After successful creation, the new job MUST be auto-selected in the list."

  # Bulk Operations
  - id: REQ-54
    type: behavioral
    description: "When one or more jobs are selected via checkboxes, a floating bulk action bar MUST appear at the bottom of the list pane with: selected count, \"Pause All\", \"Resume All\", \"Delete All\" buttons, and a \"Deselect\" button."
  - id: REQ-55
    type: contract
    description: "Bulk Pause and Bulk Resume MUST iterate through selected jobs sequentially. If any selected jobs require sudo, a single password prompt MUST cover all operations. Progress MUST be reported via `cron-bulk-operation-progress` WebSocket messages."
  - id: REQ-56
    type: behavioral
    description: "Bulk Delete MUST show a single confirmation dialog listing all selected job names. On confirmation, jobs MUST be deleted sequentially with individual error handling (one failure MUST NOT abort remaining deletions). The list MUST update as each deletion completes."
  - id: REQ-57
    type: behavioral
    description: "Right-click context menu on group headers MUST provide \"Pause all in group\", \"Resume all in group\", and \"Select all in group\" actions."

  # Health & Failure Detection
  - id: REQ-58
    type: contract
    description: "Each job MUST have a `health` field computed server-side from run history. Health levels: `healthy` (last 10 runs all succeeded), `warning` (last run failed, or missed scheduled run, or duration > 2x average), `critical` (2+ consecutive failures, or systemd unit in failed state), `unknown` (no history available)."
  - id: REQ-59
    type: invariant
    description: "Health MUST be recomputed on each poll cycle after run history is gathered. Health changes MUST trigger `cron-job-update` WebSocket messages. Health MUST NOT be persisted to the database -- it is always derived from live data."
  - id: REQ-60
    type: contract
    description: "The `healthReason` field MUST provide a human-readable explanation (e.g., \"Failed 3 times in a row\", \"Last run took 5m (avg: 1m)\", \"Missed scheduled run (last ran 6h ago)\"). This MUST be displayed in a tooltip on the health badge."
  - id: REQ-61
    type: contract
    description: "A job MUST be considered to have \"missed a scheduled run\" if the time since its last run exceeds 2x the expected interval derived from its schedule expression."

  # Duration Tracking
  - id: REQ-62
    type: contract
    description: "Each job MUST track `lastRunDuration` (milliseconds) and `avgDuration` (rolling average of last 10 runs). For systemd, duration comes from journal timestamps. For cron, duration is estimated from syslog entry pairs (start/end) where available, or null if not determinable."
  - id: REQ-63
    type: behavioral
    description: "The detail pane Overview tab MUST display a duration trend indicator: arrow up (latest > avg * 1.2), arrow down (latest < avg * 0.8), or flat. If the latest run exceeded 2x the average, a yellow warning label MUST be shown."

  # Tags & Labels
  - id: REQ-64
    type: contract
    description: "Each job MUST support user-defined tags stored in the `cron_job_prefs` table as a JSON array. Tags MUST be displayed as small colored pills (deterministic color from tag name hash) on the job row in the list and as removable pills in the detail header."
  - id: REQ-65
    type: behavioral
    description: "Adding a tag MUST show an autocomplete dropdown populated with all existing tags across all jobs. Free-text entry MUST also be allowed for new tags."
  - id: REQ-66
    type: behavioral
    description: "The list filter dropdown MUST include all existing tags. Selecting one or more tags MUST filter the list to show jobs matching any selected tag (OR logic)."
  - id: REQ-67
    type: behavioral
    description: "On first discovery of a job, the system SHOULD suggest auto-tags based on command content heuristics (e.g., \"backup\" if command contains `backup`, \"cleanup\" if command contains `clean` or `purge`, \"monitoring\" if command contains `monitor` or `check`). Suggestions MUST be dismissable and MUST only appear once per job."

  # Notifications
  - id: REQ-68
    type: behavioral
    description: "The cron manager MUST emit in-app toast notifications (via the existing Toast system) for: first-time job failure, 3+ consecutive failures, missed scheduled run, and manual run completion. Cron toasts MUST include a cron icon prefix and MUST be clickable to navigate to the job."
  - id: REQ-69
    type: behavioral
    description: "The cron manager MUST support browser desktop notifications (via the Notification API) for failure events. Desktop notifications MUST be opt-in (disabled by default), requiring the user to enable them in settings and grant browser permission."
  - id: REQ-70
    type: invariant
    description: "Notification rate limiting MUST enforce a maximum of 1 desktop notification per job per 5 minutes to prevent spam from rapid-fire failures."
  - id: REQ-71
    type: behavioral
    description: "All notification categories (failure, missed run, manual run) MUST be independently toggleable in settings."

  # Agentboard Session Integration
  - id: REQ-72
    type: contract
    description: "When a cron job's `scriptPath` or `command` references a directory that matches an active agentboard session's `projectPath`, the job MUST be automatically linked to that session. The link MUST be displayed as a small terminal icon in the list row and a clickable session name chip in the detail header."
  - id: REQ-73
    type: behavioral
    description: "The detail header MUST include a \"Link to Session\" button that opens a dropdown of active sessions for manual linking. The manual link MUST be stored in `cron_job_prefs` and MUST persist across sessions."
  - id: REQ-74
    type: behavioral
    description: "Clicking a linked session indicator MUST navigate to that session in the main session view (`activeView: 'sessions'`, `selectedSessionId` set to the linked session)."
  - id: REQ-75
    type: behavioral
    description: "In the main SessionList component, sessions with linked cron jobs MUST show a small clock icon. Clicking it MUST navigate to the cron manager view filtered to that session's linked jobs."
  - id: REQ-76
    type: behavioral
    description: "The detail header MUST include a \"Managed by Agentboard\" toggle (circuit-board icon). When enabled, the job row MUST show a circuit-board badge and the job MUST be filterable via the \"Managed by Agentboard\" filter."

  # Schedule Timeline
  - id: REQ-77
    type: behavioral
    description: "The cron manager MUST include a collapsible schedule timeline displayed above the split pane. The timeline MUST be togglable via a \"Timeline\" button in the view header."
  - id: REQ-78
    type: behavioral
    description: "The timeline MUST support two ranges: 24-hour (default, 1-hour buckets) and 7-day (daily buckets). Each bucket MUST show a stacked bar representing the number of jobs scheduled to fire in that window, colored by health status."
  - id: REQ-79
    type: behavioral
    description: "Hovering a timeline bucket MUST show a tooltip listing the specific jobs firing in that window. Clicking a job name in the tooltip MUST select it in the list and open its detail."
  - id: REQ-80
    type: benchmark
    description: "The timeline MUST be computed client-side from job schedules. For recurring schedules, the next N occurrences MUST be projected using a cron expression evaluator or systemd calendar parser. The projection MUST be capped at 500 data points for performance."

  # Privilege Escalation
  - id: REQ-81
    type: contract
    description: "Each job MUST have a `requiresSudo` boolean flag. Jobs from `system-crontab` and `systemd-system` sources MUST have `requiresSudo: true`. Jobs from `user-crontab` and `systemd-user` sources MUST have `requiresSudo: false`."
  - id: REQ-82
    type: behavioral
    description: "When an operation requires sudo, the frontend MUST display a password prompt modal before sending the operation. Controls that require sudo MUST display a lock icon as a visual indicator."
  - id: REQ-83
    type: property
    description: "The backend MUST cache the sudo password in memory for a configurable grace period (default: 5 minutes). Within the grace period, subsequent sudo operations MUST NOT require re-prompting. After expiry, the cached password MUST be zeroed out."
  - id: REQ-84
    type: property
    description: "Sudo password MUST be transmitted over WebSocket only when the connection uses WSS (TLS). If the connection is plain WS (e.g., localhost development), the system MUST still function but MUST log a warning about insecure password transmission."

  # Schedule Display
  - id: REQ-85
    type: contract
    description: "Cron expressions MUST be converted to human-readable strings using the `cronstrue` npm package. The human-readable string MUST appear alongside the raw expression in both the list pane and the detail pane."
  - id: REQ-86
    type: contract
    description: "Systemd calendar specs MUST be converted to human-readable strings. Common patterns MUST be parsed. For unrecognized patterns, the raw spec MUST be displayed with a \"systemd calendar\" label."

  # Database & Persistence
  - id: REQ-87
    type: contract
    description: "A `cron_job_prefs` SQLite table MUST be created in `initDatabase()` to store per-job user preferences (custom avatar style, custom display name, favorite flag, managed flag, linked session, tags, notes). The table MUST NOT store job state -- all job state comes from system discovery."
  - id: REQ-88
    type: contract
    description: "A `cron_run_history` SQLite table MUST be created to store manual run results (timestamp, duration, exit code, log snippet). Scheduled run history comes from system logs and MUST NOT be duplicated into this table."
  - id: REQ-89
    type: contract
    description: "The Zustand store MUST persist `selectedJobId`, `sortMode`, `filterMode`, `filterSource`, `filterTags`, `collapsedGroups`, `activeTab`, `timelineVisible`, and `timelineRange` across browser sessions via `localStorage`."

  # Settings
  - id: REQ-90
    type: behavioral
    description: "The SettingsModal MUST include a \"Cron Manager\" section with configurable settings: poll interval (slider, 2-30s), avatar style (dropdown), sudo grace period (slider), show system jobs (toggle), show user jobs (toggle), timeline default visibility (toggle), timeline default range (dropdown), and all notification toggles (toasts enabled, desktop enabled, per-event toggles)."

  # Performance
  - id: REQ-91
    type: benchmark
    description: "Job discovery MUST complete within 2 seconds on a typical system with fewer than 200 jobs. Individual source discovery failures MUST be caught and logged without blocking other sources."
  - id: REQ-92
    type: benchmark
    description: "The list pane MUST render smoothly with up to 200 jobs. Groups MUST use virtualized rendering or lazy loading if the total job count exceeds 100."
  - id: REQ-93
    type: benchmark
    description: "The schedule timeline MUST render within 100ms for up to 200 jobs projected over 7 days (capped at 500 data points)."

  # Accessibility
  - id: REQ-94
    type: property
    description: "All interactive elements in the cron manager view (search bar, sort/filter dropdowns, group headers, job rows, control buttons, tabs, timeline, bulk action bar) MUST be keyboard-navigable. Arrow keys MUST navigate the job list. Enter MUST select a job. Tab MUST cycle through detail pane sections."
  - id: REQ-95
    type: property
    description: "Status indicator dots and health badges MUST NOT be the sole means of conveying status. Each MUST also have a text label accessible to screen readers via aria-label."

test_specifications:
  # Discovery Tests
  - id: TEST-01
    description: "User crontab parsing. Mock `crontab -l` output with 3 entries (one with a script path, one inline command, one with environment variable). Call `discoverUserCrontab()`. Assert: 3 jobs returned. Assert: script path resolved for the first. Assert: `scriptPath` is null for the inline command. Assert: all have `source: 'user-crontab'` and `requiresSudo: false`."
  - id: TEST-02
    description: "System crontab parsing. Mock `/etc/crontab` content with 2 entries including user field. Call `discoverSystemCrontab()`. Assert: 2 jobs returned. Assert: all have `source: 'system-crontab'` and `requiresSudo: true`. Assert: user field correctly parsed."
  - id: TEST-03
    description: "User systemd timer discovery. Mock `systemctl --user list-timers --all --output=json` with 2 timers. Call `discoverUserTimers()`. Assert: 2 jobs. Assert: `source: 'systemd-user'`, `requiresSudo: false`. Assert: schedule, last run, next run correctly parsed."
  - id: TEST-04
    description: "System systemd timer discovery. Mock `systemctl list-timers --all --output=json` with 2 timers. Call `discoverSystemTimers()`. Assert: 2 jobs. Assert: `source: 'systemd-system'`, `requiresSudo: true`."
  - id: TEST-05
    description: "Discovery resilience. Mock user crontab to succeed, system crontab to throw, user timers to succeed, system timers to timeout. Call `discoverAllJobs()`. Assert: returns jobs from successful sources only. Assert: errors logged. Assert: no throw."
  - id: TEST-06
    description: "Deterministic job IDs. Discover the same jobs twice. Assert: IDs identical. Change a job's schedule. Assert: ID changes."

  # Project Grouping Tests
  - id: TEST-07
    description: "Script path grouping. Jobs with paths: `/home/user/projects/myapp/scripts/backup.sh`, `/home/user/projects/myapp/cron/cleanup.sh`, `/opt/tools/monitor.sh`, inline `echo hello`. Assert: first two grouped under `myapp`, third under `tools`, fourth under `System`."
  - id: TEST-08
    description: "System group always last. Groups: \"alpha\", \"System\", \"beta\". Assert: order is alpha, beta, System."

  # Avatar Tests
  - id: TEST-09
    description: "Avatar URL generation. Job named \"daily-backup\". Assert: URL is `https://api.dicebear.com/9.x/bottts/svg?seed=daily-backup`."
  - id: TEST-10
    description: "Avatar style change. Change `cronAvatarStyle` to `pixel-art`. Assert: all URLs update to `pixel-art` style."
  - id: TEST-11
    description: "Avatar fallback. Simulate DiceBear img onerror. Assert: colored circle with first letter rendered. Assert: color is deterministic."

  # Polling & Diff Tests
  - id: TEST-12
    description: "Polling sends only diffs. Start with 3 jobs. On next poll, one status changes and one new job appears. Assert: `cron-job-update` sent for changed job. Assert: new job sent. Assert: unchanged jobs NOT resent."
  - id: TEST-13
    description: "Polling pauses with no clients. Disconnect all clients. Assert: polling stops. Reconnect. Assert: polling resumes."
  - id: TEST-14
    description: "Removed job sends removal. Start with 3, one disappears. Assert: `cron-job-removed` sent."

  # List Pane Tests
  - id: TEST-15
    description: "Search filters by name, command, group, and tag. 5 jobs, one tagged \"backup\". Search \"backup\". Assert: matches by name/command/group/tag."
  - id: TEST-16
    description: "Sort by next run. 3 jobs with different next run times. Sort by next-run. Assert: soonest first. Assert: null next run sorted last."
  - id: TEST-17
    description: "Filter by source type. Jobs from all 4 sources. Filter \"systemd-user\". Assert: only systemd-user shown."
  - id: TEST-18
    description: "Filter by tag. Jobs with tags: [\"backup\"], [\"monitoring\"], [\"backup\", \"monitoring\"]. Filter by \"backup\". Assert: first and third shown. Add \"monitoring\" filter. Assert: all three shown (OR logic)."
  - id: TEST-19
    description: "Filter by health. Jobs: one healthy, one warning, one critical. Filter \"unhealthy\". Assert: warning and critical shown."
  - id: TEST-20
    description: "Group collapse persists. Collapse a group. Navigate away and back. Assert: group remains collapsed."
  - id: TEST-21
    description: "Bulk selection. Click checkbox on 3 jobs. Assert: bulk action bar appears showing \"3 selected\". Assert: Pause All, Resume All, Delete All buttons visible."
  - id: TEST-22
    description: "Shift+click range select. Click job 1 checkbox. Shift+click job 4 checkbox. Assert: jobs 1-4 are selected."

  # Detail Pane Tests
  - id: TEST-23
    description: "Detail pane populates with tabs. Click a job. Assert: detail pane shows header + 4 tabs (Overview, History, Logs, Script). Assert: Overview tab active by default."
  - id: TEST-24
    description: "Active tab persists. Switch to History tab. Select a different job. Assert: History tab remains active."
  - id: TEST-25
    description: "Schedule editor validates cron. Open editor. Enter `* * * *` (invalid). Assert: red border + error. Enter `*/5 * * * *`. Assert: green + preview \"Every 5 minutes\"."
  - id: TEST-26
    description: "Script viewer syntax highlighting. Job with `.sh` script. Assert: bash highlighting. Job with `.py` script. Assert: python highlighting."
  - id: TEST-27
    description: "Next run live countdown. Select a job with nextRun in 2 hours. Assert: countdown displays and ticks down in real-time."

  # Run Now Tests
  - id: TEST-28
    description: "Run Now triggers execution. Click Run Now on a user cron job. Assert: `cron-job-run-now` message sent. Assert: button shows spinner. Mock `cron-run-output` messages. Assert: output streams into mini-terminal. Mock `cron-run-completed`. Assert: exit code and duration shown inline."
  - id: TEST-29
    description: "Run Now disabled during execution. Start a manual run. Assert: Run Now button disabled with \"Running...\" label. Complete the run. Assert: button re-enabled."
  - id: TEST-30
    description: "Manual run recorded in history. Complete a manual run. Navigate to History tab. Assert: the run appears with `trigger: 'manual'` badge."
  - id: TEST-31
    description: "Run Now with sudo. Click Run Now on a system job. Assert: sudo prompt appears first. Enter password. Assert: execution proceeds."

  # History Tab Tests
  - id: TEST-32
    description: "History timeline displays runs. Job with 10 past runs (8 success, 2 failure). Render History tab. Assert: 10 entries displayed, newest first. Assert: failures show red exit code badge."
  - id: TEST-33
    description: "History entry expands to show log snippet. Click a history entry. Assert: expands to show logSnippet text."
  - id: TEST-34
    description: "Failure streak highlighted. 3 consecutive failures. Assert: red left-border band on those entries. Assert: \"3 consecutive failures\" shown at top."
  - id: TEST-35
    description: "Duration sparkline renders. Job with 20 runs of varying duration. Assert: sparkline chart renders above the timeline."
  - id: TEST-36
    description: "Pagination loads more. Job with 75 runs. Assert: first 50 shown. Click \"Load more\". Assert: remaining 25 loaded."

  # Logs Tab Tests
  - id: TEST-37
    description: "Systemd logs displayed. Select a systemd job. Open Logs tab. Mock `journalctl` output. Assert: log lines displayed with line numbers."
  - id: TEST-38
    description: "Live tail mode. Enable live tail toggle. Assert: green \"Live\" indicator visible. Mock new log lines arriving. Assert: log viewer auto-scrolls to show new lines. Disable tail. Assert: auto-scroll stops."
  - id: TEST-39
    description: "Log search. Open Logs tab with content. Press Cmd+F. Type a search term. Assert: matching text is highlighted. Assert: match count displayed."
  - id: TEST-40
    description: "Copy logs. Click \"Copy all\". Assert: clipboard contains all visible log lines."

  # Job Creation Tests
  - id: TEST-41
    description: "Quick mode creates cron job. Open Create modal, Quick mode. Enter command `echo hello` and schedule `*/5 * * * *`. Submit. Assert: `cron-job-create` message sent with `mode: 'cron'`. Mock success. Assert: new job appears in list and is auto-selected."
  - id: TEST-42
    description: "Advanced mode creates systemd timer. Open Create modal, Advanced mode. Enter service name `my-timer`, command `/usr/local/bin/task.sh`, schedule `*-*-* 03:00:00`. Submit. Assert: `cron-job-create` message sent with `mode: 'systemd'`. Mock success. Assert: new job appears."
  - id: TEST-43
    description: "Creation validates inputs. Leave command empty, try to submit. Assert: validation error. Enter invalid systemd unit name (spaces). Assert: validation error. Enter valid inputs. Assert: submit enabled."
  - id: TEST-44
    description: "Duplicate detection warns. A job with command `echo hello` already exists. Create another with same command. Assert: warning shown (\"A job with this command already exists\"). Assert: user can still submit (warning, not blocking)."

  # Bulk Operation Tests
  - id: TEST-45
    description: "Bulk pause. Select 3 user jobs. Click \"Pause All\". Assert: `cron-bulk-pause` sent with 3 IDs. Mock progress messages. Assert: each job status updates as it completes."
  - id: TEST-46
    description: "Bulk delete with confirmation. Select 2 jobs. Click \"Delete All\". Assert: confirmation dialog lists both job names. Confirm. Assert: `cron-bulk-delete` sent. Assert: jobs removed from list as deletions complete."
  - id: TEST-47
    description: "Bulk with mixed sudo. Select 1 user job + 1 system job. Click \"Pause All\". Assert: single sudo prompt covers both. Enter password. Assert: both operations proceed."
  - id: TEST-48
    description: "Group context menu. Right-click group header. Assert: \"Pause all in group\", \"Resume all in group\", \"Select all in group\" visible. Click \"Select all in group\". Assert: all jobs in that group selected."

  # Health & Failure Detection Tests
  - id: TEST-49
    description: "Healthy status. Job with 10 successful runs. Assert: `health: 'healthy'`, `healthReason: null`."
  - id: TEST-50
    description: "Warning on single failure. Job with 9 successes then 1 failure. Assert: `health: 'warning'`, `healthReason` mentions last run failure."
  - id: TEST-51
    description: "Critical on consecutive failures. Job with 3 consecutive failures. Assert: `health: 'critical'`, `healthReason: \"Failed 3 times in a row\"`."
  - id: TEST-52
    description: "Warning on missed run. Job scheduled every hour, last ran 3 hours ago. Assert: `health: 'warning'`, `healthReason` mentions missed run."
  - id: TEST-53
    description: "Warning on slow run. Job average duration 60s, last run 150s. Assert: `health: 'warning'`, `healthReason` mentions slow run."
  - id: TEST-54
    description: "Health badge in list. Render list with healthy, warning, critical jobs. Assert: green checkmark, yellow triangle, red X respectively. Assert: tooltips show healthReason."
  - id: TEST-55
    description: "Group health indicator. Group with one critical job. Assert: group header shows red dot."

  # Duration Tracking Tests
  - id: TEST-56
    description: "Duration stats displayed. Job with 10 runs, avg 60s, last 45s. Assert: Overview shows \"Last: 45s\", \"Avg: 60s\", trend arrow down (getting faster)."
  - id: TEST-57
    description: "Slow run warning. Job avg 60s, last 130s. Assert: yellow warning with \"Last run took 2m 10s (avg: 1m)\"."
  - id: TEST-58
    description: "Sparkline in History tab. Job with 15 runs. Assert: sparkline renders with 15 data points."

  # Tag Tests
  - id: TEST-59
    description: "Add tag. Open detail. Click \"+\". Type \"backup\". Assert: tag pill appears in header. Assert: `cron-job-set-tags` message sent."
  - id: TEST-60
    description: "Remove tag. Click \"x\" on a tag pill. Assert: tag removed. Assert: message sent."
  - id: TEST-61
    description: "Tag autocomplete. Existing tags: \"backup\", \"monitoring\". Start typing \"mon\". Assert: \"monitoring\" shown in dropdown."
  - id: TEST-62
    description: "Filter by tag. Filter by \"backup\" tag. Assert: only tagged jobs shown."
  - id: TEST-63
    description: "Auto-tag suggestion. New job with command containing \"backup\". Assert: \"backup\" tag suggested. Dismiss. Assert: suggestion not shown again."

  # Notification Tests
  - id: TEST-64
    description: "Toast on first failure. Job transitions from healthy to warning (first failure). Assert: toast notification appears with cron icon and job name."
  - id: TEST-65
    description: "Toast on consecutive failures. Job reaches 3 consecutive failures. Assert: toast with critical severity."
  - id: TEST-66
    description: "Desktop notification. Enable desktop notifications. Job fails. Assert: `new Notification()` called. Assert: clicking notification focuses agentboard tab."
  - id: TEST-67
    description: "Rate limiting. Same job fails twice within 5 minutes. Assert: only one desktop notification. After 5 minutes, fails again. Assert: new notification allowed."
  - id: TEST-68
    description: "Notification settings. Disable `cronNotifyOnFailure`. Job fails. Assert: no toast or desktop notification for failure."

  # Session Integration Tests
  - id: TEST-69
    description: "Auto-link by project path. Active session with `projectPath: '/home/user/myapp'`. Cron job with `scriptPath: '/home/user/myapp/scripts/backup.sh'`. Assert: job has `linkedSessionId` set. Assert: terminal icon in list row."
  - id: TEST-70
    description: "Manual session link. Click \"Link to Session\" in detail. Select a session. Assert: `cron-job-link-session` sent. Assert: linked session chip shown in header."
  - id: TEST-71
    description: "Navigate to linked session. Click linked session chip. Assert: view switches to sessions. Assert: linked session is selected."
  - id: TEST-72
    description: "Managed by Agentboard toggle. Click circuit-board icon. Assert: `cron-job-set-managed` sent with `true`. Assert: badge appears on list row. Filter by \"Managed\". Assert: job shown."
  - id: TEST-73
    description: "Clock icon in SessionList. Session has linked cron jobs. Assert: clock icon visible on session row. Click it. Assert: navigates to cron manager filtered to linked jobs."

  # Schedule Timeline Tests
  - id: TEST-74
    description: "Timeline renders 24h view. 5 jobs with various schedules. Show timeline. Assert: 24 buckets displayed. Assert: buckets with jobs show colored bars."
  - id: TEST-75
    description: "Timeline hover shows tooltip. Hover a bucket with 2 jobs. Assert: tooltip lists both job names."
  - id: TEST-76
    description: "Timeline click selects job. Click a job name in tooltip. Assert: job selected in list. Assert: detail pane opens."
  - id: TEST-77
    description: "7-day view. Switch to 7-day range. Assert: 7 buckets displayed."
  - id: TEST-78
    description: "Timeline toggle persists. Show timeline. Refresh page. Assert: timeline still visible."

  # Privilege Escalation Tests
  - id: TEST-79
    description: "Sudo prompt for system jobs. Select system cron job. Click Pause. Assert: sudo modal appears. Enter password. Assert: operation proceeds."
  - id: TEST-80
    description: "Sudo grace period. Enter password. Another sudo op within 5 min. Assert: no prompt. After grace period. Assert: prompt reappears."
  - id: TEST-81
    description: "No sudo for user jobs. Select user cron job. Click Pause. Assert: no sudo prompt."
  - id: TEST-82
    description: "Lock icon on sudo controls. System job detail pane. Assert: Run Now, Pause, Edit, Delete buttons show lock icon."

  # Settings Tests
  - id: TEST-83
    description: "Poll interval setting. Change to 10000ms. Assert: next poll after ~10s."
  - id: TEST-84
    description: "Avatar style setting. Change to `fun-emoji`. Assert: all avatars update."
  - id: TEST-85
    description: "Show/hide system jobs. Disable `cronShowSystemJobs`. Assert: system jobs hidden. Re-enable. Assert: they reappear."
  - id: TEST-86
    description: "Notification toggles. Disable `cronNotifyOnFailure`. Trigger failure. Assert: no toast."

  # WebSocket Protocol Tests
  - id: TEST-87
    description: "Full list on connect. New connection. Assert: `cron-jobs` with complete list."
  - id: TEST-88
    description: "Incremental on poll. Job status change. Assert: `cron-job-update` (not full list)."
  - id: TEST-89
    description: "Removal notification. Job disappears. Assert: `cron-job-removed` with correct ID."
  - id: TEST-90
    description: "Run output streaming. Trigger Run Now. Assert: `cron-run-started`, then `cron-run-output` chunks, then `cron-run-completed`."

  # Accessibility Tests
  - id: TEST-91
    description: "Keyboard navigation in list. Focus list. ArrowDown -> next job highlighted. Enter -> job selected. ArrowUp -> previous."
  - id: TEST-92
    description: "Tab navigation in detail. Press Tab. Assert: cycles through tabs and interactive elements within the detail pane."
  - id: TEST-93
    description: "Aria labels on badges. All health badges and status dots have `aria-label` attributes."

manual_execution_steps:
  - id: EXEC-01
    title: "View navigation and keyboard shortcut"
    steps: |
      1. Open agentboard in a browser.
      2. Press `Cmd+Shift+C` (or `Ctrl+Shift+C` on Linux).
      3. **Verify**: The cron manager view appears, replacing the terminal/workflow content.
      4. **Verify**: The view has a left list pane and a right detail/dashboard pane.
      5. Press the shortcut again or navigate to another view.
      6. **Verify**: The cron manager view is replaced by the other view.
      7. Navigate back to cron manager.
      8. **Verify**: The previously selected job is still selected (persisted).

  - id: EXEC-02
    title: "Job discovery across all sources"
    steps: |
      1. Ensure the test machine has:
         - At least 1 entry in user crontab (`crontab -e`)
         - At least 1 systemd user timer (e.g., a `.timer` in `~/.config/systemd/user/`)
         - System cron jobs exist in `/etc/crontab` or `/etc/cron.d/`
         - System systemd timers exist (e.g., `apt-daily.timer`)
      2. Open the cron manager view.
      3. **Verify**: Jobs from all 4 sources appear in the list.
      4. **Verify**: Each job has a source badge (cron / systemd-user / systemd-system).
      5. **Verify**: Jobs are grouped by project directory, with ungrouped jobs under "System".
      6. **Verify**: "System" group appears last.

  - id: EXEC-03
    title: "Avatars display correctly"
    steps: |
      1. Open the cron manager view with multiple jobs.
      2. **Verify**: Each job in the list has a small (28x28) avatar to the left of the name.
      3. **Verify**: Avatars are visually distinct, colorful, and cartoon/robot-like (bottts style).
      4. Click a job to open the detail pane.
      5. **Verify**: The detail header shows a larger (48x48) version of the same avatar.
      6. Open Settings > Cron Manager > Avatar Style.
      7. Change to "pixel-art".
      8. **Verify**: All avatars in the list and detail pane update to pixel-art style.

  - id: EXEC-04
    title: "Search, filter, and sort"
    steps: |
      1. Open the cron manager view with 5+ jobs.
      2. Type a partial job name in the search bar.
      3. **Verify**: The list filters to show only matching jobs, across all groups.
      4. Clear the search. Select "Active only" filter.
      5. **Verify**: Only active jobs are shown.
      6. Select "Unhealthy" filter.
      7. **Verify**: Only warning/critical health jobs are shown.
      8. Add a tag "backup" to a job. Filter by tag "backup".
      9. **Verify**: Only that job is shown.
      10. Sort by "Health".
      11. **Verify**: Critical jobs first, then warning, then healthy.

  - id: EXEC-05
    title: "Real-time polling updates"
    steps: |
      1. Open the cron manager view.
      2. In a separate terminal, add a new cron job: `(crontab -l; echo "*/10 * * * * echo test") | crontab -`
      3. Wait up to 5 seconds.
      4. **Verify**: The new job appears in the list with an entry animation.
      5. Remove the job: edit crontab to delete the line.
      6. Wait up to 5 seconds.
      7. **Verify**: The job disappears from the list with an exit animation.

  - id: EXEC-06
    title: "Run Now"
    steps: |
      1. Select a user cron job (e.g., one that runs `echo "hello world"`).
      2. Click "Run Now".
      3. **Verify**: The button shows a spinner and "Running..." label.
      4. **Verify**: Output streams into the mini-terminal below the button (shows "hello world").
      5. **Verify**: On completion, exit code (0) and duration are displayed inline.
      6. Navigate to the History tab.
      7. **Verify**: The manual run appears with a "manual" badge.
      8. Click "Run Now" again while the first is still running (if possible).
      9. **Verify**: The button is disabled.

  - id: EXEC-07
    title: "Job detail tabs"
    steps: |
      1. Click a systemd timer job in the list.
      2. **Verify**: Overview tab shows schedule (human-readable + raw + countdown + last run), duration stats, controls, and unit file contents.
      3. Click the **History** tab.
      4. **Verify**: Run history timeline with timestamps, exit codes, durations. Sparkline chart at top.
      5. Click an entry to expand it.
      6. **Verify**: Log snippet shown.
      7. Click the **Logs** tab.
      8. **Verify**: Journal logs displayed with line numbers.
      9. Enable "Live tail". **Verify**: Green "Live" indicator. Auto-scrolls on new content.
      10. Press Cmd+F. Search for a term. **Verify**: Matches highlighted.
      11. Click the **Script** tab.
      12. **Verify**: Script content shown with syntax highlighting and file path breadcrumb.
      13. Click a cron job.
      14. **Verify**: Overview shows raw crontab line and environment variables.

  - id: EXEC-08
    title: "Pause, resume, edit frequency"
    steps: |
      1. Select an active user cron job.
      2. Click Pause.
      3. **Verify**: No sudo prompt. Status changes to "paused" (gray dot). `crontab -l` shows `#AGENTBOARD_PAUSED:` prefix.
      4. Click Resume.
      5. **Verify**: Status returns to "active" (green dot). Prefix removed.
      6. Click "Edit Frequency". Enter `0 */2 * * *`.
      7. **Verify**: Live preview shows "Every 2 hours". Schedule updates in list and detail.
      8. Verify in terminal that crontab reflects the new schedule.

  - id: EXEC-09
    title: "Delete a job"
    steps: |
      1. Select a user cron job.
      2. Click Delete (red button).
      3. **Verify**: Confirmation dialog with job name.
      4. Cancel. **Verify**: Nothing changes.
      5. Delete again, Confirm.
      6. **Verify**: Job removed with exit animation. Detail pane shows empty state. Backup in `~/.agentboard/backups/`.
      7. Verify in terminal that the job is gone from `crontab -l`.

  - id: EXEC-10
    title: "Create a new cron job"
    steps: |
      1. Click "+" button in the list header (or "Create Job" in empty state).
      2. **Verify**: Create modal appears with Quick (cron) and Advanced (systemd) tabs.
      3. In Quick mode, enter command `echo "created by agentboard"`, schedule `*/15 * * * *`.
      4. **Verify**: Preview shows "Every 15 minutes".
      5. Optionally add a tag "test".
      6. Submit.
      7. **Verify**: New job appears in the list and is auto-selected.
      8. Verify via `crontab -l` that the entry exists.
      9. Delete the job to clean up.

  - id: EXEC-11
    title: "Create a systemd timer"
    steps: |
      1. Open Create modal, switch to Advanced (systemd) mode.
      2. Enter service name `agentboard-test`, command `echo "systemd test"`, schedule `*-*-* *:00:00`.
      3. **Verify**: Schedule validated ("Every hour").
      4. Submit.
      5. **Verify**: Timer appears in the list under systemd-user source.
      6. Verify via `systemctl --user list-timers` that it exists.
      7. Delete the timer to clean up.

  - id: EXEC-12
    title: "Bulk operations"
    steps: |
      1. Toggle "Select" mode or hover to show checkboxes.
      2. Select 3 user cron jobs.
      3. **Verify**: Floating bulk action bar shows "3 selected".
      4. Click "Pause All".
      5. **Verify**: All 3 jobs transition to paused status.
      6. Click "Resume All".
      7. **Verify**: All 3 return to active.
      8. Select 2 jobs, click "Delete All".
      9. **Verify**: Confirmation lists both names. Confirm. Both removed.
      10. Right-click a group header. Click "Pause all in group".
      11. **Verify**: All jobs in that group pause.

  - id: EXEC-13
    title: "Health and failure detection"
    steps: |
      1. Create a cron job with a failing command: `*/1 * * * * /bin/false`
      2. Wait 3+ minutes for multiple failures.
      3. **Verify**: Health badge changes from healthy -> warning (after 1 failure) -> critical (after 2+).
      4. **Verify**: Tooltip shows "Failed N times in a row".
      5. **Verify**: Group header shows red dot if this is the only job in its group.
      6. **Verify**: Toast notification appeared for the failures.
      7. Fix the job and wait for a successful run.
      8. **Verify**: Health returns to healthy.

  - id: EXEC-14
    title: "Schedule timeline"
    steps: |
      1. Open the cron manager with 5+ jobs.
      2. Click the "Timeline" button in the header.
      3. **Verify**: Horizontal bar chart appears showing next 24 hours.
      4. **Verify**: Buckets with scheduled jobs show colored bars.
      5. Hover a bucket.
      6. **Verify**: Tooltip lists the jobs firing in that hour.
      7. Click a job name in the tooltip.
      8. **Verify**: That job is selected in the list and detail opens.
      9. Switch to 7-day view.
      10. **Verify**: 7 daily buckets displayed.

  - id: EXEC-15
    title: "Privilege escalation for system jobs"
    steps: |
      1. Select a system-level job.
      2. **Verify**: Control buttons show lock icons.
      3. Click Pause.
      4. **Verify**: Password prompt modal appears.
      5. Enter correct sudo password.
      6. **Verify**: Operation succeeds.
      7. Immediately click Resume (within grace period).
      8. **Verify**: No prompt. Cached password used.
      9. Wait 5+ minutes. Attempt another operation.
      10. **Verify**: Prompt reappears.

  - id: EXEC-16
    title: "Tags and managed badge"
    steps: |
      1. Select a job. Click "+" in the tag area.
      2. Type "backup" and press Enter.
      3. **Verify**: Tag pill appears in header and in list row.
      4. Click the circuit-board icon ("Managed by Agentboard").
      5. **Verify**: Circuit-board badge appears on the list row.
      6. Filter by "Managed by Agentboard".
      7. **Verify**: Only managed jobs shown.
      8. Remove the tag (click "x").
      9. **Verify**: Tag removed from both header and list row.

  - id: EXEC-17
    title: "Session integration"
    steps: |
      1. Have an active agentboard session for a project (e.g., `/home/user/myapp`).
      2. Have a cron job whose script is in the same project directory.
      3. Open cron manager.
      4. **Verify**: The job shows a terminal icon (auto-linked).
      5. Click the linked session chip in the detail header.
      6. **Verify**: Navigates to the session view with that session selected.
      7. In the session list, find the session with the clock icon.
      8. Click the clock icon.
      9. **Verify**: Navigates back to cron manager filtered to that session's linked jobs.

  - id: EXEC-18
    title: "Notifications"
    steps: |
      1. Enable desktop notifications in Settings > Cron Manager.
      2. Grant browser notification permission when prompted.
      3. Create a cron job with a failing command.
      4. Wait for it to fail.
      5. **Verify**: In-app toast appears with cron icon. Clicking it navigates to the job.
      6. **Verify**: Desktop notification appears. Clicking it focuses the agentboard tab.
      7. **Verify**: A second failure within 5 minutes does NOT produce another desktop notification (rate limiting).

  - id: EXEC-19
    title: "Split pane resize"
    steps: |
      1. Open the cron manager view.
      2. Hover the divider between list and detail.
      3. **Verify**: Resize cursor appears.
      4. Drag left (narrower list). **Verify**: Stops at 180px minimum.
      5. Drag right (wider list). **Verify**: Stops at 500px maximum.
      6. Refresh. **Verify**: Width persists.

  - id: EXEC-20
    title: "Empty state and error handling"
    steps: |
      1. Temporarily remove all user cron jobs and disable user timers.
      2. Open the cron manager view.
      3. **Verify**: If system jobs visible, they appear under "System". List otherwise empty.
      4. Disable "Show system jobs" in settings.
      5. **Verify**: List empty with helpful message. "Create Job" button visible.
      6. Click "Create Job".
      7. **Verify**: Creation modal opens from the empty state.
