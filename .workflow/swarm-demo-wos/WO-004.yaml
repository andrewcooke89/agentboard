id: WO-004
group_id: swarm-demo
title: "Create stats Zustand store with WebSocket handling"
description: |
  Create `src/client/stores/statsStore.ts` — a Zustand store for dashboard stats
  with REST fetch and WebSocket update handling.

  ```typescript
  import { create } from 'zustand'
  import type { DashboardStats } from '../../shared/dashboardTypes'

  interface StatsStore {
    stats: DashboardStats | null
    setStats: (stats: DashboardStats) => void
    fetchStats: () => Promise<void>
  }
  ```

  ## Implementation

  - `setStats(stats)` — direct setter, called from WebSocket handler
  - `fetchStats()` — GET /api/stats, sets stats on success
  - No persistence needed (stats are ephemeral)

  ## Pattern

  Follow the exact same patterns as existing stores in src/client/stores/.
  Use `create` from zustand. Do NOT use persist middleware for this store
  (stats are live data, not user preferences).

  Look at cronStore.ts or taskStore.ts for the fetch pattern.

