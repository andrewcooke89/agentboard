id: WO-002
group_id: swarm-demo
title: "Create EventLog component for swarm real-time event feed"
description: |
  Create `src/client/components/swarm/EventLog.tsx` — a scrollable real-time
  event feed that shows swarm dispatch events as they happen.

  Props:
  ```typescript
  interface EventLogProps {
    events: EventLogEntry[]
    maxHeight?: string  // default '300px'
  }
  ```

  Import EventLogEntry from `../../shared/dashboardTypes`.

  ## Rendering

  - Container: dark background (bg-gray-900/50), rounded, with the maxHeight
    and overflow-y-auto. Auto-scroll to bottom when new events arrive (useEffect + ref).
  - Header: "Event Log" label with event count badge
  - Each event row:
    - Timestamp (HH:MM:SS format, gray-500 text, monospace)
    - Severity indicator dot: info=blue, success=green, warning=amber, error=red
    - Message text (gray-200, text-sm)
    - WO ID badge if present (small pill, gray-700 bg)
    - Model name if present (small text, gray-500)
  - Empty state: "Waiting for events..." centered in muted text
  - Events should be displayed newest-first (reverse chronological)

  ## Styling

  Use Tailwind classes. Dark theme matching agentboard (dark grays, not pure black).
  Keep it compact — each row should be ~28px height. No unnecessary padding.
  The component should feel like a terminal/log output.

  Look at existing components in src/client/components/ for styling patterns.

