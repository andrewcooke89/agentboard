decisions:
  - affects:
      - workflowEngine
      - workflowSchema
    date: '2026-01-29'
    decision: Inter-step communication via convention-based file paths
    id: DEC-001
    made_by: feature-planner
    rationale: Steps write to agreed-upon paths in per-run output directory. Simple, no shared state needed.
  - affects:
      - workflowEngine
    date: '2026-01-29'
    decision: 'Error handling: retry then halt'
    id: DEC-002
    made_by: feature-planner
    rationale: Reuses existing task queue retry logic. Halt allows user to diagnose and resume.
  - affects:
      - workflowEngine
      - workflowSchema
    date: '2026-01-29'
    decision: Per-step timeouts only, no global workflow timeout
    id: DEC-003
    made_by: feature-planner
    rationale: Simplifies implementation. Global timeout can be added later.
  - affects:
      - workflowStore
      - workflowFileWatcher
      - workflowEditor
    date: '2026-01-29'
    decision: YAML files as source of truth, UI writes back to YAML
    id: DEC-004
    made_by: feature-planner
    rationale: Version-controllable via git. UI is a convenience layer.
  - affects:
      - workflowEngine
      - workflowSchema
    date: '2026-01-29'
    decision: Simple skip conditions only (file_exists, output_contains)
    id: DEC-005
    made_by: feature-planner
    rationale: No full branching complexity for MVP. Covers main use cases.
  - affects:
      - workflowEngine
      - workflowSchema
    date: '2026-01-29'
    decision: '4 step types for MVP: spawn_session, check_file, delay, check_output'
    id: DEC-006
    made_by: feature-planner
    rationale: Minimum set to support meaningful pipelines. Extensible later.
  - affects:
      - workflowHandlers
      - workflowWsHandlers
    date: '2026-01-29'
    decision: Manual triggers only (UI button or REST endpoint)
    id: DEC-007
    made_by: feature-planner
    rationale: Simplest trigger model. Scheduled triggers deferred.
  - affects:
      - WorkflowList
      - WorkflowDetail
      - WorkflowEditor
      - WorkflowPanel
    date: '2026-01-29'
    decision: 'Two-level UI: dedicated view for CRUD, right panel for monitoring'
    id: DEC-008
    made_by: feature-planner
    rationale: CRUD needs full-page space. Monitoring fits existing panel pattern.
  - affects:
      - PipelineDiagram
    date: '2026-01-29'
    decision: Pipeline diagram with connected nodes for progress visualization
    id: DEC-009
    made_by: feature-planner
    rationale: Clear visual representation of sequential step flow and status.
  - affects:
      - workflowEngine
      - taskStore
    date: '2026-01-29'
    decision: Engine submits steps as tasks to existing task queue
    id: DEC-010
    made_by: feature-planner
    rationale: Maximum reuse of existing infrastructure. Tasks get all queue features (retry, timeout, monitoring).
  - affects:
      - workflowEngine
    date: '2026-01-29'
    decision: Engine uses polling to check task completion (matching existing task worker pattern)
    id: DEC-011
    made_by: feature-planner
    rationale: Consistent with existing codebase. Optimize to callbacks later if needed.
existing_context:
  api_patterns:
    auth_method: Bearer token via AUTH_TOKEN env var
    error_format: '{ error: string }'
    url_format: /api/{resource} with kebab-case
    websocket_messages: Discriminated union ServerMessage/ClientMessage in src/shared/types.ts
  constraints:
    - Must use existing AUTH_TOKEN authentication pattern
    - Must follow discriminated union pattern for WebSocket messages
    - Must use factory function pattern for module initialization
    - Must use prepared statements for SQLite queries
    - Must use additive migrations only (try/catch ALTER TABLE)
    - Must follow existing Hono route registration pattern
  data_patterns:
    migrations: Additive only via try/catch ALTER TABLE
    naming: snake_case for SQL columns, camelCase for TypeScript
    primary_keys: Text IDs generated via {timestamp36}-{random6}
    timestamps: created_at, updated_at as TEXT with datetime('now')
  discovery_source: .workflow/discovery.yaml
  discovery_timestamp: '2026-01-29'
  gaps:
    - No YAML parsing library currently in dependencies
    - No file watching utility currently used
    - No pipeline/diagram visualization component
    - No dedicated full-page view routing (current UI is single-page with panels)
  reuse_candidates:
    - location: src/server/taskStore.ts
      name: TaskStore
      purpose: SQLite CRUD pattern (initTaskStore, prepared statements, mapRow)
    - location: src/server/taskWorker.ts
      name: TaskWorker
      purpose: Background poll loop, tmux spawning, completion detection
    - location: src/server/handlers/taskHandlers.ts
      name: taskHandlers
      purpose: WebSocket handler pattern (createTaskHandlers factory)
    - location: src/server/httpRoutes.ts
      name: httpRoutes
      purpose: Hono HTTP route registration pattern
    - location: src/server/config.ts
      name: config
      purpose: Environment variable parsing pattern
    - location: src/client/stores/taskStore.ts
      name: useTaskStore
      purpose: Zustand store with persist middleware pattern
    - location: src/server/taskStore.ts:27
      name: generateId()
      purpose: ID generation function
    - location: src/server/index.ts
      name: ServerContext
      purpose: Dependency injection context
  similar_features:
    - location: src/server/taskStore.ts, src/server/taskWorker.ts
      name: Task Queue (Phase 4)
      relevance: high
      reuse_opportunity: Workflow engine builds on top of task queue; each step becomes a task
    - location: src/server/taskWorker.ts
      name: Task Chaining (followUpPrompt)
      relevance: medium
      reuse_opportunity: Lightweight predecessor; workflow engine is the full solution
feature_id: FEAT-005
invariants:
  - enforced_by: workflowEngine writes step state after every transition
    id: INV-001
    rule: Workflow run state is always persisted in SQLite before advancing to next step
  - enforced_by: Engine checks step status before executing; only pending/failed steps can be started
    id: INV-002
    rule: Each workflow step executes at most once per run attempt (no double-execution)
  - enforced_by: Run endpoint checks is_valid=1 before creating run
    id: INV-003
    rule: Invalid workflows cannot be triggered for a run
  - enforced_by: WORKFLOW_ENGINE_ENABLED flag gates all workflow code paths
    id: INV-004
    rule: Existing task queue functionality is unaffected when workflow engine is disabled
  - enforced_by: CREATE TABLE IF NOT EXISTS, try/catch ALTER TABLE pattern
    id: INV-005
    rule: All new database changes are additive only (no destructive migrations)
  - enforced_by: Types defined in src/shared/types.ts with type field
    id: INV-006
    rule: WebSocket messages follow existing discriminated union pattern
last_updated: '2026-02-04T13:08:47.672Z'
objectives:
  goals:
    - Define and execute multi-step YAML workflows with 4 step types (spawn_session, check_file, delay, check_output)
    - Persist workflow definitions and run state in SQLite for crash recovery
    - Integrate workflow steps with existing task queue (one step = one task)
    - Provide real-time pipeline visualization via WebSocket and pipeline diagram component
    - Support YAML file-based and UI-based workflow creation/editing
    - Enable simple conditions (file_exists, output_contains) to skip steps
    - Support per-step retry and timeout, reusing existing task queue retry logic
    - Allow resume from failed step via UI or API
  non_goals:
    - run_command or notify step types
    - Scheduled or event-based triggers
    - Parallel step execution
    - Full if/else branching
    - Workflow versioning or diff
    - Global workflow timeout
  success_criteria:
    - metric: Workflow runs completed successfully
      target: '> 80% success rate'
    - metric: p95 WebSocket update latency
      target: < 200ms
    - metric: Zero data loss on server restart
      target: All running workflows recovered from SQLite
    - metric: Server crashes from workflow engine
      target: Zero
