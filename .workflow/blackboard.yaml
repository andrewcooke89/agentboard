risks:
  - description: Server restart during active workflow step loses progress
    id: RISK-001
    mitigation: All state persisted in SQLite. Engine recovery on startup re-evaluates running workflows.
    severity: high
    status: pending
  - description: Bun fs.watch may be unstable for production file watching
    id: RISK-002
    mitigation: Test thoroughly in Phase 6. Fallback to chokidar if issues found.
    severity: medium
    status: pending
  - description: YAML parse errors crash the server
    id: RISK-003
    mitigation: All YAML parsing wrapped in try/catch. Invalid YAML stored with is_valid=0.
    severity: high
    status: pending
  - description: Concurrent workflow runs exhaust task queue slots
    id: RISK-004
    mitigation: WORKFLOW_MAX_CONCURRENT_RUNS cap. Steps queue normally in task queue.
    severity: medium
    status: pending
  - description: Adding columns to tasks table breaks existing queries
    id: RISK-005
    mitigation: Additive columns only (nullable TEXT). Existing queries unaffected.
    severity: low
    status: pending
