title: Shared processingIds Set without synchronization
description: "The processingIds Set is used to prevent double-processing of
  tasks but is mutated without locks in dequeueTasks() (line 276:
  processingIds.add) and spawnTask() (line 304: processingIds.delete). If poll()
  is called re-entrantly (e.g., via async intervals or manual trigger), two poll
  cycles could simultaneously process the same task. Comment acknowledges
  potential re-entrancy but no synchronization primitives used."
suggestion: "Add pollInFlight boolean flag checked/set at poll() entry (pattern
  from sessionRefresh.ts). Guard poll() execution: if (pollInFlight) return;
  pollInFlight = true; try { ... } finally { pollInFlight = false }. Consider
  using mutex/semaphore if async conversion planned."
