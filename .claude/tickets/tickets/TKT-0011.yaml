title: Tmux kill-window errors silently swallowed during workflow cancellation
description: When cancelling a workflow run, if the tmux kill-window command
  fails, the error is logged but the task is marked as cancelled anyway. This
  can leave orphaned tmux sessions consuming resources. Comment explicitly
  states 'Always mark the task as cancelled regardless of tmux kill outcome',
  which creates resource leaks when tmux operations fail.
suggestion: Track kill failures and retry with exponential backoff. If kill
  fails after N retries, mark task as 'cancelled-with-orphan' and emit alert for
  operator intervention. Add health check endpoint that lists orphaned tmux
  windows. Consider using tmux list-windows to verify kill succeeded.
