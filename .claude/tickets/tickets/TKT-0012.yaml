title: Error ignored when file read fails during check_output step
description: When check_output step fails to read a file, most errors are
  silently ignored with comment 'Otherwise file doesn't exist yet or can't be
  read - keep waiting'. Permission errors or I/O failures are indistinguishable
  from file not being created yet, potentially causing indefinite waiting. Only
  'too large' errors fail the workflow.
suggestion: "Categorize file read errors: (1) ENOENT = file doesn't exist, keep
  waiting; (2) EACCES = permission error, fail immediately; (3) EIO = I/O error,
  retry with backoff, fail after N attempts. Add timeout to prevent indefinite
  waiting on permission errors. Log distinct error codes for monitoring."
