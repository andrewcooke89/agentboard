title: Race condition in session creation name collision check
description: Name uniqueness is checked by listing existing windows and querying
  the database separately (TOCTOU pattern). Two concurrent requests can both
  pass the uniqueness check before either creates the window, resulting in
  duplicate names. The displayNameExists check and tmux window creation are not
  atomic. No synchronization primitive protects this critical section.
suggestion: Add UNIQUE constraint on display_name in database schema. Wrap
  uniqueness check + insert in transaction, catch constraint violations and
  retry with new name. Use database's atomic guarantees instead of
  application-level checks. Consider optimistic locking with version numbers.
