title: Output directory creation failure logged but request succeeds
description: When output directory creation fails, the error is logged but
  execution continues without failing the request. The comment states 'engine
  will create it if needed', but this creates a race condition where the engine
  may attempt to use a directory that failed to create. Permission errors are
  indistinguishable from transient failures.
suggestion: Distinguish between transient errors (disk full, temporary
  permission issue) and permanent errors (invalid path, read-only filesystem).
  Return 500 for permanent errors. For transient errors, retry with exponential
  backoff or fail the request with clear error message.
