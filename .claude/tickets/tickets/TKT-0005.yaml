title: Display name uniqueness check without transaction protection
description: Display name collision detection and update operations are not
  wrapped in a transaction. Multiple processes could simultaneously detect the
  same duplicate, leading to non-unique display names or lost updates. The
  function runs during DB initialization when multiple server instances could be
  starting. Multi-step read-modify-write without transaction wrapper.
suggestion: Wrap entire migration in db.transaction(). Use SELECT FOR UPDATE or
  UNIQUE constraint with ON CONFLICT to ensure atomicity. Consider using
  advisory locks for migration coordination.
