title: LogPoller match worker errors suppress matching without failing gracefully
description: When the log match worker throws an error, matchSkipped is set to
  true and polling continues. However, the code doesn't distinguish between
  transient errors and permanent failures, so log-to-window matching may be
  broken indefinitely without operator awareness. Errors counter increments but
  no threshold triggers remediation.
suggestion: "Add error threshold: after N consecutive match failures, stop log
  poller and emit critical alert. Categorize errors: (1) transient (network
  timeout) = retry with backoff; (2) permanent (parse error) = disable matching,
  alert operator. Add health check endpoint exposing match failure rate and last
  successful match timestamp."
