title: Missing error indication in workflow WebSocket handlers
description: When workflow list or run list operations fail, empty arrays are
  sent to the client instead of error messages. Clients cannot distinguish
  between 'no workflows exist' and 'database error occurred'. WebSocket response
  schema doesn't include error field, so error handling defaults to masking
  failures as empty results.
suggestion: "Add optional 'error' field to WebSocket response types. In catch
  blocks, send { type: 'workflow-list', workflows: [], error: 'Database
  connection failed' }. Update client to display error toast when error field
  present. Document error handling contract in shared types."
