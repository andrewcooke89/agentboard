title: Silent error suppression in taskWorker poll loop
description: The poll() function catches errors from checkRunningTasks(),
  autoRetryFailedTasks(), and dequeueTasks() independently and only logs them.
  If any critical operation consistently fails, the worker continues running but
  becomes non-functional without alerting operators. No circuit breaker or
  health check exposes this silent failure mode.
suggestion: "Add failure counters for each operation. Implement circuit breaker
  pattern: after N consecutive failures, stop the worker and emit critical
  alert. Add health check endpoint that exposes error rates and circuit breaker
  state. Distinguish transient from permanent errors."
