title: WorkflowEngine poll fatal error stops polling without recovery
description: If getRunningRuns() throws an exception, the entire workflow engine
  stops polling permanently via stop(). This means a single transient database
  error can halt all workflow execution until the server restarts. No retry
  logic or graceful degradation exists for transient errors.
suggestion: "Replace stop() with retry logic: log error, increment failure
  counter, use exponential backoff, and retry. Only stop after N consecutive
  failures (e.g., 5). Add health check endpoint to expose engine status and
  failure count."
