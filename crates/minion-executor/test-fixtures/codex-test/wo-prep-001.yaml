# Codex prep WO: generate a utility module with type definitions.
# This runs first via Codex, then GLM WOs implement against it.

id: WO-PREP-001
group_id: codex-test-group
title: "Create stringMetrics utility module with type definitions"
description: |
  Create a new file `src/shared/stringMetrics.ts` that exports the following:

  1. A TypeScript interface `StringMetrics`:
     ```typescript
     export interface StringMetrics {
       length: number;
       wordCount: number;
       lineCount: number;
       charFrequency: Record<string, number>;
     }
     ```

  2. A function `analyzeString(input: string): StringMetrics` that:
     - Returns the length of the string
     - Counts words (split by whitespace)
     - Counts lines (split by newline)
     - Builds a character frequency map (lowercase only, ignore whitespace)

  3. A function `summarizeMetrics(metrics: StringMetrics): string` that returns
     a human-readable one-line summary like:
     "42 chars, 8 words, 3 lines, 15 unique chars"

  Make sure the file has proper TypeScript types and exports.

task: implement
scope: src/shared/

