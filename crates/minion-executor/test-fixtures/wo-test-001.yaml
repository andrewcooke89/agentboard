# Test Work Order: Add a formatDuration utility function
# This is a simple, well-scoped task to validate the executor end-to-end.

id: WO-TEST-001
group_id: test-executor-validation
title: "Add formatDuration utility function"
description: |
  Add a utility function `formatDuration(ms: number): string` to the shared utilities.

  The function should:
  - Accept a duration in milliseconds
  - Return a human-readable string like "2h 15m 30s" or "45s" or "120ms"
  - Handle edge cases: 0ms, negative values (return "0ms"), very large values
  - Use the most appropriate unit (don't show "0h 0m 5s", show "5s")

  Create the file at src/shared/formatDuration.ts with the function exported as default
  and as a named export.

task: implement
scope: src/shared/

interface_files: []
reference_files: []
input_files:
  - src/shared/types.ts

intern_context:
  enabled: true
  search_depth: 1
  tools:
    - file_dependencies

depends_on: []
prefer_after: []

gates:
  compile: true
  lint: true
  typecheck: true
  tests:
    run: false
    scope: relevant
    specific: []
    expect: pass

execution:
  mode: unattended
  model: glm-5
  max_retries: 2
  timeout_minutes: 5

escalation:
  enabled: false
  after_retries: 2
  to: opus
  mode: attended
  include_error_context: true

isolation:
  type: none
  base: HEAD

output:
  commit: false
  commit_prefix: "feat"
