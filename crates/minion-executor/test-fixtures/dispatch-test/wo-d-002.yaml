# Dispatch Test WO-D-002: Create a truncateString utility
# No dependencies — fires immediately, parallel with WO-D-001.

id: WO-D-002
group_id: dispatch-test-group
title: "Add truncateString utility function"
description: |
  Create a utility function `truncateString(str: string, maxLength: number, suffix?: string): string`
  in src/shared/truncateString.ts.

  The function should:
  - Return the original string if it's shorter than maxLength
  - Truncate to maxLength and append suffix (default "...") if longer
  - Ensure the total result length (including suffix) does not exceed maxLength
  - Handle empty strings and maxLength of 0

  Export as both default and named export.

task: implement
scope: src/shared/

interface_files: []
reference_files: []
input_files:
  - src/shared/types.ts

intern_context:
  enabled: true
  search_depth: 1
  tools:
    - file_dependencies

depends_on: []
prefer_after: []

gates:
  compile: true
  lint: true
  typecheck: true
  tests:
    run: false
    scope: relevant
    specific: []
    expect: pass

execution:
  mode: unattended
  model: glm-5
  max_retries: 2
  timeout_minutes: 5

escalation:
  enabled: false
  after_retries: 2
  to: opus
  mode: attended
  include_error_context: true

isolation:
  type: none
  base: HEAD

output:
  commit: true
  commit_prefix: "feat"
